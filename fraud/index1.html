<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cross Market Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #161b22;
}

.navbar h2 {
  margin: 0;
  color: #00ffcc;
}

.navbar a {
  color: #ccc;
  text-decoration: none;
  margin-left: 15px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
}

/* Login Card */
.login-box {
  width: 300px;
  margin: auto;
  background: #161b22;
  padding: 20px;
  border-radius: 10px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: #00ffcc;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Cross Market</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Login</a>
  </div>
</div>

<div class="hero">
  <h1>AI Trading Platform</h1>
  <p>Automate your trading with advanced AI strategies</p>
</div>

<div class="login-box">
  <h3>Login</h3>
  <input type="text" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

<div class="footer">
  © 2026 Demo Clone - For Learning Purpose
</div>

</body>
</html>
