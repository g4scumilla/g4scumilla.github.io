<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resignation Application Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-pY1G1DvnQ7uX2YvXn7H1XjK7Y5p3d7hx2K3z8d7/X0rMzLgIzLqFA7O4bWqWzRmOYxFz9E+r7ZlMWY3Sb4V1Hg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

  <div id="header-placeholder"></div>

  <div class="main-wrapper" style="display:flex; flex-direction:column; align-items:center; margin-top:180px; padding:0 20px;">
    <div class="content-heading" style="text-align:center; font-size:26px; color:#023e8a; font-weight:500; margin-bottom:25px;">
      Resignation Application
    </div>

    <div class="form-container vertical-form" style="width:100%; max-width:650px; padding:35px; border-radius:10px; background:#ffffff; box-shadow:0 2px 8px rgba(0,0,0,0.15); border-top:6px solid #673ab7;">
      <h2 style="margin-bottom:25px; font-size:22px; font-weight:500; color:#202124; text-align:center;">Submit Your Details</h2>

      <form id="demoForm">

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Application Date <span style="color:red;">*</span></label>
          <input type="date" name="appDate" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent; transition:border-color 0.3s;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>নাম (বাংলা) <span style="color:red;">*</span></label>
          <input type="text" name="nameBn" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Clock Number <span style="color:red;">*</span></label>
          <input type="tel" name="clockNo" pattern="[0-9]{1,15}" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Service Duration <span style="color:red;">*</span></label>
          <input type="text" name="serviceDuration" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Rank <span style="color:red;">*</span></label>
          <select name="rank" id="rankSelect" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
            <option value="" disabled selected>Select Rank</option>
            <option value="Security Guard">Security Guard</option>
            <option value="Supervisor">Supervisor</option>
            <option value="Inspector">Inspector</option>
            <option value="Other">Other</option>
          </select>
          <input type="text" name="rankOther" id="rankOther" placeholder="Enter your rank" style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent; display:none; margin-top:10px;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Reason for Leaving <span style="color:red;">*</span></label>
          <textarea name="reason" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent; min-height:90px; resize:vertical;"></textarea>
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Mobile Number <span style="color:red;">*</span></label>
          <input type="tel" name="mobile" pattern="[0-9]{10,15}" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
        </div>

        <div class="form-field" style="margin-bottom:25px; display:flex; flex-direction:column;">
          <label>Email Address (For PDF copy) <span style="color:red;">*</span></label>
          <input type="email" name="email" required style="border:none; border-bottom:1.5px solid #dadce0; padding:12px 4px; font-size:15px; background:transparent;">
        </div>

        <button type="submit" style="margin-top:20px; padding:10px 24px; font-size:14px; font-weight:500; color:#fff; border:none; border-radius:4px; background-color:#1a73e8; cursor:pointer; transition:0.3s;">Submit</button>

      </form>

      <p id="response" style="margin-top:20px; font-size:14px; font-weight:500; color:#188038;"></p>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    // Load header and footer
    fetch('/regular_pages/header.html')
      .then(res => res.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);

    fetch('/regular_pages/footer.html')
      .then(res => res.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);

    // Rank "Other" logic
    const rankSelect = document.getElementById('rankSelect');
    const rankOther = document.getElementById('rankOther');
    rankSelect.addEventListener('change', function() {
      if(this.value === 'Other'){
        rankOther.style.display = 'block';
        rankOther.required = true;
      } else {
        rankOther.style.display = 'none';
        rankOther.required = false;
      }
    });

    // Form submission
    document.getElementById("demoForm").addEventListener("submit", function(e){
      e.preventDefault();
      if(rankSelect.value === "Other") this.rank.value = rankOther.value;

      fetch("https://script.google.com/macros/s/AKfycbwn8NGUnp2slWhRO7hPs_sxtfp2KLAi6fx577drjcNYB9_dpFhB3OTOZT5GiEkr-4_6/exec",{
        method:"POST",
        body:new FormData(this)
      })
      .then(res => res.json())
      .then(result=>{
        document.getElementById("response").innerHTML =
          "Submitted Successfully! <br><a href='" + result.downloadUrl + "' target='_blank'>Download PDF</a>";
        this.reset();
        rankOther.style.display = 'none';
      })
      .catch(()=>{
        document.getElementById("response").innerHTML = "Error: Could not submit";
      });
    });
  </script>
</body>
</html>
