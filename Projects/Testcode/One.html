<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .debit-card {
            aspect-ratio: 1.58 / 1; width: 100%; max-width: 380px; margin: 0 auto;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.85) 0%, rgba(15, 118, 110, 0.9) 100%), 
                        url('https://www.everypixel.com/image-298449078311892583');
            background-size: cover; background-position: center; backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; position: relative; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        
        /* Attractive Staff Card UI */
        .staff-card-ui { 
            background: white; 
            border: 2px solid #F1F5F9; 
            border-radius: 24px; 
            transition: all 0.3s ease;
        }
        .staff-card-ui:hover { border-color: #3B82F6; transform: translateY(-2px); }

        .report-scroll-container { width: 100%; overflow-x: auto; }
        #pdf-content { border: 1px solid #E2E8F0; border-radius: 16px; overflow: hidden; width: 100%; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <i class="fa-solid fa-building-columns text-5xl text-blue-600 mb-6"></i>
            <h2 class="text-2xl font-bold mb-8">FinanceFlow Pro</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6 mt-2">
            <div class="flex items-center gap-3 cursor-pointer" onclick="openModal('profile-modal')">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-user-tie text-xl"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">System Operator</p>
                    <h1 class="text-lg font-bold text-slate-800" id="user-display">themadkafi</h1>
                </div>
            </div>
            <button onclick="openModal('entry-modal')" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-plus"></i></button>
        </div>

        <div class="debit-card p-8 text-white mb-6">
            <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Central Balance Ledger</p>
            <h2 class="text-3xl font-bold" id="cb-display">0.00</h2>
            <div class="mt-8 flex justify-between items-end">
                <p class="text-[10px] font-bold tracking-widest uppercase">Active Session</p>
                <p class="text-xs font-bold px-3 py-1 bg-white/20 rounded-lg backdrop-blur-md" id="card-curr-label">BDT</p>
            </div>
        </div>

        <!-- Month Switcher Section -->
        <div class="mb-8">
            <div class="flex items-center justify-center gap-4 mb-4">
                <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-full text-slate-400 hover:text-blue-600">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <h3 class="font-extrabold text-slate-800 tracking-tight text-sm uppercase flex items-center gap-2 min-w-[120px] justify-center">
                    <span id="month-label">May 2026</span>
                </h3>
                <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-full text-slate-400 hover:text-blue-600">
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl border-2 border-teal-50 shadow-sm">
                    <p class="text-[9px] font-bold text-teal-600 uppercase mb-1">Total Received</p>
                    <p class="text-lg font-bold text-slate-800" id="month-received">0.00</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border-2 border-orange-50 shadow-sm">
                    <p class="text-[9px] font-bold text-orange-600 uppercase mb-1">Total Advanced</p>
                    <p class="text-lg font-bold text-slate-800" id="month-advanced">0.00</p>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 px-1 flex items-center gap-2 uppercase text-[10px] tracking-widest">
            <i class="fa-solid fa-clock-rotate-left text-slate-300"></i> Recent Transactions
        </h3>
        <div id="recent-logs" class="space-y-3"></div>
    </div>

    <!-- STAFF MENU -->
    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-users-viewfinder text-blue-600"></i> Staff Roster
        </h2>
        <div id="staff-list" class="grid gap-4"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Settings & Tools</h2>
        <div class="space-y-3">
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 mb-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Currency Configuration</p>
                <select id="curr-select" onchange="updateCurrencyFormat(this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold">
                    <option value="text">BDT (Text)</option>
                    <option value="sign">৳ (Sign)</option>
                    <option value="usd">USD ($)</option>
                </select>
            </div>

            <!-- Existing Menus -->
            <button onclick="showPage('reports-page')" class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50">
                <span class="flex items-center gap-3"><i class="fas fa-file-invoice text-blue-600"></i> Ledger Reports</span>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>
            <button onclick="openModal('staff-mgmt-modal')" class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50">
                <span class="flex items-center gap-3"><i class="fas fa-user-plus text-blue-600"></i> Add Staff Personnel</span>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <!-- 5 New Placeholder Menus -->
            <button class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50 opacity-60">
                <span class="flex items-center gap-3"><i class="fa-solid fa-language text-slate-400"></i> Language Settings</span>
                <i class="fas fa-lock text-slate-200 text-[10px]"></i>
            </button>
            <button class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50 opacity-60">
                <span class="flex items-center gap-3"><i class="fa-solid fa-palette text-slate-400"></i> Theme Appearance</span>
                <i class="fas fa-lock text-slate-200 text-[10px]"></i>
            </button>
            <button class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50 opacity-60">
                <span class="flex items-center gap-3"><i class="fa-solid fa-shield-virus text-slate-400"></i> Security & Privacy</span>
                <i class="fas fa-lock text-slate-200 text-[10px]"></i>
            </button>
            <button class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50 opacity-60">
                <span class="flex items-center gap-3"><i class="fa-solid fa-bell text-slate-400"></i> Notifications</span>
                <i class="fas fa-lock text-slate-200 text-[10px]"></i>
            </button>
            <button class="w-full p-4 bg-white rounded-2xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50 opacity-60">
                <span class="flex items-center gap-3"><i class="fa-solid fa-cloud-arrow-down text-slate-400"></i> Backup & Sync</span>
                <i class="fas fa-lock text-slate-200 text-[10px]"></i>
            </button>

            <button onclick="handleLogout()" class="w-full p-4 bg-red-50 text-red-600 font-bold rounded-2xl mt-4">Sign Out System</button>
        </div>
    </div>

    <!-- MODALS -->
    
    <!-- User Profile Modal (themadkafi) -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3 class="font-bold text-lg mb-6">Operator Profile</h3>
            <div class="space-y-4">
                <input id="p-name" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                <input id="p-des" type="text" placeholder="Designation" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                <input id="p-comp" type="text" placeholder="Company Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                <input id="p-mail" type="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                <input id="p-phone" type="text" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
            </div>
            <button onclick="saveOperatorProfile()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold mt-6">Save Details</button>
            <button onclick="closeModal('profile-modal')" class="w-full mt-4 text-slate-400 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <!-- Other modals (Entry, Staff Mgmt, etc.) remain as in previous version... -->

    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fa-solid fa-house"></i></button>
        <button onclick="showPage('users-page')"><i class="fa-solid fa-user-group"></i></button>
        <button onclick="showPage('settings-page')"><i class="fas fa-sliders"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        // ... (Config remains the same) ...
        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let staffData = {};
        let logsList = [];
        let currFormat = 'text';
        let currentMonth = new Date(); // To track the switcher state

        const fmt = (num) => {
            const val = Math.abs(num || 0).toLocaleString('en-BD', {minimumFractionDigits: 2});
            return currFormat === 'sign' ? (num < 0 ? `(৳${val})` : `৳${val}`) : (num < 0 ? `(BDT ${val})` : `BDT ${val}`);
        };

        window.changeMonth = (offset) => {
            currentMonth.setMonth(currentMonth.getMonth() + offset);
            renderHome();
        };

        window.saveOperatorProfile = () => {
            const data = {
                name: document.getElementById('p-name').value,
                des: document.getElementById('p-des').value,
                comp: document.getElementById('p-comp').value,
                mail: document.getElementById('p-mail').value,
                phone: document.getElementById('p-phone').value
            };
            set(ref(db, `users/${auth.currentUser.uid}/profile`), data).then(() => closeModal('profile-modal'));
        };

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/profile`), s => {
                const p = s.val() || {};
                document.getElementById('user-display').innerText = p.name || 'themadkafi';
                document.getElementById('p-name').value = p.name || '';
                document.getElementById('p-des').value = p.des || '';
                document.getElementById('p-comp').value = p.comp || '';
                document.getElementById('p-mail').value = p.mail || '';
                document.getElementById('p-phone').value = p.phone || '';
            });

            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let sH = '';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    sH += `
                    <div class="staff-card-ui p-6 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-lg font-bold text-slate-800">${u.name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${u.desig || 'Personnel'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] text-slate-400 uppercase font-bold">Balance</p>
                                <p class="font-bold text-blue-600">${fmt(u.balance)}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 pt-4 border-t border-slate-50">
                            <button onclick="alert('Viewing History for ${u.name}')" class="text-[10px] font-bold bg-slate-50 p-2 rounded-xl text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all">
                                <i class="fa-solid fa-clock-rotate-left mr-1"></i> History
                            </button>
                            <button onclick="alert('Editing Full Profile for ${u.name}')" class="text-[10px] font-bold bg-slate-50 p-2 rounded-xl text-slate-600 hover:bg-teal-50 hover:text-teal-600 transition-all">
                                <i class="fa-solid fa-user-pen mr-1"></i> Full Profile
                            </button>
                        </div>
                    </div>`;
                });
                document.getElementById('staff-list').innerHTML = sH;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logsList = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => a.ts - b.ts);
                renderHome();
            });
        }

        function renderHome() {
            const monthName = currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' });
            const monthKey = currentMonth.toISOString().slice(0, 7); 
            document.getElementById('month-label').innerText = monthName;

            let rCB = 0, monthlyRec = 0, monthlyAdv = 0;
            logsList.forEach(l => {
                const a = Number(l.amount || 0);
                if(l.type === 'income') rCB += a; else rCB -= a;
                
                // Filter specifically for the selected month in the switcher
                if(l.date && l.date.startsWith(monthKey)) {
                    if(l.type === 'income') monthlyRec += a; else monthlyAdv += a;
                }
            });

            document.getElementById('cb-display').innerText = fmt(rCB);
            document.getElementById('month-received').innerText = fmt(monthlyRec);
            document.getElementById('month-advanced').innerText = fmt(monthlyAdv);
            
            // Recent Transactions remain global (as requested)
            let logH = '';
            [...logsList].reverse().slice(0, 5).forEach(l => {
                logH += `<div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">${l.staffName}</p>
                        <p class="text-[9px] text-slate-400">${l.date}</p>
                    </div>
                    <p class="font-bold text-sm ${l.type==='income'?'text-teal-600':'text-orange-600'}">${fmt(l.amount)}</p>
                </div>`;
            });
            document.getElementById('recent-logs').innerHTML = logH || '<p class="text-center text-slate-300 py-4">No transactions.</p>';
        }

        // Standard helpers
        onAuthStateChanged(auth, u => {
            document.getElementById('auth-guard').style.display = 'none';
            if (u) { showPage('dashboard-page'); document.getElementById('navbar').classList.remove('hidden'); startSync(u.uid); }
            else { showPage('login-page'); document.getElementById('navbar').classList.add('hidden'); }
        });
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        window.handleLogout = () => signOut(auth);
        window.showPage = (id) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
    </script>
</body>
</html>
