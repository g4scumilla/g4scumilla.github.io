<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kuafi Family Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --g4s-red: #d32f2f; 
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #f8f9fa;
    height: 100vh;
    overflow: hidden;
}

/* Header */
.app-header {
    background: var(--g4s-red);
    padding: calc(var(--safe-top) + 12px) 15px 12px;
    color: white; text-align: center;
    position: fixed; top: 0; width: 100%; z-index: 5000;
}
.header-title { font-size: 18px; font-weight: 800; text-transform: uppercase; }

/* Main Content */
#main-container {
    padding-top: 80px;
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.card-container { padding: 0 15px 20px; }
.visa-card {
    border-radius: 15px; aspect-ratio: 1.58 / 1; width: 100%;
    color: white; display: flex; flex-direction: column;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    position: relative; overflow: hidden;
    background: #222 url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=800&q=80') center/cover;
}
.visa-card::after {
    content: ""; position: absolute; inset: 0; 
    background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(211, 47, 47, 0.4)); z-index: 1;
}
.visa-card > * { position: relative; z-index: 2; }

/* Grid */
.service-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 15px 0; padding: 20px 10px; background: #fff;
    border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
}
.service-item {
    text-decoration: none; color: #333; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; cursor: pointer;
}
.icon-circle {
    width: 45px; height: 45px; background: #fff; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12); margin-bottom: 6px;
    font-size: 18px; color: var(--g4s-red);
}

/* THE MOBILE BROWSER OVERLAY */
#web-view-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white;
    z-index: 6000; /* Above everything */
    display: none;
}
#web-view-frame { width: 100%; height: calc(100% - 60px); border: none; }

/* Fixed Control Bar (The Back to App button) */
.control-bar {
    height: 60px; width: 100%; background: #f4f4f4;
    display: flex; justify-content: center; align-items: center;
    border-top: 1px solid #ddd;
}
.btn-exit {
    background: var(--g4s-red); color: white; border: none;
    padding: 10px 25px; border-radius: 20px; font-weight: bold;
    box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3);
}

/* Nav */
.bottom-nav {
    position: fixed; bottom: 0; width: 100%; background: white;
    display: flex; justify-content: space-around;
    padding: 10px 0 calc(10px + var(--safe-bottom));
    border-top: 1px solid #eee; z-index: 5000;
}
.nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; }
.nav-active { color: var(--g4s-red); }

@media (min-width: 768px) {
    body, .bottom-nav, .app-header, #web-view-container { width: 100%; max-width: 450px; margin: 0 auto; }
    .bottom-nav, .app-header, #web-view-container { left: 50% !important; transform: translateX(-50%); }
}
</style>
</head>

<body>

<div class="app-header">
    <div class="header-title">Family Dashboard</div>
</div>

<div id="main-container">
    <div class="card-container">
        <div class="visa-card">
            <div style="flex:1; display:flex; padding: 20px;">
                <div style="flex: 0.4;"></div>
                <div style="flex: 0.6; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;">
                    <div style="margin-bottom: 10px;">
                        <div style="font-size: 10px; font-weight: bold; color: #fff;">ABDULLAHIL KUAFI</div>
                        <div style="font-size: 7px; opacity: 0.8;">B.A & M.A (English)</div>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <div style="font-size: 10px; font-weight: bold; color: #ffeb3b;">ZAMILA KHATUN</div>
                        <div style="font-size: 7px; opacity: 0.8;">B.Sc & M.Sc (Math)</div>
                    </div>
                    <div>
                        <div style="font-size: 10px; font-weight: bold; color: #ffeb3b;">HABIBULLAH ZAYAAN</div>
                        <div style="font-size: 7px; opacity: 0.8;">Born 12 Nov 2025</div>
                    </div>
                </div>
            </div>
            <div style="padding:10px 15px; background: rgba(0,0,0,0.4); font-size: 8px; display: flex; justify-content: space-between;">
                <span><i class="fa-solid fa-shield-heart"></i> KUAFI PRIVATE HUB</span>
                <span id="live-clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="service-grid">
        <div onclick="launchSite('https://www.bbc.com/bengali')" class="service-item">
            <div class="icon-circle" style="color:#bb1919"><i class="fa-solid fa-newspaper"></i></div>BBC Bangla
        </div>
        <div onclick="launchSite('https://www.prothomalo.com/')" class="service-item">
            <div class="icon-circle" style="color:#000"><i class="fa-solid fa-p"></i></div>Prothom Alo
        </div>
        <div onclick="launchSite('https://bdnews24.com/')" class="service-item">
            <div class="icon-circle" style="color:#d32f2f"><i class="fa-solid fa-2"></i></div>Bdnews24
        </div>
        <div onclick="launchSite('https://www.somoynews.tv/')" class="service-item">
            <div class="icon-circle" style="color:#ff5722"><i class="fa-solid fa-tv"></i></div>Somoy TV
        </div>
    </div>
</div>

<div id="web-view-container">
    <iframe id="web-view-frame" src=""></iframe>
    <div class="control-bar">
        <button class="btn-exit" onclick="closeSite()"><i class="fa-solid fa-house"></i> EXIT TO DASHBOARD</button>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item nav-active"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-circle-plus" style="font-size: 28px; color: var(--g4s-red);"></i></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-user-circle"></i><span>Account</span></a>
</div>

<script>
    function launchSite(url) {
        // If it's a "friendly" site like Prothom Alo, load in frame
        // If it's BBC, we try the Google redirect to force it through
        const container = document.getElementById('web-view-container');
        const frame = document.getElementById('web-view-frame');
        
        container.style.display = 'block';
        
        // This logic helps bypass some frame-blocking
        if(url.includes('bbc.com') || url.includes('thedailystar')) {
            frame.src = "https://www.google.com/search?q=" + encodeURIComponent(url) + "&btnI=Im+Feeling+Lucky";
        } else {
            frame.src = url;
        }
    }

    function closeSite() {
        document.getElementById('web-view-container').style.display = 'none';
        document.getElementById('web-view-frame').src = "";
    }

    function updateClock() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
