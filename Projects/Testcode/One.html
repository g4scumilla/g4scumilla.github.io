<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    // We changed this line below to use "database" instead of "firestore"
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        // ADD THIS LINE BELOW (Get it from your settings)
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com", 
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); // This is now the Realtime Database

    // (The rest of your login logic stays exactly the same!)
    window.handleLogin = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            showPage('dashboard-page');
            document.getElementById('main-nav').classList.remove('hidden');
        } else {
            showPage('login-page');
            document.getElementById('main-nav').classList.add('hidden');
        }
    });

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>
