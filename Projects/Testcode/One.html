<!-- SETTINGS PAGE: Currency Update -->
<div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-100">
    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 flex items-center gap-2"><i class="fa-solid fa-coins"></i> Local Currency</p>
    <div class="flex gap-2">
        <select id="curr-select" class="flex-1 p-3 bg-slate-50 rounded-xl outline-none text-sm font-bold border-none">
            <option value="bdt">BDT</option>
            <option value="usd">USD ($)</option>
        </select>
        <button onclick="saveCurrencySettings()" class="bg-blue-600 text-white px-4 rounded-xl text-[10px] font-bold uppercase">Save</button>
    </div>
</div>

<!-- STAFF MANAGEMENT MODAL: Card Style & Expanded Inputs -->
<div id="staff-mgmt-modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold flex items-center gap-2"><i class="fa-solid fa-user-gear text-slate-900"></i> Staff Management</h3>
            <button onclick="toggleAddStaff()" class="text-blue-600 text-[10px] font-bold uppercase">+ Add New</button>
        </div>

        <!-- Hidden Add Form -->
        <div id="add-staff-form" class="hidden space-y-2 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
            <input id="u-name" type="text" placeholder="Full Name" class="w-full p-3 bg-white rounded-xl text-xs outline-none">
            <input id="u-des" type="text" placeholder="Designation" class="w-full p-3 bg-white rounded-xl text-xs outline-none">
            <input id="u-phone" type="tel" placeholder="Phone Number" class="w-full p-3 bg-white rounded-xl text-xs outline-none">
            <input id="u-email" type="email" placeholder="Email Address" class="w-full p-3 bg-white rounded-xl text-xs outline-none">
            <button onclick="saveUser()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-xs uppercase">Register Staff</button>
        </div>

        <div id="mgmt-staff-list" class="space-y-4"></div>
        <button onclick="closeModal('staff-mgmt-modal')" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase">Close</button>
    </div>
</div>
