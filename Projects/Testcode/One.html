<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kuafi Family App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --g4s-red: #d32f2f; 
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #f8f9fa;
    height: 100vh;
}

/* Header */
.app-header {
    background: var(--g4s-red);
    padding: calc(var(--safe-top) + 12px) 15px 12px;
    color: white; text-align: center;
    position: sticky; top: 0; z-index: 10;
}
.header-title { font-size: 18px; font-weight: 800; text-transform: uppercase; }

/* Dashboard Content */
#dashboard {
    padding-bottom: 80px;
}

.card-container { padding: 15px; }
.visa-card {
    border-radius: 18px; aspect-ratio: 1.58 / 1; width: 100%;
    color: white; display: flex; flex-direction: column;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    position: relative; overflow: hidden;
    background: #222 url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=800&q=80') center/cover;
}
.visa-card::after {
    content: ""; position: absolute; inset: 0; 
    background: linear-gradient(135deg, rgba(0,0,0,0.88), rgba(211, 47, 47, 0.45)); z-index: 1;
}
.visa-card > * { position: relative; z-index: 2; }

/* Grid */
.service-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 20px 0; padding: 25px 10px; background: #fff;
    border-radius: 30px 30px 0 0;
}
.service-item {
    text-decoration: none; color: #333; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700;
}
.icon-circle {
    width: 48px; height: 48px; background: #fff; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 5px 12px rgba(0,0,0,0.12); margin-bottom: 6px;
    font-size: 20px; color: var(--g4s-red);
}

/* Bottom Nav */
.bottom-nav {
    position: fixed; bottom: 0; width: 100%; background: white;
    display: flex; justify-content: space-around;
    padding: 10px 0 calc(10px + var(--safe-bottom));
    border-top: 1px solid #eee; z-index: 5000;
}
.nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; }
.nav-active { color: var(--g4s-red); }

@media (min-width: 768px) {
    body, .bottom-nav, .app-header { width: 100%; max-width: 450px; margin: 0 auto; }
}
</style>
</head>

<body>

<div id="dashboard">
    <div class="app-header">
        <div class="header-title">Family Dashboard</div>
    </div>

    <div class="card-container">
        <div class="visa-card">
            <div style="flex:1; display:flex; padding: 20px;">
                <div style="flex: 0.4;"></div>
                <div style="flex: 0.6; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;">
                    <div style="margin-bottom: 8px;">
                        <p style="font-size: 10px; font-weight: bold; color: #fff;">ABDULLAHIL KUAFI</p>
                        <p style="font-size: 7px; opacity: 0.8;">B.A & M.A (English)</p>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <p style="font-size: 10px; font-weight: bold; color: #ffeb3b;">ZAMILA KHATUN</p>
                        <p style="font-size: 7px; opacity: 0.8;">B.Sc & M.Sc (Math)</p>
                    </div>
                    <div>
                        <p style="font-size: 10px; font-weight: bold; color: #ffeb3b;">HABIBULLAH ZAYAAN</p>
                        <p style="font-size: 7px; opacity: 0.8;">Born 12 Nov 2025</p>
                    </div>
                </div>
            </div>
            <div style="padding:10px 15px; background: rgba(0,0,0,0.5); font-size: 8px; display: flex; justify-content: space-between;">
                <span><i class="fa-solid fa-shield-heart"></i> KUAFI PRIVATE HUB</span>
                <span id="live-clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="service-grid">
        <a href="https://www.bbc.com/bengali" target="_blank" class="service-item">
            <div class="icon-circle" style="color:#bb1919"><i class="fa-solid fa-newspaper"></i></div>BBC
        </a>
        <a href="https://www.prothomalo.com/" target="_blank" class="service-item">
            <div class="icon-circle" style="color:#000"><i class="fa-solid fa-p"></i></div>Prothom Alo
        </a>
        <a href="https://bdnews24.com/" target="_blank" class="service-item">
            <div class="icon-circle" style="color:#d32f2f"><i class="fa-solid fa-2"></i></div>Bdnews24
        </a>
        <a href="https://www.somoynews.tv/" target="_blank" class="service-item">
            <div class="icon-circle" style="color:#ff5722"><i class="fa-solid fa-tv"></i></div>Somoy TV
        </a>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item nav-active"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
    <div class="nav-item"><i class="fa-solid fa-circle-plus" style="font-size: 30px; color: var(--g4s-red); margin-top: -5px;"></i></div>
    <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-user-circle"></i><span>Account</span></a>
</div>

<script>
    function updateClock() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
