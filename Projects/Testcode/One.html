<!-- Locate the renderHome function and update the mLogH loop logic -->
<script>
    // ... inside startSync or the script block ...

    function renderHome() {
        const now = new Date();
        const monthKey = now.toISOString().slice(0, 7); 
        document.getElementById('month-label').innerText = `${now.toLocaleString('default', { month: 'long' })} ${now.getFullYear()}`;

        // Create a sorted list of staff keys to generate stable G4S_XXXX01 IDs
        const staffKeys = Object.keys(staffData).sort();
        const getG4SId = (sid) => `G4S_XXXX${(staffKeys.indexOf(sid) + 1).toString().padStart(2, '0')}`;

        let rCB = 0, monthlyRec = 0, monthlyAdv = 0, rSB = {};
        
        // Calculate all balances first
        const logsWithBal = logsList.map(l => {
            const a = Number(l.amount || 0);
            if(!rSB[l.staffId]) rSB[l.staffId] = 0;
            if(l.type === 'income') { 
                rCB += a; 
                rSB[l.staffId] += a; 
            } else { 
                rCB -= a; 
                rSB[l.staffId] -= a; 
            }
            if(l.date && l.date.startsWith(monthKey)) { 
                if(l.type === 'income') monthlyRec += a; else monthlyAdv += a; 
            }
            return { ...l, cb: rCB, sb: rSB[l.staffId] };
        });

        document.getElementById('cb-display').innerText = fmt(rCB);
        document.getElementById('month-received').innerText = fmt(monthlyRec);
        document.getElementById('month-advanced').innerText = fmt(monthlyAdv);

        // Update Recent Logs (Dashboard)
        let logH = '';
        [...logsWithBal].reverse().slice(0, 5).forEach(l => {
            logH += `
            <div class="nexus-card">
                <div class="nexus-header">
                    <span class="nexus-header-label">Transaction ID</span>
                    <span class="nexus-header-val">: TXN_G4S_${l.key.slice(-6).toUpperCase()}</span>
                </div>
                <div class="nexus-body">
                    <div class="nexus-row"><span class="nexus-key">Beneficiary</span><span class="nexus-val">: ${l.staffName} (${getG4SId(l.staffId)})</span></div>
                    <div class="nexus-row"><span class="nexus-key">Category</span><span class="nexus-val">: ${l.cat || 'General'}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Posting Date</span><span class="nexus-val">: ${l.date}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Amount</span><span class="nexus-val ${l.type==='income'?'text-teal-600':'text-rose-600'}">: ${fmt(l.amount)}</span></div>
                </div>
            </div>`;
        });
        document.getElementById('recent-logs').innerHTML = logH || '<p class="text-center text-slate-400 text-xs py-10">No recent activity</p>';

        // UPDATE: Full History (Management Modal)
        let mLogH = '';
        [...logsWithBal].reverse().forEach(l => {
            mLogH += `
            <div class="nexus-card">
                <div class="nexus-header !bg-slate-50 !border-slate-200">
                    <span class="nexus-header-label !text-slate-600">ID: TXN_G4S_${l.key.slice(-6).toUpperCase()}</span>
                    <span class="nexus-header-val">${l.date}</span>
                </div>
                <div class="nexus-body">
                    <div class="nexus-row"><span class="nexus-key">User ID</span><span class="nexus-val">: ${getG4SId(l.staffId)}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Staff Name</span><span class="nexus-val">: ${l.staffName}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Category</span><span class="nexus-val">: ${l.cat || 'Uncategorized'}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Narration</span><span class="nexus-val font-normal italic text-slate-500">: ${l.note || 'No note attached'}</span></div>
                    
                    <div class="my-2 border-t border-dashed border-slate-200"></div>
                    
                    <div class="nexus-row">
                        <span class="nexus-key">Type/Amount</span>
                        <span class="nexus-val ${l.type==='income'?'text-teal-600':'text-rose-600'}">: ${l.type==='income'?'(+) RECEIVED':'(-) ADVANCED'} — ${fmt(l.amount)}</span>
                    </div>
                    <div class="nexus-row"><span class="nexus-key">Indiv. Balance</span><span class="nexus-val text-blue-600">: ${fmt(l.sb)}</span></div>
                    <div class="nexus-row"><span class="nexus-key">Central Balance</span><span class="nexus-val text-slate-900">: ${fmt(l.cb)}</span></div>
                </div>
                <div class="nexus-footer">
                    <span onclick="delTxn('${l.key}', '${l.staffId}', ${l.amount}, '${l.type}')" class="text-rose-600 text-[10px] font-bold uppercase cursor-pointer hover:underline">
                        <i class="fa-solid fa-trash-can mr-1"></i> Void Transaction
                    </span>
                </div>
            </div>`;
        });
        document.getElementById('mgmt-txn-list').innerHTML = mLogH || '<p class="text-center text-slate-400 text-xs py-10">No history available</p>';
    }
</script>
