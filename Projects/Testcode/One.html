<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>G4S Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    :root {
        --primary-red: #d32f2f;
        --app-bg: #f4f6f8;
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; margin: 0; padding: 0; }

    body {
        background-color: #121212;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; justify-content: center; height: 100vh; overflow: hidden;
    }

    .app-shell {
        width: 100%;
        max-width: 450px;
        background-color: var(--app-bg);
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    #header { flex-shrink: 0; background: #fff; z-index: 100; min-height: 60px; }

    /* The Secret to the APK Vibe: Flex-Grow and Height Calculation */
    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 10px 10px 90px; /* Space for footer */
        overflow-y: auto;
    }

    .service-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: minmax(100px, 1fr); /* Forces items to expand vertically */
        gap: 10px;
        flex-grow: 1; /* This forces the grid to fill all empty space */
    }

    .grid-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.04);
        transition: transform 0.1s;
        border: 1px solid rgba(0,0,0,0.02);
    }

    .grid-item:active { transform: scale(0.9); background: #fafafa; }

    .icon-box {
        font-size: 26px;
        color: var(--primary-red);
        margin-bottom: 8px;
    }

    .grid-label {
        font-size: 10px;
        font-weight: 700;
        color: #333;
        text-align: center;
        line-height: 1.2;
    }

    /* REFRESH BUTTON */
    .refresh-fab {
        position: absolute;
        bottom: 80px; 
        right: 20px;
        width: 55px;
        height: 55px;
        background: var(--primary-red);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4);
        cursor: pointer;
        z-index: 500;
        border: none;
        outline: none;
    }
    
    .refresh-fab i { font-size: 20px; }
    .refresh-fab:active { transform: scale(0.85); background: #b71c1c; }

    #footer { position: absolute; bottom: 0; width: 100%; z-index: 200; height: 70px; }
</style>
</head>
<body>

<div class="app-shell">
    <div id="header"></div>

    <div class="main-content">
        <div class="service-grid">
            <a href="/pages/resignation_automations.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-file-signature"></i></div>
                <span class="grid-label">Resignation</span>
            </a>
            <a href="/pages/prepare_sheet.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-table-list"></i></div>
                <span class="grid-label">Prepare Sheet</span>
            </a>
            <a href="/pages/training_sheet.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-graduation-cap"></i></div>
                <span class="grid-label">Training</span>
            </a>
            <a href="/Projects/Wallet/index" class="grid-item">
                <div class="icon-box"><i class="fas fa-wallet"></i></div>
                <span class="grid-label">Wallet</span>
            </a>
            <a href="/pages/attendance.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
                <span class="grid-label">Attendance</span>
            </a>
            <a href="/pages/inventory.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-boxes-stacked"></i></div>
                <span class="grid-label">Inventory</span>
            </a>
            <a href="/pages/vouchers.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-receipt"></i></div>
                <span class="grid-label">Vouchers</span>
            </a>
            <a href="/pages/reports.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-chart-line"></i></div>
                <span class="grid-label">Reports</span>
            </a>
            <a href="/pages/staff.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-users-gear"></i></div>
                <span class="grid-label">Staff DB</span>
            </a>
            <a href="/pages/payroll.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-money-check-dollar"></i></div>
                <span class="grid-label">Payroll</span>
            </a>
            <a href="/pages/mushak.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-file-invoice-dollar"></i></div>
                <span class="grid-label">Mushak 6.6</span>
            </a>
            <a href="/pages/settings.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-sliders"></i></div>
                <span class="grid-label">Settings</span>
            </a>
            <a href="/pages/cloud.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-cloud-arrow-up"></i></div>
                <span class="grid-label">Cloud</span>
            </a>
            <a href="/pages/archive.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-folder-open"></i></div>
                <span class="grid-label">Archive</span>
            </a>
            <a href="/pages/support.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-headset"></i></div>
                <span class="grid-label">Support</span>
            </a>
            <a href="/pages/other_links.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-ellipsis"></i></div>
                <span class="grid-label">More</span>
            </a>
        </div>
    </div>

    <button class="refresh-fab" onclick="window.location.reload();">
        <i class="fas fa-sync-alt"></i>
    </button>

    <div id="footer"></div>
</div>

<script>
function loadComponent(id, file) {
    fetch(file)
        .then(response => response.text())
        .then(data => {
            const container = document.getElementById(id);
            container.innerHTML = data;
            const scripts = container.querySelectorAll("script");
            scripts.forEach(s => {
                const ns = document.createElement("script");
                ns.text = s.text;
                document.body.appendChild(ns);
            });
        }).catch(e => console.error(e));
}

window.addEventListener('DOMContentLoaded', () => {
    loadComponent("header", "/regular_pages/header.html");
    loadComponent("footer", "/regular_pages/footer.html");
});
</script>

</body>
</html>
