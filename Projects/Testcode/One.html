<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .app-card { border-radius: 28px; }
        
        /* 🛑 Start EVERYTHING hidden */
        .page { 
            display: none; 
            min-height: 100vh; 
            width: 100%;
        }

        /* Use Flex only when active */
        .page.active { 
            display: flex !important; 
            flex-direction: column;
            animation: fadeIn 0.3s ease; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #f1f5f9; z-index: 50; }

        #txn-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: flex-end;
        }
        #txn-modal.active { display: flex; }
        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- 🔐 LOGIN PAGE -->
    <div id="login-page" class="page items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 mx-auto flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="fas fa-wallet text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2">Login</h2>
            <p class="text-slate-500 mb-8">Personal Finance Vault</p>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Sign In</button>
        </div>
    </div>

    <!-- 🏠 DASHBOARD PAGE -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-8 pt-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Account</p>
                    <p class="text-sm font-bold text-slate-700" id="user-display">User</p>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-300 p-2"><i class="fas fa-power-off text-xl"></i></button>
        </div>

        <div class="bg-blue-600 app-card p-8 text-white shadow-xl shadow-blue-200 mb-6 relative overflow-hidden">
            <div class="relative z-10 text-center">
                <p class="opacity-70 text-xs mb-1 font-bold uppercase tracking-widest">Total Balance</p>
                <h2 class="text-4xl font-bold mb-6" id="total-balance">$0.00</h2>
                <button onclick="toggleModal(true)" class="bg-white text-blue-600 px-8 py-3 rounded-2xl font-bold shadow-lg active:scale-95 transition">+ Add Entry</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 app-card border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] text-green-500 font-bold uppercase mb-1">Income</p>
                <h3 class="text-xl font-bold" id="total-income">$0</h3>
            </div>
            <div class="bg-white p-5 app-card border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] text-red-500 font-bold uppercase mb-1">Expense</p>
                <h3 class="text-xl font-bold" id="total-expense">$0</h3>
            </div>
        </div>

        <h3 class="font-bold mb-4 text-slate-700 px-1">Recent Activity</h3>
        <div id="txn-container" class="space-y-3">
            <!-- Transactions load here -->
        </div>
    </div>

    <!-- ➕ MODAL -->
    <div id="txn-modal" onclick="if(event.target == this) toggleModal(false)">
        <div class="bg-white w-full rounded-t-[40px] p-8 modal-content">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-bold mb-8 text-center">Add Entry</h3>
            
            <div class="mb-8">
                <p class="text-center text-slate-400 text-xs font-bold uppercase mb-2">Amount</p>
                <input id="amount" type="number" placeholder="0.00" class="w-full text-5xl font-bold text-center outline-none text-blue-600 bg-transparent">
            </div>
            
            <input id="narration" type="text" placeholder="What was this for?" class="w-full p-5 mb-4 bg-slate-100 rounded-[24px] outline-none border-2 border-transparent focus:border-blue-500">
            
            <div class="flex gap-2 mb-8">
                <button onclick="setType('income')" id="btn-inc" class="flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400 border-2 border-transparent">Income</button>
                <button onclick="setType('expense')" id="btn-exp" class="flex-1 p-4 rounded-2xl font-bold bg-blue-600 text-white border-2 border-transparent">Expense</button>
            </div>

            <button onclick="saveTransaction()" class="w-full bg-blue-600 text-white p-5 rounded-[24px] font-bold shadow-xl shadow-blue-100 mb-4">Save Transaction</button>
        </div>
    </div>

    <!-- 📱 NAV -->
    <nav id="main-nav" class="bottom-nav hidden flex justify-around p-5 shadow-2xl">
        <button class="text-blue-600"><i class="fas fa-house text-2xl"></i></button>
        <button class="text-slate-300"><i class="fas fa-book text-2xl"></i></button>
        <button class="text-slate-300"><i class="fas fa-cog text-2xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentType = 'expense';

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const p = document.getElementById(id);
            if(p) p.classList.add('active');
        };

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- THE FIX: Wait for Firebase to tell us what to do ---
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('user-display').innerText = user.email;
                showPage('dashboard-page');
                document.getElementById('main-nav').classList.remove('hidden');
                loadData(user.uid);
            } else {
                showPage('login-page');
                document.getElementById('main-nav').classList.add('hidden');
            }
        });

        window.toggleModal = (s) => document.getElementById('txn-modal').classList.toggle('active', s);
        
        window.setType = (t) => {
            currentType = t;
            document.getElementById('btn-inc').className = t == 'income' ? 'flex-1 p-4 rounded-2xl font-bold bg-green-500 text-white' : 'flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('btn-exp').className = t == 'expense' ? 'flex-1 p-4 rounded-2xl font-bold bg-red-500 text-white' : 'flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
        };

        window.saveTransaction = () => {
            const amt = parseFloat(document.getElementById('amount').value);
            const msg = document.getElementById('narration').value;
            if(!amt || !msg) return alert("Fill all fields");

            push(ref(db, `users/${auth.currentUser.uid}/transactions`), {
                amount: amt, narration: msg, type: currentType, timestamp: serverTimestamp()
            }).then(() => {
                toggleModal(false);
                document.getElementById('amount').value = '';
                document.getElementById('narration').value = '';
            });
        };

        function loadData(uid) {
            onValue(ref(db, `users/${uid}/transactions`), (s) => {
                const data = s.val();
                let h = '', ti = 0, te = 0;
                if(data) {
                    Object.values(data).reverse().forEach(t => {
                        const isI = t.type === 'income';
                        isI ? ti += t.amount : te += t.amount;
                        h += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                            <div><p class="font-bold text-slate-700">${t.narration}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${t.type}</p></div>
                            <p class="font-bold ${isI ? 'text-green-500' : 'text-red-500'}">${isI?'+':'-'}$${t.amount.toFixed(2)}</p>
                        </div>`;
                    });
                    document.getElementById('txn-container').innerHTML = h;
                } else {
                    document.getElementById('txn-container').innerHTML = '<p class="text-center text-slate-300 italic py-10">Empty</p>';
                }
                document.getElementById('total-balance').innerText = `$${(ti - te).toFixed(2)}`;
                document.getElementById('total-income').innerText = `$${ti.toFixed(2)}`;
                document.getElementById('total-expense').innerText = `$${te.toFixed(2)}`;
            });
        }
    </script>
</body>
</html>
