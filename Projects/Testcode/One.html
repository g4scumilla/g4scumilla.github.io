<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro - Kuafi Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; margin: 0; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .debit-card {
            aspect-ratio: 1.58 / 1; width: 100%; max-width: 380px; margin: 0 auto;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.85) 0%, rgba(15, 118, 110, 0.9) 100%), 
                        url('https://www.everypixel.com/image-298449078311892583');
            background-size: cover; background-position: center; border-radius: 24px; position: relative; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        
        /* NEXUSPAY STYLE CARD UI */
        .nexus-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 16px; }
        .nexus-header { background-color: #fff1f2; padding: 8px 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #fecdd3; }
        .nexus-header-label { font-size: 10px; font-weight: 800; color: #be123c; text-transform: uppercase; letter-spacing: 0.5px; }
        .nexus-header-val { font-size: 10px; font-weight: 700; color: #334155; }
        .nexus-body { padding: 12px; }
        .nexus-row { display: flex; font-size: 11px; margin-bottom: 6px; align-items: flex-start; }
        .nexus-key { width: 105px; color: #64748b; font-weight: 600; flex-shrink: 0; }
        .nexus-val { flex: 1; color: #1e293b; font-weight: 700; }
        .nexus-footer { text-align: center; padding: 8px; border-top: 1px solid #f1f5f9; }
        .nexus-link { color: #e11d48; font-size: 11px; font-weight: 700; text-decoration: underline; cursor: pointer; }

        #pdf-content table { width: 100%; border-collapse: collapse; }
        #pdf-content th, #pdf-content td { border: 1px solid #e2e8f0; padding: 8px; }
    </style>
</head>
<body>

    <!-- LOADING GUARD -->
    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN PAGE -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <i class="fa-solid fa-building-columns text-5xl text-blue-600 mb-6"></i>
            <h2 class="text-2xl font-bold mb-8">FinanceFlow Pro</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Sign In</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">Executive - Manned Services</p>
                <h1 class="text-lg font-bold text-slate-800" id="user-display">Abdullahil Kuafi</h1>
            </div>
            <button onclick="openModal('entry-modal')" class="w-10 h-10 bg-blue-600 rounded-xl text-white shadow-lg"><i class="fas fa-plus"></i></button>
        </div>

        <!-- MAIN BALANCE -->
        <div class="debit-card p-8 text-white mb-6 flex flex-col justify-between">
            <div>
                <p class="text-[10px] font-bold uppercase">Central Balance</p>
                <h2 class="text-3xl font-bold" id="cb-display">0.00</h2>
            </div>
            <p class="text-xs font-bold px-3 py-1 bg-white/20 rounded-lg inline-block" id="card-curr-label">BDT</p>
        </div>

        <!-- MONTHLY BALANCES (NEXUS UI) -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="nexus-card mb-0">
                <div class="nexus-header" style="background-color: #f0fdfa; border-bottom-color: #99f6e4;">
                    <span class="nexus-header-label" style="color: #0d9488;">CREDIT</span>
                </div>
                <div class="nexus-body py-2 px-3">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Received</p>
                    <p class="text-sm font-bold text-teal-600" id="month-received">0.00</p>
                </div>
            </div>
            <div class="nexus-card mb-0">
                <div class="nexus-header" style="background-color: #fff7ed; border-bottom-color: #fed7aa;">
                    <span class="nexus-header-label" style="color: #ea580c;">DEBIT</span>
                </div>
                <div class="nexus-body py-2 px-3">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Advanced</p>
                    <p class="text-sm font-bold text-orange-600" id="month-advanced">0.00</p>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 text-xs uppercase">Recent Transactions</h3>
        <div id="recent-logs" class="space-y-4"></div>
    </div>

    <!-- STAFF PAGE -->
    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Staff Accounts</h2>
        <div id="staff-list" class="space-y-4"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Settings</h2>
        <div class="space-y-4">
            <select id="curr-select" onchange="updateCurrencyFormat(this.value)" class="w-full p-4 bg-white rounded-xl border">
                <option value="text">BDT (Text)</option>
                <option value="sign">৳ (Sign)</option>
                <option value="usd">USD ($)</option>
            </select>
            <button onclick="showPage('reports-page')" class="w-full p-4 bg-white rounded-xl text-left border">Ledger Reports</button>
            <button onclick="openModal('staff-mgmt-modal')" class="w-full p-4 bg-white rounded-xl text-left border">Staff Management</button>
            <button onclick="handleLogout()" class="w-full p-4 bg-red-50 text-red-600 font-bold rounded-xl">Sign Out</button>
        </div>
    </div>

    <!-- REPORTS PAGE -->
    <div id="reports-page" class="page p-5 pb-24">
        <button onclick="showPage('settings-page')" class="mb-4 text-blue-600 font-bold">← Back</button>
        <div class="bg-white p-5 rounded-2xl border mb-4">
            <input type="date" id="r-start" class="w-full mb-2 p-2 border rounded">
            <input type="date" id="r-end" class="w-full mb-2 p-2 border rounded">
            <select id="r-staff" class="w-full mb-4 p-2 border rounded"></select>
            <button onclick="generateReport()" class="w-full bg-blue-600 text-white p-3 rounded">Filter Data</button>
        </div>
        <div id="report-view" class="hidden overflow-x-auto">
            <div id="pdf-content" class="bg-white p-4 text-[10px]">
                <h2 class="text-center font-bold">Imprest Statement</h2>
                <table class="w-full mt-4">
                    <thead><tr class="bg-slate-100"><th>Date</th><th>Name</th><th>Type</th><th>Amount</th></tr></thead>
                    <tbody id="report-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <select id="m-staff" class="w-full p-4 mb-4 bg-slate-50 rounded-xl"></select>
            <input id="m-amt" type="number" placeholder="0.00" class="w-full text-3xl font-bold text-center mb-4">
            <div class="flex gap-2 mb-4">
                <button onclick="setT('income')" id="ti" class="flex-1 p-4 bg-slate-100 rounded-xl">Receive</button>
                <button onclick="setT('expense')" id="te" class="flex-1 p-4 bg-orange-500 text-white rounded-xl">Advance</button>
            </div>
            <button onclick="postTxn()" class="w-full bg-teal-600 text-white p-4 rounded-xl">Post Entry</button>
            <button onclick="closeModal('entry-modal')" class="w-full p-4 text-slate-400">Cancel</button>
        </div>
    </div>

    <div id="staff-mgmt-modal" class="modal">
        <div class="modal-content">
            <input id="u-name" type="text" placeholder="Staff Name" class="w-full p-4 mb-2 border rounded">
            <input id="u-des" type="text" placeholder="Designation" class="w-full p-4 mb-4 border rounded">
            <button onclick="saveUser()" class="w-full bg-blue-600 text-white p-4 rounded-xl">Add Staff</button>
            <div id="mgmt-staff-list" class="mt-4"></div>
            <button onclick="closeModal('staff-mgmt-modal')" class="w-full p-4">Close</button>
        </div>
    </div>

    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fa-solid fa-house"></i></button>
        <button onclick="showPage('users-page')"><i class="fa-solid fa-user-group"></i></button>
        <button onclick="showPage('settings-page')"><i class="fas fa-sliders"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentType = 'expense';
        let staffData = {};
        let logsList = [];
        let currFormat = 'text';

        const fmt = (num) => {
            const val = Math.abs(num || 0).toLocaleString('en-BD', {minimumFractionDigits: 2});
            if(currFormat === 'sign') return num < 0 ? `(৳${val})` : `৳${val}`;
            if(currFormat === 'usd') return num < 0 ? `($${val})` : `$${val}`;
            return num < 0 ? `(BDT ${val})` : `BDT ${val}`;
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        window.handleLogout = () => signOut(auth);
        window.showPage = (id) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.setT = (t) => { currentType = t; document.getElementById('ti').className = t === 'income' ? 'flex-1 p-4 bg-teal-500 text-white rounded-xl' : 'flex-1 p-4 bg-slate-100 rounded-xl'; document.getElementById('te').className = t === 'expense' ? 'flex-1 p-4 bg-orange-500 text-white rounded-xl' : 'flex-1 p-4 bg-slate-100 rounded-xl'; };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none';
            if (user) { showPage('dashboard-page'); document.getElementById('navbar').classList.remove('hidden'); startSync(user.uid); } 
            else { showPage('login-page'); document.getElementById('navbar').classList.add('hidden'); }
        });

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let sH = '', mSH = '', opts = '<option value="">Select Staff</option>';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    opts += `<option value="${id}">${u.name}</option>`;
                    sH += `<div class="nexus-card"><div class="nexus-header"><span class="nexus-header-label">A/C: ${id.slice(-6)}</span></div><div class="nexus-body"><div class="nexus-row"><span class="nexus-key">Name</span><span class="nexus-val">: ${u.name}</span></div><div class="nexus-row"><span class="nexus-key">Balance</span><span class="nexus-val">: ${fmt(u.balance)}</span></div></div></div>`;
                });
                document.getElementById('staff-list').innerHTML = sH;
                document.getElementById('m-staff').innerHTML = opts;
                document.getElementById('r-staff').innerHTML = opts;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logsList = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => a.ts - b.ts);
                renderHome();
            });
        }

        function renderHome() {
            let cb = 0, rec = 0, adv = 0, sb = {};
            const now = new Date().toISOString().slice(0, 7);
            logsList.forEach(l => {
                const a = Number(l.amount);
                if(!sb[l.staffId]) sb[l.staffId] = 0;
                if(l.type === 'income') { cb += a; sb[l.staffId] += a; if(l.date?.startsWith(now)) rec += a; } 
                else { cb -= a; sb[l.staffId] -= a; if(l.date?.startsWith(now)) adv += a; }
            });
            document.getElementById('cb-display').innerText = fmt(cb);
            document.getElementById('month-received').innerText = fmt(rec);
            document.getElementById('month-advanced').innerText = fmt(adv);
            
            let logH = '';
            [...logsList].reverse().slice(0, 5).forEach(l => {
                logH += `<div class="nexus-card"><div class="nexus-header"><span class="nexus-header-label">TXN: ${l.key.slice(-5)}</span></div><div class="nexus-body"><div class="nexus-row"><span class="nexus-key">To</span><span class="nexus-val">: ${l.staffName}</span></div><div class="nexus-row"><span class="nexus-key">Amount</span><span class="nexus-val ${l.type==='income'?'text-teal-600':'text-rose-600'}">: ${fmt(l.amount)}</span></div></div></div>`;
            });
            document.getElementById('recent-logs').innerHTML = logH;
        }

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value;
            const amt = Number(document.getElementById('m-amt').value);
            if(!sid || !amt) return;
            const staff = staffData[sid];
            push(ref(db, `users/${auth.currentUser.uid}/logs`), { staffId: sid, staffName: staff.name, amount: amt, type: currentType, date: new Date().toISOString().split('T')[0], ts: Date.now() });
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: currentType === 'income' ? (staff.balance + amt) : (staff.balance - amt) });
            closeModal('entry-modal');
        };

        window.saveUser = () => {
            const name = document.getElementById('u-name').value;
            if(name) push(ref(db, `users/${auth.currentUser.uid}/staff`), { name, balance: 0, desig: document.getElementById('u-des').value });
        };
    </script>
</body>
</html>
