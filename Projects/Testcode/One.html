<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .debit-card {
            aspect-ratio: 1.58 / 1; width: 100%; max-width: 380px; margin: 0 auto;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.85) 0%, rgba(15, 118, 110, 0.9) 100%), 
                        url('https://www.everypixel.com/image-298449078311892583');
            background-size: cover; background-position: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; position: relative; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        
        /* NEXUSPAY STYLE CARD */
        .nexus-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .nexus-header {
            background-color: #fff1f2; /* Light pink */
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #fecdd3;
        }
        .nexus-header-label {
            font-size: 10px;
            font-weight: 800;
            color: #be123c; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .nexus-header-val {
            font-size: 10px;
            font-weight: 700;
            color: #334155;
        }
        .nexus-body { padding: 12px; }
        .nexus-row { display: flex; font-size: 11px; margin-bottom: 6px; align-items: flex-start; }
        .nexus-key { width: 105px; color: #64748b; font-weight: 600; flex-shrink: 0; }
        .nexus-val { flex: 1; color: #1e293b; font-weight: 700; }
        .nexus-footer { text-align: center; padding: 8px; border-top: 1px solid #f1f5f9; }
        .nexus-link { color: #e11d48; font-size: 11px; font-weight: 700; text-decoration: underline; cursor: pointer; }

        .report-scroll-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #pdf-content { border: 1px solid #E2E8F0; border-radius: 16px; overflow: hidden; page-break-inside: auto; width: 100%; }
        #pdf-content table { width: 100%; border-collapse: collapse; }
        #pdf-content tr { page-break-inside: avoid; page-break-after: auto; }
        #pdf-content thead { display: table-header-group; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <i class="fa-solid fa-building-columns text-5xl text-blue-600 mb-6"></i>
            <h2 class="text-2xl font-bold mb-8">FinanceFlow Pro</h2>
            <div class="relative mb-4">
                <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="email" type="email" placeholder="Email" class="w-full p-4 pl-12 bg-slate-100 rounded-2xl outline-none">
            </div>
            <div class="relative mb-8">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="password" type="password" placeholder="Password" class="w-full p-4 pl-12 bg-slate-100 rounded-2xl outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6 mt-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">System Operator</p>
                    <h1 class="text-lg font-bold text-slate-800" id="user-display">Administrator</h1>
                </div>
            </div>
            <button onclick="openModal('entry-modal')" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200"><i class="fas fa-plus"></i></button>
        </div>

        <!-- MAIN BALANCE CARD -->
        <div class="debit-card p-8 text-white mb-6 flex flex-col justify-between">
            <i class="fa-solid fa-shield-halved absolute -right-6 -bottom-6 text-9xl opacity-10 rotate-12"></i>
            <div class="z-10">
                <div class="flex items-center gap-2 mb-1">
                    <i class="fa-solid fa-vault text-[10px]"></i>
                    <p class="text-[10px] font-bold uppercase">Central Balance Ledger</p>
                </div>
                <h2 class="text-3xl font-bold" id="cb-display">0.00</h2>
            </div>
            <div class="flex justify-between items-end z-10">
                <div>
                    <p class="text-[8px] opacity-70 uppercase mb-1">Status</p>
                    <p class="text-xs font-bold tracking-widest flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> ACTIVE SESSION
                    </p>
                </div>
                <p class="text-xs font-bold px-3 py-1 bg-white/20 rounded-lg backdrop-blur-md" id="card-curr-label">BDT</p>
            </div>
        </div>

        <!-- UPDATED MONTHLY SUMMARY CARDS (NEXUSPAY UI) -->
        <div class="mb-8">
            <h3 class="font-bold text-slate-800 tracking-tight mb-3 px-1 text-xs uppercase flex items-center gap-2">
                <i class="fa-solid fa-calendar-check text-blue-600"></i>
                <span id="month-label">May 2026</span>
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <!-- RECEIVED CARD -->
                <div class="nexus-card mb-0">
                    <div class="nexus-header" style="background-color: #f0fdfa; border-bottom-color: #99f6e4;">
                        <span class="nexus-header-label" style="color: #0d9488;">CREDIT</span>
                        <span class="nexus-header-val">: RECV</span>
                    </div>
                    <div class="nexus-body py-2 px-3">
                        <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Total Received</p>
                        <p class="text-sm font-bold text-teal-600" id="month-received">0.00</p>
                    </div>
                </div>
                <!-- ADVANCED CARD -->
                <div class="nexus-card mb-0">
                    <div class="nexus-header" style="background-color: #fff7ed; border-bottom-color: #fed7aa;">
                        <span class="nexus-header-label" style="color: #ea580c;">DEBIT</span>
                        <span class="nexus-header-val">: ADVN</span>
                    </div>
                    <div class="nexus-body py-2 px-3">
                        <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Total Advanced</p>
                        <p class="text-sm font-bold text-orange-600" id="month-advanced">0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 px-1 flex items-center gap-2 uppercase text-xs tracking-wide">
            <i class="fa-solid fa-clock-rotate-left text-slate-400"></i> Recent Transactions
        </h3>
        <div id="recent-logs" class="space-y-4"></div>
    </div>

    <!-- ... rest of your code remains exactly as it was ... -->

    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-users-viewfinder text-blue-600"></i> Staff Accounts
        </h2>
        <div id="staff-list" class="space-y-4"></div>
    </div>

    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-gears text-blue-600"></i> Settings
        </h2>
        <div class="space-y-4">
            <div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-coins"></i> Local Currency
                </p>
                <select id="curr-select" onchange="updateCurrencyFormat(this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm font-bold border-none">
                    <option value="text">BDT (Text)</option>
                    <option value="sign">৳ (Sign)</option>
                    <option value="usd">USD ($)</option>
                </select>
            </div>
            <button onclick="showPage('reports-page')" class="w-full p-4 bg-white rounded-xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50">
                <span class="flex items-center gap-3"><i class="fas fa-file-invoice text-blue-600"></i> Ledger Reports</span>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>
            <button onclick="openModal('staff-mgmt-modal')" class="w-full p-4 bg-white rounded-xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50">
                <span class="flex items-center gap-3"><i class="fas fa-user-plus text-blue-600"></i> Staff Management</span>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>
            <button onclick="openModal('txn-mgmt-modal')" class="w-full p-4 bg-white rounded-xl text-left font-semibold flex justify-between items-center shadow-sm border border-slate-50">
                <span class="flex items-center gap-3"><i class="fas fa-list-check text-blue-600"></i> Transaction History</span>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>
            <button onclick="handleLogout()" class="w-full p-5 bg-red-50 text-red-600 font-bold rounded-[24px] flex items-center justify-center gap-2 mt-4">
                <i class="fa-solid fa-power-off"></i> Sign Out System
            </button>
        </div>
    </div>

    <!-- Modals and Navigation ... (Keep these from your previous file) -->

    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house text-lg"></i><p class="text-[8px] font-bold">HOME</p></button>
        <button onclick="showPage('users-page')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-user-group text-lg"></i><p class="text-[8px] font-bold">STAFF</p></button>
        <button onclick="showPage('settings-page')" class="flex flex-col items-center gap-1"><i class="fas fa-sliders text-lg"></i><p class="text-[8px] font-bold">SETTINGS</p></button>
    </nav>

    <script type="module">

        // ... (Maintain your existing Firebase config and JavaScript functions here) ...

        // Reuse all your startSync and renderHome logic here

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none';

                showPage('dashboard-page');

</body>
</html>
