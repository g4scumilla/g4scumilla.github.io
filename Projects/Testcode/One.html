<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 404 Content Container - Replacing the Grid */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #333;
        }

        .error-container h1 {
            font-size: 80px;
            margin: 0;
            color: #1a73e8;
        }

        .error-container p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-primary { background: #1a73e8; color: white; }
        .btn-secondary { background: #5f6368; color: white; }
        .btn-sync { background: #34a853; color: white; cursor: pointer; border: none; font-size: 16px; }

        .btn:hover { opacity: 0.9; }

        /* Ensure card and footer layout remains fixed */
        .card-header { width: 100%; }
        .bottom-nav { width: 100%; position: fixed; bottom: 0; }
    </style>
</head>
<body>

    <div class="card-header">
        <div class="visa-card-section">
            <div class="card-content">
                <div class="secure-hub">SECURE PERSONAL HUB</div>
                <div class="user-info">
                    <span class="user-name">PERSONAL ACCESS</span>
                </div>
            </div>
        </div>
    </div>

    <div class="error-container">
        <h1>404</h1>
        <p>Oops! The page you're looking for has moved or doesn't exist.</p>
        
        <div class="action-buttons">
            <a href="/index" class="btn btn-primary">
                <i class="fas fa-home"></i> Return Home
            </a>

            <a href="https://kaficumilla.shop/Projects/mydashboard/index" class="btn btn-secondary">
                <i class="fas fa-code"></i> Developer Hub
            </a>

            <button onclick="window.location.reload()" class="btn btn-sync">
                <i class="fas fa-sync-alt"></i> Sync Data
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-compass"></i>
            <span>Explore</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-bell"></i>
            <span>Alerts</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </div>

</body>
</html>
