<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.2s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #F1F5F9; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 20px 0; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        #modal.active { display: flex; }
        .staff-avatar { width: 36px; height: 36px; background: #3B82F6; color: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-3xl font-black mb-2 text-slate-800">FinanceFlow</h2>
            <p class="text-slate-400 text-sm mb-10">Admin Ledger Access</p>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-white border border-slate-200 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-white border border-slate-200 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold" id="user-display">Dashboard</h1>
            <button onclick="openModal()" class="w-10 h-10 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-100 flex items-center justify-center"><i class="fas fa-plus"></i></button>
        </div>

        <div class="bg-slate-900 rounded-[28px] p-7 text-white mb-8">
            <p class="opacity-60 text-[10px] font-bold uppercase tracking-widest mb-1">Total Balance</p>
            <h2 class="text-3xl font-bold mb-6" id="cb-display">$0.00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                <div>
                    <p class="text-[9px] opacity-50 uppercase font-bold">Total Received</p>
                    <p class="text-sm font-bold text-green-400" id="inc-display">$0.00</p>
                </div>
                <div>
                    <p class="text-[9px] opacity-50 uppercase font-bold">Total Advanced</p>
                    <p class="text-sm font-bold text-orange-400" id="exp-display">$0.00</p>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">Recent 3 Transactions</h3>
        <div id="recent-logs" class="space-y-3"></div>
    </div>

    <!-- STAFF -->
    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Staff Directory</h2>
        <div class="bg-white p-5 rounded-3xl border border-slate-100 mb-6">
            <input id="u-name" type="text" placeholder="Name" class="w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none text-sm">
            <input id="u-des" type="text" placeholder="Designation" class="w-full p-3 mb-3 bg-slate-50 rounded-xl outline-none text-sm">
            <button onclick="saveUser()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold text-xs">Add Staff</button>
        </div>
        <div id="staff-list" class="space-y-3"></div>
    </div>

    <!-- REPORTS -->
    <div id="reports-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Statement</h2>
        <div class="bg-white p-5 rounded-3xl border border-slate-100 mb-4 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="r-start" class="text-xs bg-slate-50 p-3 rounded-xl border-none">
                <input type="date" id="r-end" class="text-xs bg-slate-50 p-3 rounded-xl border-none">
            </div>
            <select id="r-staff" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select>
            <div class="flex gap-2">
                <button onclick="generateReport()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold text-xs">Filter</button>
                <button onclick="exportPDF()" id="pdf-btn" class="hidden bg-red-500 text-white p-3 rounded-xl font-bold text-xs">PDF</button>
            </div>
        </div>
        <div id="report-view" class="hidden bg-white p-6 rounded-2xl border border-slate-100">
            <div id="pdf-content">
                <h4 class="font-bold text-sm mb-4 border-b pb-2">Financial Statement</h4>
                <div id="report-content" class="text-[10px] space-y-2"></div>
                <div class="mt-4 pt-3 border-t border-dashed space-y-1 text-[11px]">
                    <div class="flex justify-between"><span>Received:</span><span id="rep-inc" class="text-green-600"></span></div>
                    <div class="flex justify-between"><span>Advanced:</span><span id="rep-exp" class="text-orange-600"></span></div>
                    <div class="flex justify-between font-bold border-t pt-2 mt-2 text-slate-900"><span>Final Balance:</span><span id="rep-net"></span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS (Management) -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Transaction Control</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase mb-4">Manage & Delete Logs</p>
        <div id="settings-logs" class="space-y-2"></div>
    </div>

    <!-- NAV -->
    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fas fa-home text-blue-600"></i></button>
        <button onclick="showPage('users-page')"><i class="fas fa-users text-slate-300"></i></button>
        <button onclick="showPage('reports-page')"><i class="fas fa-file-lines text-slate-300"></i></button>
        <button onclick="showPage('settings-page')"><i class="fas fa-cog text-slate-300"></i></button>
    </nav>

    <!-- MODAL -->
    <div id="modal">
        <div class="bg-white w-full rounded-t-[32px] p-6 max-h-[90vh] overflow-y-auto">
            <select id="m-staff" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl outline-none font-bold"></select>
            <input id="m-amt" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center py-6 text-blue-600 outline-none">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select id="m-cat" class="p-3 bg-slate-50 rounded-xl text-xs"><option>Advance</option><option>Voucher</option><option>Salary</option></select>
                <input id="m-date" type="date" class="p-3 bg-slate-50 rounded-xl text-xs">
            </div>
            <textarea id="m-note" placeholder="Note" class="w-full p-4 mb-4 bg-slate-50 rounded-xl h-20 text-xs"></textarea>
            <div class="flex gap-2 mb-4">
                <button onclick="setT('income')" id="ti" class="flex-1 py-4 rounded-xl font-bold bg-slate-100 text-slate-400">Received</button>
                <button onclick="setT('expense')" id="te" class="flex-1 py-4 rounded-xl font-bold bg-orange-500 text-white">Advanced</button>
            </div>
            <button onclick="postTxn()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Post Entry</button>
            <button onclick="closeModal()" class="w-full mt-4 text-[10px] uppercase font-bold text-slate-400">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let staffData = {}, logsList = [], curT = 'expense';

        onAuthStateChanged(auth, u => {
            document.getElementById('auth-guard').style.display = 'none';
            if (u) { showPage('dashboard-page'); document.getElementById('navbar').classList.remove('hidden'); startSync(u.uid); }
            else { showPage('login-page'); }
        });

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav i').forEach(i => i.classList.replace('text-blue-600', 'text-slate-300'));
            const activeNav = Array.from(document.querySelectorAll('nav button')).find(b => b.getAttribute('onclick').includes(id));
            if(activeNav) activeNav.querySelector('i').classList.replace('text-slate-300', 'text-blue-600');
        };

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let h = '', opts = '', rOpts = '<option value="">All Staff</option>';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    opts += `<option value="${id}">${u.name}</option>`;
                    rOpts += `<option value="${id}">${u.name}</option>`;
                    h += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50">
                        <div class="flex items-center gap-3"><div class="staff-avatar">${u.name[0]}</div>
                        <div><p class="font-bold text-sm">${u.name}</p><p class="text-[9px] text-slate-400 uppercase">${u.desig}</p></div></div>
                        <p class="font-bold text-blue-600 text-sm">$${(u.balance || 0).toFixed(2)}</p>
                    </div>`;
                });
                document.getElementById('staff-list').innerHTML = h;
                document.getElementById('m-staff').innerHTML = opts;
                document.getElementById('r-staff').innerHTML = rOpts;
            });
            onValue(ref(db, `users/${uid}/logs`), s => {
                const d = s.val() || {};
                logsList = Object.keys(d).map(k => ({...d[k], key: k})).sort((a,b) => b.ts - a.ts);
                renderApp();
            });
        }

        function renderApp() {
            let cb = 0, ti = 0, te = 0, h = '', sh = '';
            logsList.forEach((l, i) => {
                const a = Number(l.amount);
                const isInc = l.type === 'income';
                if(isInc) { cb += a; ti += a; } else { cb -= a; te += a; }
                
                const formattedAmt = isInc ? `$${a.toFixed(2)}` : `($${a.toFixed(2)})`; // Bracket logic
                
                if(i < 3) { // Homepage limit 3
                    h += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-xs">${l.staffName}</p><p class="text-[8px] text-slate-400">${l.date}</p></div>
                        <p class="font-bold text-sm ${isInc?'text-green-600':'text-orange-600'}">${formattedAmt}</p>
                    </div>`;
                }
                // Settings Page Logs
                sh += `<div class="bg-white p-3 rounded-xl flex justify-between items-center text-[10px] border border-slate-100">
                    <span>${l.staffName} - ${formattedAmt}</span>
                    <button onclick="delTxn('${l.key}','${l.staffId}',${a},'${l.type}')" class="text-red-400 px-2"><i class="fas fa-trash"></i></button>
                </div>`;
            });
            document.getElementById('cb-display').innerText = `$${cb.toFixed(2)}`;
            document.getElementById('inc-display').innerText = `$${ti.toFixed(2)}`;
            document.getElementById('exp-display').innerText = `$${te.toFixed(2)}`;
            document.getElementById('recent-logs').innerHTML = h;
            document.getElementById('settings-logs').innerHTML = sh;
        }

        window.saveUser = () => {
            const name = document.getElementById('u-name').value, des = document.getElementById('u-des').value;
            if(name && des) push(ref(db, `users/${auth.currentUser.uid}/staff`), { name, desig: des, balance: 0 });
            document.getElementById('u-name').value = ''; document.getElementById('u-des').value = '';
        };

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value, amt = Number(document.getElementById('m-amt').value);
            if(!sid || !amt) return;
            const staff = staffData[sid];
            const nb = curT === 'income' ? (staff.balance + amt) : (staff.balance - amt);
            push(ref(db, `users/${auth.currentUser.uid}/logs`), {
                staffId: sid, staffName: staff.name, amount: amt, type: curT, 
                date: document.getElementById('m-date').value, cat: document.getElementById('m-cat').value,
                note: document.getElementById('m-note').value, ts: Date.now()
            });
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: nb });
            closeModal();
        };

        window.delTxn = (key, sid, amt, type) => {
            if(!confirm("Delete this transaction?")) return;
            const staff = staffData[sid];
            const nb = type === 'income' ? (staff.balance - amt) : (staff.balance + amt);
            remove(ref(db, `users/${auth.currentUser.uid}/logs/${key}`));
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: nb });
        };

        window.generateReport = () => {
            const s = document.getElementById('r-start').value, e = document.getElementById('r-end').value, sid = document.getElementById('r-staff').value;
            let h = '', ti = 0, te = 0;
            logsList.filter(l => (!s || l.date >= s) && (!e || l.date <= e) && (!sid || l.staffId === sid)).forEach(l => {
                const a = Number(l.amount);
                const isInc = l.type === 'income';
                if(isInc) ti += a; else te += a;
                h += `<div class="flex justify-between py-1 border-b border-slate-50">
                    <span>${l.staffName} (${l.date})</span>
                    <span class="${isInc?'text-green-600':'text-orange-600'}">${isInc?'$'+a.toFixed(2):'($'+a.toFixed(2)+')'}</span>
                </div>`;
            });
            document.getElementById('report-view').classList.remove('hidden');
            document.getElementById('pdf-btn').classList.remove('hidden');
            document.getElementById('report-content').innerHTML = h;
            document.getElementById('rep-inc').innerText = `$${ti.toFixed(2)}`;
            document.getElementById('rep-exp').innerText = `($${te.toFixed(2)})`;
            document.getElementById('rep-net').innerText = `$${(ti - te).toFixed(2)}`;
        };

        window.exportPDF = () => html2pdf().from(document.getElementById('pdf-content')).save('Statement.pdf');
        window.openModal = () => { document.getElementById('modal').classList.add('active'); document.getElementById('m-date').valueAsDate = new Date(); };
        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        window.setT = (t) => {
            curT = t;
            document.getElementById('ti').className = t === 'income' ? 'flex-1 py-4 rounded-xl font-bold bg-green-500 text-white' : 'flex-1 py-4 rounded-xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('te').className = t === 'expense' ? 'flex-1 py-4 rounded-xl font-bold bg-orange-500 text-white' : 'flex-1 py-4 rounded-xl font-bold bg-slate-100 text-slate-400';
        };
    </script>
</body>
</html>
