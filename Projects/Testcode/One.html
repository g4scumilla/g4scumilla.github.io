<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        .page { display: none !important; min-height: 100vh; }
        .page.active { display: block !important; }
        #auth-guard { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #f1f5f9; z-index: 50; display: flex; justify-content: space-around; padding: 15px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        #modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 40px; border-top-right-radius: 40px; padding: 32px; max-height: 90vh; overflow-y: auto; }
        .pdf-view { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="auth-guard">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-600 mb-4"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Synchronizing Ledger...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-xl text-center">
            <h2 class="text-2xl font-bold mb-8">Staff Ledger Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5">
        <div class="flex justify-between items-center mb-6 mt-2">
            <h1 class="text-xl font-bold text-slate-800">Dashboard</h1>
            <p id="user-display" class="text-[10px] font-bold text-blue-500"></p>
        </div>

        <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl mb-6">
            <p class="opacity-70 text-[10px] font-bold uppercase mb-1">Central Balance</p>
            <h2 class="text-4xl font-bold mb-4" id="cb-display">$0.00</h2>
            <button onclick="openModal()" class="w-full bg-white/20 py-3 rounded-2xl text-xs font-bold">+ New Entry</button>
        </div>

        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Current Month Summary</p>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-50">
                <p class="text-[10px] text-green-500 font-bold uppercase">Total Received</p>
                <h3 id="inc-display" class="font-bold text-slate-700">$0.00</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-red-50">
                <p class="text-[10px] text-red-500 font-bold uppercase">Total Distributed</p>
                <h3 id="exp-display" class="font-bold text-slate-700">$0.00</h3>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-slate-800">Recent Transactions</h3>
            <button onclick="showPage('reports-page')" class="text-xs text-blue-600 font-bold">View All</button>
        </div>
        <div id="recent-logs" class="space-y-3 pb-24"></div>
    </div>

    <!-- STAFF -->
    <div id="users-page" class="page p-5">
        <h2 class="text-xl font-bold mb-6">Staff Directory</h2>
        <div class="bg-white p-5 rounded-3xl shadow-sm mb-6">
            <input id="u-name" type="text" placeholder="Full Name" class="w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none">
            <input id="u-des" type="text" placeholder="Designation (e.g. Sales, Admin)" class="w-full p-3 mb-4 bg-slate-50 rounded-xl outline-none">
            <input type="hidden" id="u-edit-id">
            <button id="u-btn" onclick="saveUser()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Add Staff</button>
        </div>
        <div id="staff-list" class="space-y-2 pb-24"></div>
    </div>

    <!-- REPORTS (FILTER) -->
    <div id="reports-page" class="page p-5">
        <h2 class="text-xl font-bold mb-6">Advanced Ledger Reports</h2>
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="r-start" class="text-xs bg-slate-50 p-3 rounded-xl outline-none">
                <input type="date" id="r-end" class="text-xs bg-slate-50 p-3 rounded-xl outline-none">
            </div>
            <select id="r-staff" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-xs">
                <option value="">All Staff Members</option>
            </select>
            <button onclick="generateReport()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold text-xs">Generate Report</button>
        </div>

        <div id="report-view" class="pdf-view hidden">
            <div class="flex justify-between border-b pb-2 mb-4">
                <h4 class="font-bold text-xs uppercase">Ledger Export</h4>
                <span id="report-date" class="text-[9px]"></span>
            </div>
            <div id="report-content" class="text-[10px] space-y-2"></div>
            <div class="mt-4 pt-4 border-t space-y-1">
                <div class="flex justify-between font-bold text-green-600"><span>Total Received:</span><span id="rep-inc"></span></div>
                <div class="flex justify-between font-bold text-red-600"><span>Total Distributed:</span><span id="rep-exp"></span></div>
            </div>
        </div>
    </div>

    <!-- NAV -->
    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fas fa-home text-xl text-blue-600"></i></button>
        <button onclick="showPage('users-page')"><i class="fas fa-users text-xl text-slate-300"></i></button>
        <button onclick="showPage('reports-page')"><i class="fas fa-file-invoice-dollar text-xl text-slate-300"></i></button>
        <button onclick="handleLogout()"><i class="fas fa-sign-out-alt text-xl text-slate-300"></i></button>
    </nav>

    <!-- ENTRY MODAL -->
    <div id="modal">
        <div class="modal-content">
            <select id="m-staff" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none font-bold"></select>
            <input id="m-amt" type="number" step="0.01" placeholder="0.00" class="w-full text-4xl font-bold text-center mb-6 outline-none bg-transparent text-blue-600">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select id="m-cat" class="p-4 bg-slate-100 rounded-xl outline-none text-sm">
                    <option>Imprest</option><option>Voucher</option><option>Advance</option><option>Return</option>
                </select>
                <input id="m-date" type="date" class="p-4 bg-slate-100 rounded-xl outline-none text-sm">
            </div>
            <textarea id="m-note" placeholder="Narration..." class="w-full p-4 mb-6 bg-slate-100 rounded-xl outline-none"></textarea>
            <div class="flex gap-2 mb-6">
                <button onclick="setT('income')" id="ti" class="flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400">Received (+)</button>
                <button onclick="setT('expense')" id="te" class="flex-1 p-3 rounded-xl font-bold bg-red-500 text-white">Distributed (-)</button>
            </div>
            <button onclick="postTxn()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">Confirm & Post</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 text-xs">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let currentType = 'expense';
        let staffData = {};
        let logsList = [];

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none';
            if (user) {
                showPage('dashboard-page');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                startSync(user.uid);
            } else {
                showPage('login-page');
                document.getElementById('navbar').classList.add('hidden');
            }
        });

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            setPersistence(auth, browserSessionPersistence).then(() => {
                return signInWithEmailAndPassword(auth, e, p);
            }).catch(err => alert("Login Failed: " + err.message));
        };

        window.handleLogout = () => signOut(auth);

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Update icons color
            document.querySelectorAll('nav button i').forEach(i => i.classList.replace('text-blue-600', 'text-slate-300'));
            const activeBtn = Array.from(document.querySelectorAll('nav button')).find(btn => btn.getAttribute('onclick').includes(id));
            if(activeBtn) activeBtn.querySelector('i').classList.replace('text-slate-300', 'text-blue-600');
        };

        window.saveUser = () => {
            const name = document.getElementById('u-name').value;
            const des = document.getElementById('u-des').value;
            const editId = document.getElementById('u-edit-id').value;
            if(!name || !des) return;

            const path = editId ? `users/${auth.currentUser.uid}/staff/${editId}` : `users/${auth.currentUser.uid}/staff`;
            if(editId) {
                update(ref(db, path), { name: name, desig: des });
            } else {
                push(ref(db, path), { name: name, desig: des, balance: 0 });
            }
            
            document.getElementById('u-name').value = '';
            document.getElementById('u-des').value = '';
            document.getElementById('u-edit-id').value = '';
            document.getElementById('u-btn').innerText = 'Add Staff';
        };

        window.editStaff = (id) => {
            const s = staffData[id];
            document.getElementById('u-name').value = s.name;
            document.getElementById('u-des').value = s.desig;
            document.getElementById('u-edit-id').value = id;
            document.getElementById('u-btn').innerText = 'Update Staff';
        };

        window.deleteStaff = (id) => {
            if(confirm("Delete this staff? This won't delete their past transactions but will remove them from the list.")) {
                remove(ref(db, `users/${auth.currentUser.uid}/staff/${id}`));
            }
        };

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value;
            const amtRaw = document.getElementById('m-amt').value;
            const date = document.getElementById('m-date').value;
            if(!sid || !amtRaw || !date) return alert("Missing info");

            const amt = parseFloat(amtRaw);
            const staff = staffData[sid];
            const newStaffBal = currentType === 'income' ? (parseFloat(staff.balance || 0) + amt) : (parseFloat(staff.balance || 0) - amt);

            const txnData = {
                staffId: sid,
                staffName: staff.name,
                staffDes: staff.desig,
                amount: amt,
                type: currentType,
                date: date,
                cat: document.getElementById('m-cat').value,
                note: document.getElementById('m-note').value,
                balAfter: newStaffBal,
                ts: Date.now()
            };

            push(ref(db, `users/${auth.currentUser.uid}/logs`), txnData);
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: newStaffBal });
            closeModal();
            document.getElementById('m-amt').value = '';
        };

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let h = '', opts = '<option value="">Choose Staff</option>', rOpts = '<option value="">All Staff Members</option>';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    opts += `<option value="${id}">${u.name} (${u.desig})</option>`;
                    rOpts += `<option value="${id}">${u.name}</option>`;
                    h += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${u.name}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${u.desig}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <p class="font-bold text-blue-600">$${parseFloat(u.balance || 0).toFixed(2)}</p>
                            <button onclick="editStaff('${id}')" class="text-slate-300 text-xs"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteStaff('${id}')" class="text-red-200 text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                });
                document.getElementById('staff-list').innerHTML = h;
                document.getElementById('m-staff').innerHTML = opts;
                document.getElementById('r-staff').innerHTML = rOpts;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logsList = Object.keys(data).map(k => data[k]).sort((a,b) => b.ts - a.ts);
                renderHome();
            });
        }

        function renderHome() {
            const now = new Date();
            const curMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            
            let totalInc = 0, totalExp = 0, overallInc = 0, overallExp = 0;
            let recentH = '';

            logsList.forEach((l, idx) => {
                const amt = parseFloat(l.amount);
                // Central Balance math (all time)
                if(l.type === 'income') overallInc += amt; else overallExp += amt;

                // Month specific
                if(l.date.startsWith(curMonth)) {
                    if(l.type === 'income') totalInc += amt; else totalExp += amt;
                }

                // Show only 3 recent
                if(idx < 3) {
                    recentH += `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${l.type==='income'?'border-green-500':'border-red-500'}">
                        <div class="flex justify-between">
                            <span class="font-bold text-slate-800 text-sm">${l.staffName}</span>
                            <span class="font-bold ${l.type==='income'?'text-green-500':'text-red-500'}">${l.type==='income'?'+':'-'}$${amt.toFixed(2)}</span>
                        </div>
                        <p class="text-[10px] text-slate-400 italic mt-1">${l.note || l.cat}</p>
                    </div>`;
                }
            });

            document.getElementById('cb-display').innerText = `$${(overallInc - overallExp).toFixed(2)}`;
            document.getElementById('inc-display').innerText = `$${totalInc.toFixed(2)}`;
            document.getElementById('exp-display').innerText = `$${totalExp.toFixed(2)}`;
            document.getElementById('recent-logs').innerHTML = recentH || '<p class="text-center text-slate-300 text-xs py-5">No transactions</p>';
        }

        window.generateReport = () => {
            const start = document.getElementById('r-start').value;
            const end = document.getElementById('r-end').value;
            const staffId = document.getElementById('r-staff').value;
            
            let h = '', ti = 0, te = 0;
            logsList.filter(l => {
                let match = true;
                if(start && l.date < start) match = false;
                if(end && l.date > end) match = false;
                if(staffId && l.staffId !== staffId) match = false;
                return match;
            }).forEach(l => {
                const amt = parseFloat(l.amount);
                if(l.type === 'income') ti += amt; else te += amt;
                h += `<div class="flex justify-between border-b border-slate-50 py-1">
                    <span>${l.date} - ${l.staffName} (${l.cat})</span>
                    <span class="${l.type==='income'?'text-green-600':'text-red-600'}">${l.type==='income'?'+':'-'}${amt.toFixed(2)}</span>
                </div>`;
            });

            document.getElementById('report-view').classList.remove('hidden');
            document.getElementById('report-content').innerHTML = h || 'No records match filters';
            document.getElementById('rep-inc').innerText = `$${ti.toFixed(2)}`;
            document.getElementById('rep-exp').innerText = `$${te.toFixed(2)}`;
            document.getElementById('report-date').innerText = new Date().toLocaleString();
        };

        window.openModal = () => { document.getElementById('modal').classList.add('active'); document.getElementById('m-date').valueAsDate = new Date(); };
        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        window.setT = (t) => {
            currentType = t;
            document.getElementById('ti').className = t === 'income' ? 'flex-1 p-3 rounded-xl font-bold bg-green-500 text-white' : 'flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('te').className = t === 'expense' ? 'flex-1 p-3 rounded-xl font-bold bg-red-500 text-white' : 'flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400';
        };
    </script>
</body>
</html>
