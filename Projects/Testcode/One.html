<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .app-card { border-radius: 28px; transition: all 0.3s ease; }
        .page { display: none; min-height: 100vh; width: 100%; padding-bottom: 100px; }
        .page.active { display: flex !important; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #f1f5f9; z-index: 50; display: flex; justify-content: space-around; padding: 15px; }
        .nav-btn { color: #cbd5e1; transition: all 0.2s; flex: 1; text-align: center; }
        .nav-btn.active { color: #2563eb; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
        #modal.active { display: flex; }
        .modal-content { animation: slideUp 0.3s ease-out; background: white; w-full; rounded-t-[40px]; p-8; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- 🔐 LOGIN PAGE -->
    <div id="login-page" class="page items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 mx-auto flex items-center justify-center shadow-lg"><i class="fas fa-vault text-white text-2xl"></i></div>
            <h2 class="text-3xl font-bold mb-8">Secure Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Sign In</button>
        </div>
    </div>

    <!-- 🏠 DASHBOARD PAGE -->
    <div id="dashboard-page" class="page p-5">
        <div class="flex justify-between items-center mb-8 pt-4">
            <h1 class="font-bold text-xl text-blue-600">FinanceFlow</h1>
            <button onclick="logout()" class="text-slate-300"><i class="fas fa-power-off text-xl"></i></button>
        </div>

        <div id="balance-card" class="bg-blue-600 app-card p-8 text-white shadow-xl mb-6 text-center">
            <p class="opacity-70 text-[10px] font-bold uppercase tracking-widest mb-1">Total Balance</p>
            <h2 class="text-4xl font-bold mb-6" id="total-balance">$0.00</h2>
            <button onclick="openModal('txn')" class="bg-white text-blue-600 px-6 py-2 rounded-xl font-bold text-sm">+ Add Entry</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-white p-4 app-card border border-slate-100"><p class="text-[10px] text-green-500 font-bold uppercase">Income</p><h3 id="total-income" class="font-bold">$0</h3></div>
            <div class="bg-white p-4 app-card border border-slate-100"><p class="text-[10px] text-red-500 font-bold uppercase">Expense</p><h3 id="total-expense" class="font-bold">$0</h3></div>
        </div>

        <h3 class="font-bold mb-4 text-slate-700">Recent Activity</h3>
        <div id="txn-container" class="space-y-3"></div>
    </div>

    <!-- 📚 DUES PAGE -->
    <div id="dues-page" class="page p-5">
        <h2 class="text-2xl font-bold mb-6 pt-4">Dues & Debts</h2>
        
        <div class="bg-slate-800 app-card p-6 text-white mb-6 flex justify-between items-center">
            <div><p class="opacity-60 text-[10px] font-bold uppercase">Net Debt</p><h2 id="net-due" class="text-2xl font-bold">$0.00</h2></div>
            <button onclick="openModal('due')" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">+ New Due</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-4 app-card border border-slate-100"><p class="text-[10px] text-blue-500 font-bold uppercase">To Receive</p><h3 id="total-receive" class="font-bold text-lg text-slate-700">$0</h3></div>
            <div class="bg-white p-4 app-card border border-slate-100"><p class="text-[10px] text-orange-500 font-bold uppercase">To Pay</p><h3 id="total-pay" class="font-bold text-lg text-slate-700">$0</h3></div>
        </div>

        <div id="due-container" class="space-y-3"></div>
    </div>

    <!-- ➕ GLOBAL MODAL -->
    <div id="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content w-full">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-center">Add Item</h3>
            <input id="m-amount" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center outline-none text-blue-600 mb-6">
            <input id="m-note" type="text" placeholder="Description / Person Name" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            
            <div id="m-type-container" class="flex gap-2 mb-8">
                <button onclick="setMType('primary')" id="m-btn-1" class="flex-1 p-4 rounded-2xl font-bold bg-blue-600 text-white">Type 1</button>
                <button onclick="setMType('secondary')" id="m-btn-2" class="flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400">Type 2</button>
            </div>
            <button onclick="saveItem()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">Confirm</button>
        </div>
    </div>

    <!-- 📱 NAV -->
    <nav id="main-nav" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')" class="nav-btn active" id="nav-home"><i class="fas fa-house text-xl"></i></button>
        <button onclick="showPage('dues-page')" class="nav-btn" id="nav-dues"><i class="fas fa-address-book text-xl"></i></button>
        <button onclick="logout()" class="nav-btn"><i class="fas fa-right-from-bracket text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeMode = 'txn'; // 'txn' or 'due'
        let selectedType = 'expense'; // expense/income OR receive/pay

        // --- Auth & Nav ---
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard-page') document.getElementById('nav-home').classList.add('active');
            if(id === 'dues-page') document.getElementById('nav-dues').classList.add('active');
        };

        window.handleLogin = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        };
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, user => {
            if (user) {
                showPage('dashboard-page');
                document.getElementById('main-nav').classList.remove('hidden');
                loadData(user.uid, 'transactions', 'txn-container');
                loadData(user.uid, 'dues', 'due-container');
            } else {
                showPage('login-page');
                document.getElementById('main-nav').classList.add('hidden');
            }
        });

        // --- Modal Logic ---
        window.openModal = (mode) => {
            activeMode = mode;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modal-title').innerText = mode === 'txn' ? 'Add Transaction' : 'Add Due/Debt';
            
            if(mode === 'txn') {
                updateMButtons('Income', 'Expense', 'income', 'expense');
            } else {
                updateMButtons('To Receive', 'To Pay', 'receive', 'pay');
            }
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');

        function updateMButtons(t1, t2, v1, v2) {
            const b1 = document.getElementById('m-btn-1'), b2 = document.getElementById('m-btn-2');
            b1.innerText = t1; b2.innerText = t2;
            window.setMType = (type) => {
                selectedType = type === 'primary' ? v1 : v2;
                b1.className = type === 'primary' ? 'flex-1 p-4 rounded-2xl font-bold bg-blue-600 text-white' : 'flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
                b2.className = type === 'secondary' ? 'flex-1 p-4 rounded-2xl font-bold bg-blue-600 text-white' : 'flex-1 p-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
            };
            setMType('secondary'); // Default to Expense or Pay
        }

        window.saveItem = () => {
            const amt = parseFloat(document.getElementById('m-amount').value);
            const note = document.getElementById('m-note').value;
            if(!amt || !note) return alert("Fill all fields");

            const path = activeMode === 'txn' ? 'transactions' : 'dues';
            push(ref(db, `users/${auth.currentUser.uid}/${path}`), {
                amount: amt, narration: note, type: selectedType, timestamp: serverTimestamp()
            }).then(() => {
                closeModal();
                document.getElementById('m-amount').value = '';
                document.getElementById('m-note').value = '';
            });
        };

        window.deleteItem = (id, path) => {
            if(confirm("Delete this item?")) remove(ref(db, `users/${auth.currentUser.uid}/${path}/${id}`));
        };

        function loadData(uid, path, containerId) {
            onValue(ref(db, `users/${uid}/${path}`), (s) => {
                const data = s.val();
                let html = '', totalA = 0, totalB = 0;
                if(data) {
                    Object.keys(data).reverse().forEach(key => {
                        const item = data[key];
                        const isPos = item.type === 'income' || item.type === 'receive';
                        isPos ? totalA += item.amount : totalB += item.amount;
                        
                        html += `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                            <div><p class="font-bold text-sm text-slate-700">${item.narration}</p><p class="text-[9px] font-bold uppercase text-slate-400">${item.type}</p></div>
                            <div class="flex items-center gap-3">
                                <p class="font-bold ${isPos ? 'text-green-500' : 'text-red-500'}">${isPos?'+':'-'}$${item.amount}</p>
                                <button onclick="deleteItem('${key}', '${path}')" class="text-slate-200"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById(containerId).innerHTML = html || '<p class="text-center text-slate-300 py-10">No records</p>';
                
                if(path === 'transactions') {
                    document.getElementById('total-balance').innerText = `$${(totalA - totalB).toFixed(2)}`;
                    document.getElementById('total-income').innerText = `$${totalA}`;
                    document.getElementById('total-expense').innerText = `$${totalB}`;
                } else {
                    document.getElementById('net-due').innerText = `$${(totalA - totalB).toFixed(2)}`;
                    document.getElementById('total-receive').innerText = `$${totalA}`;
                    document.getElementById('total-pay').innerText = `$${totalB}`;
                }
            });
        }
    </script>
</body>
</html>
