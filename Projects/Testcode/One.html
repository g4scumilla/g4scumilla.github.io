<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        
        /* 🛡️ STOPS THE FLICKER: All pages hidden by default */
        .page { display: none !important; min-height: 100vh; }
        .page.active { display: block !important; }
        
        #auth-guard { 
            position: fixed; inset: 0; background: white; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #f1f5f9; z-index: 50; display: flex; justify-content: space-around; padding: 15px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        #modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 40px; border-top-right-radius: 40px; padding: 32px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <!-- ⏳ LOADING OVERLAY -->
    <div id="auth-guard">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-600 mb-4"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Verifying Session...</p>
        </div>
    </div>

    <!-- 🔐 LOGIN PAGE -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 mx-auto flex items-center justify-center shadow-lg"><i class="fas fa-lock text-white text-2xl"></i></div>
            <h2 class="text-2xl font-bold mb-8 text-slate-800">Staff Ledger Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">Login</button>
        </div>
    </div>

    <!-- 🏠 DASHBOARD -->
    <div id="dashboard-page" class="page p-5">
        <div class="flex justify-between items-center mb-6 mt-2">
            <h1 class="text-xl font-bold text-slate-800">Dashboard</h1>
            <p id="user-display" class="text-[10px] font-bold text-blue-500"></p>
        </div>

        <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl mb-6">
            <p class="opacity-70 text-[10px] font-bold uppercase mb-1">Central Balance</p>
            <h2 class="text-4xl font-bold mb-4" id="cb-display">$0.00</h2>
            <button onclick="openModal()" class="w-full bg-white/20 py-3 rounded-2xl text-xs font-bold">+ New Entry</button>
        </div>

        <!-- DATE FILTER -->
        <div class="bg-white p-4 rounded-3xl shadow-sm mb-6 flex items-center gap-3">
            <input type="date" id="f-start" onchange="refreshData()" class="flex-1 text-xs bg-slate-50 p-2 rounded-xl outline-none">
            <input type="date" id="f-end" onchange="refreshData()" class="flex-1 text-xs bg-slate-50 p-2 rounded-xl outline-none">
            <button onclick="clearF()" class="text-blue-600 px-2"><i class="fas fa-sync"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-50"><p class="text-[10px] text-green-500 font-bold uppercase">Income</p><h3 id="inc-display" class="font-bold">$0</h3></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-red-50"><p class="text-[10px] text-red-500 font-bold uppercase">Expense</p><h3 id="exp-display" class="font-bold">$0</h3></div>
        </div>

        <input id="search" type="text" onkeyup="refreshData()" placeholder="Search staff..." class="w-full p-3 mb-4 bg-white rounded-xl text-xs shadow-sm outline-none">
        <div id="log-container" class="space-y-3"></div>
    </div>

    <!-- 👥 STAFF PAGE -->
    <div id="users-page" class="page p-5">
        <h2 class="text-xl font-bold mb-6">Staff Directory</h2>
        <div class="bg-white p-5 rounded-3xl shadow-sm mb-6">
            <input id="u-name" type="text" placeholder="Name" class="w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none">
            <input id="u-des" type="text" placeholder="Designation" class="w-full p-3 mb-4 bg-slate-50 rounded-xl outline-none">
            <button id="u-btn" onclick="saveUser()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Add Staff</button>
        </div>
        <div id="staff-list" class="space-y-2"></div>
    </div>

    <!-- 📱 NAVIGATION -->
    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fas fa-home text-xl text-blue-600"></i></button>
        <button onclick="showPage('users-page')"><i class="fas fa-users text-xl text-slate-300"></i></button>
        <button onclick="handleLogout()"><i class="fas fa-sign-out-alt text-xl text-slate-300"></i></button>
    </nav>

    <!-- ➕ ENTRY MODAL -->
    <div id="modal">
        <div class="modal-content">
            <select id="m-staff" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none font-bold"></select>
            <input id="m-amt" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center mb-6 outline-none bg-transparent text-blue-600">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select id="m-cat" class="p-4 bg-slate-100 rounded-xl outline-none text-sm">
                    <option>Imprest</option><option>Voucher</option><option>Advance</option><option>Return</option><option>Other</option>
                </select>
                <input id="m-date" type="date" class="p-4 bg-slate-100 rounded-xl outline-none text-sm">
            </div>
            <textarea id="m-note" placeholder="Narration..." class="w-full p-4 mb-6 bg-slate-100 rounded-xl outline-none"></textarea>
            <div class="flex gap-2 mb-6">
                <button onclick="setT('income')" id="ti" class="flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400">Income</button>
                <button onclick="setT('expense')" id="te" class="flex-1 p-3 rounded-xl font-bold bg-red-500 text-white">Expense</button>
            </div>
            <button onclick="postTxn()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Post Transaction</button>
            <button onclick="closeModal()" class="w-full mt-2 text-slate-400 text-xs py-2">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let type = 'expense';
        let staffData = {};
        let logs = [];
        let editId = null;

        // --- AUTH LOGIC (The Fix) ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none'; // Remove loading
            
            // Hide everything first
            document.getElementById('login-page').classList.remove('active');
            document.getElementById('dashboard-page').classList.remove('active');
            document.getElementById('users-page').classList.remove('active');
            document.getElementById('navbar').classList.add('hidden');

            if (user) {
                document.getElementById('dashboard-page').classList.add('active');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                startListeners(user.uid);
            } else {
                document.getElementById('login-page').classList.add('active');
            }
        });

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            // Force persistence before login
            setPersistence(auth, browserSessionPersistence).then(() => {
                return signInWithEmailAndPassword(auth, e, p);
            }).catch(err => alert(err.message));
        };

        window.handleLogout = () => signOut(auth);

        // --- STAFF & TXN LOGIC ---
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.saveUser = () => {
            const n = document.getElementById('u-name').value;
            const d = document.getElementById('u-des').value;
            if(!n || !d) return;
            if(editId) {
                update(ref(db, `users/${auth.currentUser.uid}/staff/${editId}`), { name: n, desig: d });
                editId = null;
                document.getElementById('u-btn').innerText = "Add Staff";
            } else {
                push(ref(db, `users/${auth.currentUser.uid}/staff`), { name: n, desig: d, balance: 0 });
            }
            document.getElementById('u-name').value = ''; document.getElementById('u-des').value = '';
        };

        window.openModal = () => { document.getElementById('modal').classList.add('active'); document.getElementById('m-date').valueAsDate = new Date(); };
        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        window.setT = (t) => {
            type = t;
            document.getElementById('ti').className = t === 'income' ? 'flex-1 p-3 rounded-xl font-bold bg-green-500 text-white' : 'flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('te').className = t === 'expense' ? 'flex-1 p-3 rounded-xl font-bold bg-red-500 text-white' : 'flex-1 p-3 rounded-xl font-bold bg-slate-100 text-slate-400';
        };

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value;
            const amt = parseFloat(document.getElementById('m-amt').value);
            if(!sid || !amt) return;
            const s = staffData[sid];
            const newBal = type === 'income' ? s.balance + amt : s.balance - amt;

            push(ref(db, `users/${auth.currentUser.uid}/logs`), {
                staffName: s.name, staffDes: s.desig, amount: amt, 
                type: type, date: document.getElementById('m-date').value,
                cat: document.getElementById('m-cat').value, note: document.getElementById('m-note').value,
                balAfter: newBal
            });
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: newBal });
            closeModal();
        };

        function startListeners(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let h = '', opts = '';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    opts += `<option value="${id}">${u.name}</option>`;
                    h += `<div class="bg-white p-4 rounded-2xl flex justify-between shadow-sm border border-slate-50">
                        <div><p class="font-bold text-sm">${u.name}</p><p class="text-[9px] text-slate-400">${u.desig}</p></div>
                        <div class="flex items-center gap-3">
                            <p class="font-bold text-blue-600 text-sm">$${u.balance.toFixed(2)}</p>
                            <button onclick="editU('${id}','${u.name}','${u.desig}')"><i class="fas fa-edit text-slate-300"></i></button>
                            <button onclick="delU('${id}')"><i class="fas fa-trash text-red-200"></i></button>
                        </div>
                    </div>`;
                });
                document.getElementById('staff-list').innerHTML = h;
                document.getElementById('m-staff').innerHTML = opts;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logs = Object.keys(data).reverse().map(k => data[k]);
                refreshData();
            });
        }

        window.editU = (id, n, d) => { editId = id; document.getElementById('u-name').value = n; document.getElementById('u-des').value = d; document.getElementById('u-btn').innerText = "Update"; };
        window.delU = (id) => confirm("Delete staff?") && remove(ref(db, `users/${auth.currentUser.uid}/staff/${id}`));
        window.clearF = () => { document.getElementById('f-start').value = ''; document.getElementById('f-end').value = ''; refreshData(); };

        window.refreshData = () => {
            const start = document.getElementById('f-start').value;
            const end = document.getElementById('f-end').value;
            const q = document.getElementById('search').value.toLowerCase();
            let h = '', iTotal = 0, eTotal = 0;

            logs.forEach(l => {
                if(start && l.date < start) return;
                if(end && l.date > end) return;
                if(q && !l.staffName.toLowerCase().includes(q)) return;

                l.type === 'income' ? iTotal += l.amount : eTotal += l.amount;
                h += `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${l.type==='income'?'border-green-500':'border-red-500'}">
                    <div class="flex justify-between">
                        <p class="font-bold text-slate-800 text-sm">${l.staffName}</p>
                        <p class="font-bold ${l.type==='income'?'text-green-500':'text-red-500'}">${l.type==='income'?'+':'-'}$${l.amount.toFixed(2)}</p>
                    </div>
                    <p class="text-[10px] text-slate-400 mb-2">${l.note || l.cat}</p>
                    <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase pt-2 border-t border-slate-50">
                        <span>${l.date}</span><span>Bal: $${l.balAfter.toFixed(2)}</span>
                    </div>
                </div>`;
            });
            document.getElementById('log-container').innerHTML = h;
            document.getElementById('cb-display').innerText = `$${(iTotal - eTotal).toFixed(2)}`;
            document.getElementById('inc-display').innerText = `$${iTotal.toFixed(2)}`;
            document.getElementById('exp-display').innerText = `$${eTotal.toFixed(2)}`;
        };
    </script>
</body>
</html>
