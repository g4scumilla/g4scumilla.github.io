<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F1F5F9; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        #modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl"><i class="fas fa-vault"></i></div>
            <h2 class="text-2xl font-bold mb-2">FinanceFlow Pro</h2>
            <p class="text-slate-400 text-xs mb-8">Management Ledger (BDT)</p>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-8 mt-2">
            <div>
                <p class="text-xs text-slate-400 font-medium">Account Overview</p>
                <h1 class="text-lg font-bold text-slate-800" id="user-display">Administrator</h1>
            </div>
            <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-blue-600"><i class="fas fa-bell"></i></div>
        </div>

        <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-[32px] p-8 text-white shadow-xl mb-8 relative overflow-hidden">
            <p class="opacity-70 text-[10px] font-bold uppercase tracking-wider mb-1">Central Balance</p>
            <h2 class="text-4xl font-bold mb-6 tracking-tight" id="cb-display">৳0.00</h2>
            <button onclick="openModal()" class="w-full bg-white text-blue-600 py-3.5 rounded-2xl text-xs font-bold shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Quick Entry
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Received</p>
                <h3 id="inc-display" class="font-bold text-lg text-green-600">৳0.00</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Advanced</p>
                <h3 id="exp-display" class="font-bold text-lg text-orange-600">৳0.00</h3>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 tracking-tight mb-4">Last 3 Transactions</h3>
        <div id="recent-logs" class="space-y-4"></div>
    </div>

    <!-- STAFF DIRECTORY -->
    <div id="users-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Staff</h2>
            <button onclick="toggleAddStaff()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">+ Add Staff</button>
        </div>
        
        <div id="add-staff-form" class="hidden bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 mb-8">
            <input id="u-name" type="text" placeholder="Full Name" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl outline-none">
            <input id="u-des" type="text" placeholder="Designation" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl outline-none">
            <input type="hidden" id="u-edit-id">
            <button id="u-btn" onclick="saveUser()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold text-sm">Save Staff Record</button>
        </div>

        <div id="staff-list" class="space-y-4"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Settings</h2>
        <div class="bg-white rounded-[32px] overflow-hidden border border-slate-100">
            <div class="p-6 border-b border-slate-50 flex items-center justify-between">
                <span>Currency Display</span>
                <span class="font-bold text-blue-600">BDT (৳)</span>
            </div>
            <div class="p-6 border-b border-slate-50 flex items-center justify-between">
                <span>Negative Notation</span>
                <span class="font-bold text-slate-400">(Accounting)</span>
            </div>
            <button onclick="handleLogout()" class="w-full p-6 text-left text-red-500 font-bold flex items-center gap-3">
                <i class="fas fa-power-off"></i> Sign Out
            </button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')" class="flex flex-col items-center gap-1">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[8px] font-bold">Home</span>
        </button>
        <button onclick="showPage('users-page')" class="flex flex-col items-center gap-1">
            <i class="fas fa-users text-lg"></i>
            <span class="text-[8px] font-bold">Staff</span>
        </button>
        <button onclick="showPage('settings-page')" class="flex flex-col items-center gap-1">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[8px] font-bold">Settings</span>
        </button>
    </nav>

    <!-- ENTRY MODAL -->
    <div id="modal">
        <div class="modal-content">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <select id="m-staff" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700"></select>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">৳</span>
                <input id="m-amt" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center py-4 outline-none bg-transparent text-blue-600">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="m-cat" class="p-4 bg-slate-50 rounded-xl outline-none text-xs font-bold"><option>Imprest</option><option>Advance</option><option>Return</option></select>
                <input id="m-date" type="date" class="p-4 bg-slate-50 rounded-xl outline-none text-xs">
            </div>
            <textarea id="m-note" placeholder="Narration" class="w-full p-4 mb-6 bg-slate-50 rounded-xl outline-none h-20 text-xs"></textarea>
            <div class="flex gap-3 mb-6">
                <button onclick="setT('income')" id="ti" class="flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400">Received (+)</button>
                <button onclick="setT('expense')" id="te" class="flex-1 py-4 rounded-2xl font-bold bg-orange-500 text-white">Advanced (-)</button>
            </div>
            <button onclick="postTxn()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Confirm</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let currentType = 'expense';
        let staffData = {};
        let logsList = [];

        // Formatting Helpers
        const fmt = (num) => {
            const val = Number(Math.abs(num)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            return num < 0 ? `(৳${val})` : `৳${val}`;
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none';
            if (user) {
                showPage('dashboard-page');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0];
                startSync(user.uid);
            } else {
                showPage('login-page');
                document.getElementById('navbar').classList.add('hidden');
            }
        });

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            setPersistence(auth, browserSessionPersistence).then(() => {
                return signInWithEmailAndPassword(auth, e, p);
            }).catch(() => alert("Access Denied"));
        };

        window.handleLogout = () => signOut(auth);

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Fix Navigation Active State
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-slate-300');
                btn.querySelector('i').className = btn.querySelector('i').className.replace('text-blue-600', '');
            });
            
            const activeBtn = Array.from(document.querySelectorAll('nav button')).find(btn => btn.getAttribute('onclick').includes(id));
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-300');
                activeBtn.classList.add('text-blue-600');
            }
        };

        window.toggleAddStaff = () => {
            const el = document.getElementById('add-staff-form');
            el.classList.toggle('hidden');
        };

        window.saveUser = () => {
            const name = document.getElementById('u-name').value;
            const des = document.getElementById('u-des').value;
            if(!name || !des) return;
            push(ref(db, `users/${auth.currentUser.uid}/staff`), { name, desig: des, balance: 0 });
            document.getElementById('u-name').value = '';
            document.getElementById('u-des').value = '';
            toggleAddStaff();
        };

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value;
            const amtRaw = document.getElementById('m-amt').value;
            const date = document.getElementById('m-date').value;
            if(!sid || !amtRaw || !date) return alert("Fill all fields");

            const amt = Number(amtRaw);
            const staff = staffData[sid];
            const newStaffBal = currentType === 'income' ? (Number(staff.balance || 0) + amt) : (Number(staff.balance || 0) - amt);

            push(ref(db, `users/${auth.currentUser.uid}/logs`), {
                staffId: sid, staffName: staff.name,
                amount: amt, type: currentType, date,
                cat: document.getElementById('m-cat').value,
                note: document.getElementById('m-note').value,
                ts: Date.now() // Precise timestamp for sorting
            });
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: newStaffBal });
            closeModal();
        };

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let h = '', opts = '<option value="">Select Staff</option>';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    const bal = Number(u.balance || 0);
                    const balLabel = bal >= 0 ? "Receivable" : "Payable";
                    
                    opts += `<option value="${id}">${u.name}</option>`;
                    h += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">${u.name}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${u.desig}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] text-slate-400 font-bold uppercase">${balLabel}</p>
                            <p class="font-bold ${bal >= 0 ? 'text-blue-600' : 'text-orange-600'}">${fmt(bal)}</p>
                        </div>
                    </div>`;
                });
                document.getElementById('staff-list').innerHTML = h || '<p class="text-center text-slate-300 py-10">No Staff</p>';
                document.getElementById('m-staff').innerHTML = opts;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logsList = Object.keys(data).map(k => ({...data[k], key: k}));
                renderHome();
            });
        }

        function renderHome() {
            let tInc = 0, tExp = 0, cb = 0;
            
            // 1. Sort logs by timestamp (highest/newest first)
            // Fallback to 0 if ts is missing to avoid NaN sorting errors
            const sorted = [...logsList].sort((a, b) => (Number(b.ts || 0)) - (Number(a.ts || 0)));
            
            // 2. Calculate totals using original list
            logsList.forEach(l => {
                const a = Number(l.amount);
                if(l.type === 'income') { cb += a; tInc += a; } 
                else { cb -= a; tExp += a; }
            });

            document.getElementById('cb-display').innerText = fmt(cb);
            document.getElementById('inc-display').innerText = fmt(tInc);
            document.getElementById('exp-display').innerText = fmt(tExp);

            // 3. Render the 3 most recent transactions from the SORTED array
            let recentH = '';
            sorted.slice(0, 3).forEach(l => {
                const isInc = l.type === 'income';
                recentH += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-xs">${l.staffName}</p>
                        <p class="text-[9px] text-slate-400">${l.note || l.cat}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm ${isInc ? 'text-green-600' : 'text-orange-600'}">
                            ${isInc ? '+' : '-'}${fmt(l.amount)}
                        </p>
                        <p class="text-[8px] text-slate-300 font-bold">${l.date}</p>
                    </div>
                </div>`;
            });
            document.getElementById('recent-logs').innerHTML = recentH || '<p class="text-center text-slate-300 py-5">No Transactions</p>';
        }

        window.openModal = () => { 
            document.getElementById('modal').classList.add('active'); 
            document.getElementById('m-date').valueAsDate = new Date(); 
            document.getElementById('m-amt').value = '';
            document.getElementById('m-note').value = '';
        };
        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        window.setT = (t) => {
            currentType = t;
            document.getElementById('ti').className = t === 'income' ? 'flex-1 py-4 rounded-2xl font-bold bg-green-500 text-white shadow-lg' : 'flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('te').className = t === 'expense' ? 'flex-1 py-4 rounded-2xl font-bold bg-orange-500 text-white shadow-lg' : 'flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
        };
    </script>
</body>
</html>
