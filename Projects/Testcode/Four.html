<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .debit-card {
            aspect-ratio: 1.58 / 1;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.85) 0%, rgba(15, 118, 110, 0.9) 100%), 
                        url('https://www.everypixel.com/image-298449078311892583');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .staff-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-radius: 20px; color: white; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <h2 class="text-2xl font-bold mb-8">FinanceFlow Pro</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6 mt-2">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">System Operator</p>
                <h1 class="text-lg font-bold text-slate-800" id="user-display">Administrator</h1>
            </div>
            <button onclick="openModal('entry-modal')" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-plus"></i></button>
        </div>

        <div class="debit-card p-8 text-white mb-6 flex flex-col justify-between">
            <div class="z-10">
                <p class="text-[10px] font-bold uppercase mb-1">Central Balance Ledger</p>
                <h2 class="text-3xl font-bold" id="cb-display">0.00</h2>
            </div>
            <div class="flex justify-between items-end z-10">
                <p class="text-xs font-bold tracking-widest">ACTIVE SESSION</p>
                <p class="text-xs font-bold" id="card-curr-label">BDT</p>
            </div>
        </div>

        <!-- MONTHLY SUMMARY -->
        <div class="mb-8">
            <h3 class="font-bold text-slate-800 tracking-tight mb-3 px-1 text-sm uppercase" id="month-label">May 2026</h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-[8px] font-bold text-teal-600 uppercase mb-1">Total Received</p>
                    <p class="text-sm font-bold text-slate-800" id="month-received">0.00</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-[8px] font-bold text-orange-600 uppercase mb-1">Total Advanced</p>
                    <p class="text-sm font-bold text-slate-800" id="month-advanced">0.00</p>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 px-1">Recent Activity</h3>
        <div id="recent-logs" class="space-y-3"></div>
    </div>

    <!-- STAFF DIRECTORY -->
    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Staff Directory</h2>
        <div id="staff-list" class="grid gap-6"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Settings</h2>
        <div class="space-y-4">
            <div class="bg-white rounded-[24px] p-4 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Currency</p>
                <select id="curr-select" onchange="updateCurrencyFormat(this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm font-bold">
                    <option value="text">BDT (Text)</option>
                    <option value="sign">৳ (Sign)</option>
                    <option value="usd">USD ($)</option>
                </select>
            </div>
            <button onclick="openModal('staff-mgmt-modal')" class="w-full p-4 bg-white rounded-xl text-left font-semibold flex justify-between">Staff Management <i class="fas fa-chevron-right text-slate-300"></i></button>
            <button onclick="openModal('txn-mgmt-modal')" class="w-full p-4 bg-white rounded-xl text-left font-semibold flex justify-between">Transaction History <i class="fas fa-chevron-right text-slate-300"></i></button>
            <button onclick="handleLogout()" class="w-full p-5 bg-red-50 text-red-600 font-bold rounded-[24px]">Sign Out</button>
        </div>
    </div>

    <!-- MODALS -->
    <div id="entry-modal" class="modal"><div class="modal-content"><select id="m-staff" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl outline-none font-bold"></select><input id="m-amt" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center py-4 bg-transparent text-teal-600 outline-none"><div class="grid grid-cols-2 gap-3 mb-4"><select id="m-cat" class="p-4 bg-slate-50 rounded-xl outline-none text-xs font-bold"><option>Imprest</option><option>Advance</option><option>Return</option></select><input id="m-date" type="date" class="p-4 bg-slate-50 rounded-xl outline-none text-xs"></div><textarea id="m-note" placeholder="Narration" class="w-full p-4 mb-6 bg-slate-50 rounded-xl outline-none h-20 text-xs"></textarea><div class="flex gap-3 mb-6"><button onclick="setT('income')" id="ti" class="flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400">Receive (+)</button><button onclick="setT('expense')" id="te" class="flex-1 py-4 rounded-2xl font-bold bg-orange-500 text-white">Advance (-)</button></div><button onclick="postTxn()" class="w-full bg-teal-600 text-white p-4 rounded-2xl font-bold">Post Entry</button><button onclick="closeModal('entry-modal')" class="w-full mt-4 text-slate-400 text-[10px] font-bold uppercase">Cancel</button></div></div>
    
    <div id="staff-mgmt-modal" class="modal"><div class="modal-content"><h3 class="font-bold mb-4">Staff Settings</h3><input id="u-name" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none mb-2"><input id="u-des" type="text" placeholder="Designation" class="w-full p-4 bg-slate-50 rounded-2xl outline-none mb-4"><button onclick="saveUser()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold mb-6">Add Staff</button><div id="mgmt-staff-list" class="space-y-2"></div><button onclick="closeModal('staff-mgmt-modal')" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase">Close</button></div></div>

    <div id="txn-mgmt-modal" class="modal"><div class="modal-content"><h3 class="font-bold mb-4">All Transaction History</h3><div id="mgmt-txn-list" class="space-y-3"></div><button onclick="closeModal('txn-mgmt-modal')" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase">Close</button></div></div>

    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')"><i class="fas fa-home"></i><p class="text-[8px] font-bold">HOME</p></button>
        <button onclick="showPage('users-page')"><i class="fas fa-users"></i><p class="text-[8px] font-bold">STAFF</p></button>
        <button onclick="showPage('settings-page')"><i class="fas fa-cog"></i><p class="text-[8px] font-bold">SETTINGS</p></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-QHFieDKhSY_dZZfcpM5sl8b8m7zP_js",
            authDomain: "myfinanceapp-e0be3.firebaseapp.com",
            databaseURL: "https://myfinanceapp-e0be3-default-rtdb.firebaseio.com",
            projectId: "myfinanceapp-e0be3",
            storageBucket: "myfinanceapp-e0be3.firebasestorage.app",
            messagingSenderId: "335278709493",
            appId: "1:335278709493:web:ec6e0994ce2b07ffd103bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let currentType = 'expense';
        let staffData = {};
        let logsList = [];
        let currFormat = 'text';

        const fmt = (num) => {
            const val = Math.abs(num || 0).toLocaleString('en-BD', {minimumFractionDigits: 2});
            if(currFormat === 'sign') return num < 0 ? `(৳${val})` : `৳${val}`;
            if(currFormat === 'usd') return num < 0 ? `($${val})` : `$${val}`;
            return num < 0 ? `(BDT ${val})` : `BDT ${val}`;
        };

        window.updateCurrencyFormat = (val) => {
            currFormat = val;
            document.getElementById('card-curr-label').innerText = val.toUpperCase();
            renderHome();
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-guard').style.display = 'none';
            if (user) {
                showPage('dashboard-page');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0];
                startSync(user.uid);
            } else {
                showPage('login-page');
                document.getElementById('navbar').classList.add('hidden');
            }
        });

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error"));
        };

        window.handleLogout = () => signOut(auth);
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.openModal = (id) => {
            document.getElementById(id).classList.add('active');
            if(id === 'entry-modal') document.getElementById('m-date').valueAsDate = new Date();
        };
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.saveUser = () => {
            const name = document.getElementById('u-name').value;
            const des = document.getElementById('u-des').value;
            if(!name) return;
            push(ref(db, `users/${auth.currentUser.uid}/staff`), { name, desig: des, balance: 0 });
            document.getElementById('u-name').value = '';
            document.getElementById('u-des').value = '';
        };

        window.delUser = (sid) => confirm("Delete staff?") && remove(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`));
        
        window.delTxn = (tid, sid, amt, type) => {
            if(confirm("Reverse this entry?")) {
                const staff = staffData[sid];
                if(!staff) return alert("Staff not found");
                const currentBal = Number(staff.balance || 0);
                const revAmt = Number(amt);
                const newBal = type === 'income' ? (currentBal - revAmt) : (currentBal + revAmt);
                
                update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: newBal });
                remove(ref(db, `users/${auth.currentUser.uid}/logs/${tid}`));
            }
        };

        window.postTxn = () => {
            const sid = document.getElementById('m-staff').value;
            const amt = Number(document.getElementById('m-amt').value);
            const date = document.getElementById('m-date').value;
            if(!sid || !amt || !date) return alert("Fill all fields");

            const staff = staffData[sid];
            const currentBal = Number(staff.balance || 0);
            const newBal = currentType === 'income' ? (currentBal + amt) : (currentBal - amt);

            push(ref(db, `users/${auth.currentUser.uid}/logs`), {
                staffId: sid, staffName: staff.name,
                amount: amt, type: currentType, date,
                cat: document.getElementById('m-cat').value,
                note: document.getElementById('m-note').value,
                ts: Date.now()
            });
            update(ref(db, `users/${auth.currentUser.uid}/staff/${sid}`), { balance: newBal });
            closeModal('entry-modal');
            document.getElementById('m-amt').value = '';
            document.getElementById('m-note').value = '';
        };

        function startSync(uid) {
            onValue(ref(db, `users/${uid}/staff`), s => {
                staffData = s.val() || {};
                let sH = '', mSH = '', opts = '<option value="">Select Staff</option>';
                Object.keys(staffData).forEach(id => {
                    const u = staffData[id];
                    opts += `<option value="${id}">${u.name}</option>`;
                    sH += `<div class="staff-card p-6 shadow-lg">
                        <h4 class="text-xl font-bold">${u.name}</h4>
                        <p class="text-[10px] opacity-60 mb-4">${u.desig}</p>
                        <p class="text-[8px] uppercase opacity-50">Current Balance</p>
                        <p class="text-lg font-bold">${fmt(u.balance)}</p>
                    </div>`;
                    mSH += `<div class="flex justify-between p-3 bg-slate-50 rounded-xl mb-2"><span class="font-bold">${u.name}</span><button onclick="delUser('${id}')" class="text-red-500 font-bold text-xs">DEL</button></div>`;
                });
                document.getElementById('staff-list').innerHTML = sH;
                document.getElementById('mgmt-staff-list').innerHTML = mSH;
                document.getElementById('m-staff').innerHTML = opts;
            });

            onValue(ref(db, `users/${uid}/logs`), s => {
                const data = s.val() || {};
                logsList = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => a.ts - b.ts);
                renderHome();
            });
        }

        function renderHome() {
            const now = new Date();
            const monthName = now.toLocaleString('default', { month: 'long' });
            const year = now.getFullYear();
            const monthKey = now.toISOString().slice(0, 7); 
            
            document.getElementById('month-label').innerText = `${monthName} ${year}`;

            let rCB = 0; let monthlyRec = 0; let monthlyAdv = 0;
            
            logsList.forEach(l => {
                const a = Number(l.amount || 0);
                if(l.type === 'income') rCB += a; else rCB -= a;

                if(l.date && l.date.startsWith(monthKey)) {
                    if(l.type === 'income') monthlyRec += a; else monthlyAdv += a;
                }
            });

            document.getElementById('cb-display').innerText = fmt(rCB);
            document.getElementById('month-received').innerText = fmt(monthlyRec);
            document.getElementById('month-advanced').innerText = fmt(monthlyAdv);
            
            let logH = '', mLogH = '';
            // Recent Activity (Top 5)
            [...logsList].reverse().slice(0, 5).forEach(l => {
                logH += `<div class="bg-white p-4 rounded-2xl border border-slate-100">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>${l.date}</span><span class="${l.type==='income'?'text-teal-600':'text-orange-600'}">${l.type==='income'?'+':'-'} ${fmt(l.amount)}</span></div>
                    <p class="font-bold text-slate-800">${l.staffName}</p>
                    <p class="text-[10px] text-slate-400">${l.note || ''}</p>
                </div>`;
            });

            // Management List (Full History for Deletion)
            [...logsList].reverse().forEach(l => {
                mLogH += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center mb-2">
                    <div><p class="text-[10px] font-bold">${l.staffName}</p><p class="text-[8px] text-slate-400">${l.date} | ${fmt(l.amount)}</p></div>
                    <button onclick="delTxn('${l.key}', '${l.staffId}', ${l.amount}, '${l.type}')" class="text-red-500 font-bold text-[10px]">REVERSE</button>
                </div>`;
            });

            document.getElementById('recent-logs').innerHTML = logH || '<p class="text-center text-slate-400 text-xs">No transactions yet</p>';
            document.getElementById('mgmt-txn-list').innerHTML = mLogH || '<p class="text-center text-slate-400 text-xs">No logs found</p>';
        }

        window.setT = (t) => {
            currentType = t;
            document.getElementById('ti').className = t === 'income' ? 'flex-1 py-4 rounded-2xl font-bold bg-teal-500 text-white shadow-lg' : 'flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
            document.getElementById('te').className = t === 'expense' ? 'flex-1 py-4 rounded-2xl font-bold bg-orange-500 text-white shadow-lg' : 'flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400';
        };
    </script>
</body>
</html>
