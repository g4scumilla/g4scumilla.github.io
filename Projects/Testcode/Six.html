<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #1E293B; }
        .page { display: none !important; min-height: 100vh; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .debit-card {
            aspect-ratio: 1.58 / 1; width: 100%; max-width: 380px; margin: 0 auto;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.85) 0%, rgba(15, 118, 110, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; position: relative; overflow: hidden; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #E2E8F0; z-index: 50; display: flex; justify-content: space-around; padding: 12px 0 25px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 32px; border-top-right-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .staff-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-radius: 20px; color: white; position: relative; overflow: hidden; }
        .staff-card::after { content: '\f007'; font-family: 'Font Awesome 6 Free'; position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.1; font-weight: 900; }
    </style>
</head>
<body>

    <div id="auth-guard" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Securing Connection...</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-page" class="page flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-8">FinanceFlow Pro</h2>
            <div class="relative mb-4">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="email" type="email" placeholder="Email" class="w-full p-4 pl-12 bg-slate-100 rounded-2xl outline-none">
            </div>
            <div class="relative mb-8">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="password" type="password" placeholder="Password" class="w-full p-4 pl-12 bg-slate-100 rounded-2xl outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-page" class="page p-5 pb-24">
        <div class="flex justify-between items-center mb-6 mt-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center text-slate-500">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">System Operator</p>
                    <h1 class="text-lg font-bold text-slate-800" id="user-display">Administrator</h1>
                </div>
            </div>
            <button onclick="openModal('entry-modal')" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="debit-card p-8 text-white mb-6 flex flex-col justify-between">
            <div class="z-10 flex justify-between items-start">
                <div>
                    <p class="text-[10px] font-bold uppercase mb-1">Central Balance Ledger</p>
                    <h2 class="text-3xl font-bold" id="cb-display">0.00</h2>
                </div>
                <i class="fas fa-wifi rotate-90 opacity-60"></i>
            </div>
            <div class="flex justify-between items-end z-10">
                <div>
                    <p class="text-[8px] opacity-60 uppercase mb-1">Status</p>
                    <p class="text-xs font-bold tracking-widest"><i class="fas fa-circle text-[6px] text-teal-300 mr-2 animate-pulse"></i>ACTIVE SESSION</p>
                </div>
                <p class="text-xs font-bold" id="card-curr-label">BDT</p>
            </div>
        </div>

        <!-- MONTHLY SUMMARY -->
        <div class="mb-8">
            <h3 class="font-bold text-slate-800 tracking-tight mb-3 px-1 text-sm uppercase flex items-center gap-2">
                <i class="far fa-calendar-check text-blue-600"></i> <span id="month-label">May 2026</span>
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden">
                    <i class="fas fa-arrow-down-long absolute -right-2 -top-2 text-teal-50 opacity-50 text-4xl"></i>
                    <p class="text-[8px] font-bold text-teal-600 uppercase mb-1">Total Received</p>
                    <p class="text-sm font-bold text-slate-800" id="month-received">0.00</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden">
                    <i class="fas fa-arrow-up-long absolute -right-2 -top-2 text-orange-50 opacity-50 text-4xl"></i>
                    <p class="text-[8px] font-bold text-orange-600 uppercase mb-1">Total Advanced</p>
                    <p class="text-sm font-bold text-slate-800" id="month-advanced">0.00</p>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-slate-800 mb-4 px-1 flex items-center gap-2">
            <i class="fas fa-clock-rotate-left text-slate-400"></i> Recent Activity
        </h3>
        <div id="recent-logs" class="space-y-3"></div>
    </div>

    <!-- STAFF DIRECTORY -->
    <div id="users-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="fas fa-address-book text-blue-600"></i> Staff Directory
        </h2>
        <div id="staff-list" class="grid gap-4"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-page" class="page p-5 pb-24">
        <h2 class="text-2xl font-bold mb-6">Settings</h2>
        <div class="space-y-4">
            <div class="bg-white rounded-[24px] p-4 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                    <i class="fas fa-coins"></i> Local Currency Display
                </p>
                <select id="curr-select" onchange="updateCurrencyFormat(this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm font-bold">
                    <option value="text">BDT (Standard)</option>
                    <option value="sign">৳ (Bangladeshi Taka)</option>
                    <option value="usd">$ (USD Equivalent)</option>
                </select>
            </div>
            
            <button onclick="showPage('reports-page')" class="w-full p-5 bg-white rounded-2xl text-left font-semibold flex items-center justify-between shadow-sm">
                <span class="flex items-center gap-3"><i class="fas fa-file-invoice text-blue-600"></i> Ledger Reports</span>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </button>

            <button onclick="openModal('staff-mgmt-modal')" class="w-full p-5 bg-white rounded-2xl text-left font-semibold flex items-center justify-between shadow-sm">
                <span class="flex items-center gap-3"><i class="fas fa-user-gear text-blue-600"></i> Staff Management</span>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </button>

            <button onclick="openModal('txn-mgmt-modal')" class="w-full p-5 bg-white rounded-2xl text-left font-semibold flex items-center justify-between shadow-sm">
                <span class="flex items-center gap-3"><i class="fas fa-database text-blue-600"></i> Database History</span>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </button>

            <button onclick="handleLogout()" class="w-full p-5 bg-red-50 text-red-600 font-bold rounded-[24px] flex items-center justify-center gap-2 mt-8">
                <i class="fas fa-power-off"></i> Sign Out Securely
            </button>
        </div>
    </div>

    <!-- ENTRY MODAL -->
    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg">New Transaction</h3>
                <button onclick="closeModal('entry-modal')" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="relative mb-4">
                <i class="fas fa-user-tag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <select id="m-staff" class="w-full p-4 pl-12 bg-slate-50 rounded-2xl outline-none font-bold text-sm"></select>
            </div>

            <div class="text-center mb-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Amount</p>
                <input id="m-amt" type="number" placeholder="0.00" class="w-full text-4xl font-bold text-center py-2 bg-transparent text-teal-600 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="relative">
                    <i class="fas fa-list absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                    <select id="m-cat" class="w-full p-4 pl-9 bg-slate-50 rounded-xl outline-none text-xs font-bold">
                        <option>Imprest</option>
                        <option>Advance</option>
                        <option>Return</option>
                    </select>
                </div>
                <div class="relative">
                    <i class="fas fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                    <input id="m-date" type="date" class="w-full p-4 pl-9 bg-slate-50 rounded-xl outline-none text-xs">
                </div>
            </div>

            <div class="relative mb-6">
                <i class="fas fa-pen absolute left-4 top-4 text-slate-400"></i>
                <textarea id="m-note" placeholder="Note or Narration..." class="w-full p-4 pl-12 bg-slate-50 rounded-xl outline-none h-20 text-xs"></textarea>
            </div>

            <div class="flex gap-3 mb-6">
                <button onclick="setT('income')" id="ti" class="flex-1 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400 flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> Receive
                </button>
                <button onclick="setT('expense')" id="te" class="flex-1 py-4 rounded-2xl font-bold bg-orange-500 text-white flex items-center justify-center gap-2 shadow-lg shadow-orange-100">
                    <i class="fas fa-minus-circle"></i> Advance
                </button>
            </div>
            
            <button onclick="postTxn()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-xl">Confirm & Post</button>
        </div>
    </div>

    <!-- NAV BAR -->
    <nav id="navbar" class="bottom-nav hidden">
        <button onclick="showPage('dashboard-page')" class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fas fa-house-chimney text-lg"></i>
            <span class="text-[8px] font-bold">HOME</span>
        </button>
        <button onclick="showPage('users-page')" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-users-viewfinder text-lg"></i>
            <span class="text-[8px] font-bold">STAFF</span>
        </button>
        <button onclick="showPage('settings-page')" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-sliders text-lg"></i>
            <span class="text-[8px] font-bold">CONFIG</span>
        </button>
    </nav>

    <!-- (Keep the rest of your JS logic exactly as it is) -->
</body>
</html>
