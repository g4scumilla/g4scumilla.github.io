<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G4S FUND</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --g4s-red: #d32f2f; }

* { -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: sans-serif;
    padding-top: 320px;
    padding-bottom: 80px;
    background: #fdfdfd;
    user-select: none;
}

/* HEADER */
.fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, #f44336 0%, #fff 100%);
    z-index: 1000;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    font-size: 20px;
}

.card-container { padding: 0 15px; }

/* 💳 PREMIUM CARD */
.visa-card {
    border-radius: 15px;
    aspect-ratio: 1.58 / 1;
    width: 100%;
    color: white;
    display: flex;
    flex-direction: column;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
    /* BASE LAYER: The Flower Background */
    background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1400&q=80');
    background-size: cover;
    background-position: center;
}

/* SECOND LAYER: Mixing the Baby Photo */
.visa-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://G4scumilla.github.io/Files/Img/Messenger_creation_262E13AA-47AB-4F31-A617-5AA86D783173.jpeg');
    background-size: cover;
    background-position: center;
    opacity: 0.5; /* This creates the mix effect with the flowers */
    z-index: 1;
}

/* THIRD LAYER: Dark Gradient for Readability */
.visa-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        135deg,
        rgba(0,0,0,0.65),
        rgba(211, 47, 47, 0.3)
    );
    z-index: 2;
}

.visa-card > * {
    position: relative;
    z-index: 3; /* Keeps text on top of all images */
}

/* SERVICE GRID */
.service-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 15px;
    background: white;
    border-bottom: 1px solid #eee;
}

.service-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
}

.icon-circle {
    width: 45px;
    height: 45px;
    background: #fff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 5px;
    font-size: 18px;
}

/* TRANSACTIONS */
.tx-card {
    background: white;
    padding: 12px 15px;
    border-radius: 12px;
    margin: 0 15px 8px;
    display: flex;
    align-items: center;
    border: 1px solid #f0f0f0;
}

.user-initial {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #f44336;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
    font-weight: bold;
}

.center-meta { flex: 1; }
.amount-side { text-align: right; min-width: 70px; font-weight: bold; }

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid #eee;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px;
    color: #bbb;
}

.nav-active { color: var(--g4s-red); }
</style>
</head>

<body>

<div class="fixed-header">
    <div class="top-bar">
        <span>G4S FUND</span>
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <div class="card-container">
        <div class="visa-card">
            <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; padding-top: 10px;">
                <div style="font-size:10px; opacity:0.9; letter-spacing: 1px;">G4S_FUND</div>
                <div id="bal-text" style="font-size:28px; font-weight:bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Loading...</div>
            </div>

            <div style="padding:10px 15px; background: rgba(0,0,0,0.2);">
                <div style="font-size:11px; font-weight:bold; color: #fff;">ABDULLAHIL KUAFI</div>
                <div style="font-size:8px; opacity:0.8; margin-top:2px;">
                    ID: G4SNM2000417 | Executive - Manned Services<br>
                    Joined: 5 MAY 2023 | Service: <span id="duration-text">...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="service-grid">
        <div class="service-item"><div class="icon-circle"><i class="fa-solid fa-plus"></i></div>Transact</div>
        <div class="service-item"><div class="icon-circle"><i class="fa-solid fa-users"></i></div>Users</div>
        <div class="service-item"><div class="icon-circle"><i class="fa-solid fa-user-plus"></i></div>Add</div>
        <div class="service-item"><div class="icon-circle"><i class="fa-solid fa-receipt"></i></div>History</div>
    </div>
</div>

<div id="main-content"></div>

<div class="bottom-nav">
    <div class="nav-item nav-active"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item"><i class="fa-solid fa-list"></i><span>History</span></div>
    <div class="nav-item"><i class="fa-solid fa-user"></i><span>Users</span></div>
</div>

<script>
const DATA_API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";
const BAL_API  = "https://script.google.com/macros/s/AKfycbyQxeX1xqmSEcksnoxxZZMGqaXVkdNLcze5VzIE5qdtJFzhvahlHiq4RQ-tnjJZxR1l/exec";

let DATA = {transactions:[], users:{}};

function updateDuration() {
    const joinDate = new Date("2023-05-05");
    const now = new Date();
    
    let years = now.getFullYear() - joinDate.getFullYear();
    let months = now.getMonth() - joinDate.getMonth();
    let days = now.getDate() - joinDate.getDate();
    
    if (days < 0) {
        months--;
        let lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += lastMonth.getDate();
    }
    
    if (months < 0) {
        years--;
        months += 12;
    }
    
    document.getElementById("duration-text").innerText = `${years}Y ${months}M ${days}D`;
}

async function sync() {
    try {
        const r = await fetch(DATA_API);
        DATA = await r.json();
        renderDash();
    } catch(e) {}
}

async function fetchBalance() {
    try {
        const r = await fetch(BAL_API);
        const d = await r.json();
        document.getElementById("bal-text").innerText = "৳ " + Math.floor(d.balance || 0);
    } catch(e) {
        document.getElementById("bal-text").innerText = "Error";
    }
}

function renderDash() {
    let h = `<div style="padding:10px 20px;font-weight:bold; color:#666; font-size:12px;">RECENT TRANSACTIONS</div>`;

    (DATA.transactions || []).slice(-10).reverse().forEach(t => {
        h += `
        <div class="tx-card">
            <div class="user-initial">${t.person ? t.person[0] : "?"}</div>
            <div class="center-meta">
                <div style="font-size:13px; font-weight:bold;">${t.person || ""}</div>
                <div style="font-size:11px; color:#888;">${t.note || ""}</div>
            </div>
            <div class="amount-side" style="color:${t.type=='Withdraw'?'#d32f2f':'#2e7d32'}">
                ৳${t.amount}
            </div>
        </div>`;
    });

    document.getElementById("main-content").innerHTML = h;
}

window.onload = function () {
    sync();
    fetchBalance();
    updateDuration();
    setInterval(fetchBalance, 10000);
};
</script>

</body>
</html>
