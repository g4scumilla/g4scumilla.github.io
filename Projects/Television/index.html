<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kuafi Live TV</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 10px;
      font-weight: bold;
    }

    .container {
      position: relative;
      width: 100%;
      height: 92vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Watermark */
    .watermark {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.3);
      pointer-events: none;
      z-index: 10;
    }

    /* Top small branding */
    .top-brand {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 13px;
      opacity: 0.7;
      z-index: 10;
      pointer-events: none;
    }

    /* Simple menu */
    .menu {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
    }

    .menu button {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 6px 10px;
      margin-left: 5px;
      border-radius: 5px;
    }

    .menu button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<header>📺 Kuafi Live TV</header>

<div class="container">

  <!-- YOUR LIVE TV WEBSITE -->
  <iframe id="tvFrame" src="http://103.59.176.72/"></iframe>

  <!-- WATERMARK -->
  <div class="watermark">Abdullahil Kuafi</div>
  <div class="top-brand">Kuafi Live Stream</div>

  <!-- MENU -->
  <div class="menu">
    <button onclick="reload()">Reload</button>
    <button onclick="home()">Home</button>
    <button onclick="about()">About</button>
  </div>

</div>

<script>
  function reload() {
    const frame = document.getElementById("tvFrame");
    frame.src = frame.src;
  }

  function home() {
    document.getElementById("tvFrame").src = "http://103.59.176.72/";
  }

  function about() {
    alert("Kuafi Live TV Web App\nPowered by Abdullahil Kuafi");
  }
</script>

</body>
</html>
