<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:10px;
  background:#1f2937;
  color:white;
  border:none;
}

.section{
  padding:12px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:12px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:10px;
}

table{
  width:100%;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">🏦 Enterprise Wallet System</div>

<div class="grid">
  <div class="card">Balance: <span id="bal">0</span></div>
  <div class="card">Users: <span id="users">0</span></div>
</div>

<div class="nav">
  <button onclick="loadDash()">Dashboard</button>
  <button onclick="loadAdd()">Add</button>
  <button onclick="loadTx()">Transactions</button>
</div>

<div class="section" id="view"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";

let DATA = {};

fetch(API)
.then(r=>r.json())
.then(res=>{
  DATA = res;

  let bal = 0;
  let count = 0;

  res.transactions.forEach(t=>{
    bal = t.balance;
    count++;
  });

  document.getElementById("bal").innerText = bal;
  document.getElementById("users").innerText = Object.keys(res.users).length;

  loadDash();
});

// DASHBOARD
function loadDash(){

  let users = DATA.users;

  let html = "<h3>Users Summary</h3>";

  for(let u in users){
    html += `
    <div class="card">
      ${u}<br>
      Income: ${users[u].income}<br>
      Expense: ${users[u].expense}<br>
      Balance: ${users[u].balance}
    </div>`;
  }

  view.innerHTML = html;
}

// ADD
function loadAdd(){
  view.innerHTML = `
  <h3>Add Transaction</h3>

  <input id="p" placeholder="Person">
  <select id="t">
    <option>Income</option>
    <option>Expense</option>
  </select>

  <input id="c" placeholder="Category">
  <input id="a" type="number" placeholder="Amount">
  <input id="n" placeholder="Note">

  <button onclick="send()">Submit</button>
  `;
}

function send(){
  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      person:p.value,
      type:t.value,
      category:c.value,
      amount:a.value,
      note:n.value
    })
  });

  alert("Saved");
}

// TRANSACTIONS
function loadTx(){

  let html = "<h3>All Transactions</h3>";

  DATA.transactions.forEach(t=>{
    html += `
    <div class="card">
      ${t.person} | ${t.type} | ${t.amount}
    </div>`;
  });

  view.innerHTML = html;
}

</script>

</body>
</html>
