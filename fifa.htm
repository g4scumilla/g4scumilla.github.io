    <script>
        let matchData = [];
        let currentFilter = 'all';

        // Bulletproof formatting: Forces raw API strings into UTC before converting to BST
        function formatToBST(dateString) {
            if (!dateString) return "TBD";
            try {
                let safeString = dateString;
                
                // If API sends "YYYY-MM-DD HH:MM:SS" without a timezone, force it to UTC (Z)
                if (safeString.match(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/)) {
                    safeString = safeString.replace(' ', 'T') + 'Z';
                }

                const dateObj = new Date(safeString);
                
                // If the parser still fails, return the original string
                if (isNaN(dateObj.getTime())) return dateString; 
                
                // Convert valid date strictly to Dhaka time
                return dateObj.toLocaleTimeString('en-US', {
                    timeZone: 'Asia/Dhaka',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                }) + ' BST';
            } catch (e) {
                return dateString;
            }
        }

        async function fetchLiveTournamentData() {
            const loader = document.getElementById('loader');
            try {
                const response = await fetch('https://worldcup26.ir/get/games');
                if (!response.ok) throw new Error('Network latency check failed');
                
                const rawMatches = await response.json();
                
                matchData = rawMatches.map((match, index) => {
                    let calculatedStatus = "upcoming";
                    if (match.status === "live" || match.status === "in_progress") calculatedStatus = "live";
                    if (match.status === "finished" || match.status === "FT") calculatedStatus = "finished";

                    const bstTimeStr = match.date ? formatToBST(match.date) : (match.time ? formatToBST(match.time) : "Scheduled");

                    return {
                        id: match.id || index,
                        status: calculatedStatus,
                        statusText: calculatedStatus === "live" ? (match.minute + "'") : (calculatedStatus === "finished" ? "FT" : "UPCOMING"),
                        group: match.group || "World Cup Stage",
                        team1: match.home_team?.name || match.home_team || "TBD",
                        flag1: match.home_team?.flag || "🏳️",
                        score1: match.home_score !== undefined ? match.home_score : "-",
                        team2: match.away_team?.name || match.away_team || "TBD",
                        flag2: match.away_team?.flag || "🏳️",
                        score2: match.away_score !== undefined ? match.away_score : "-",
                        bstTime: bstTimeStr,
                        venue: match.stadium || "International Stadium",
                        city: match.city || "Host City",
                        broadcaster: match.tv_channel || "Toffee Live Sports"
                    };
                });

                renderMatches();
            } catch (error) {
                console.warn("Primary API unavailable. Loading secure backup data mirror...", error);
                loadFallbackData();
            }
        }

        function loadFallbackData() {
            // Realistic Bangladesh schedule for North American host cities
            matchData = [
                { 
                    id: 101, 
                    status: "live", 
                    statusText: "78'", 
                    group: "Group I", 
                    team1: "France", 
                    flag1: "🇫🇷", 
                    score1: 2, 
                    team2: "Senegal", 
                    flag2: "🇸🇳", 
                    score2: 1, 
                    bstTime: "Live Now",
                    venue: "MetLife Stadium", 
                    city: "New York", 
                    broadcaster: "Toffee Stream 1" 
                },
                { 
                    id: 102, 
                    status: "upcoming", 
                    statusText: "Upcoming", 
                    group: "Group K", 
                    team1: "Portugal", 
                    flag1: "🇵🇹", 
                    score1: "-", 
                    team2: "Congo DR", 
                    flag2: "🇨🇩", 
                    score2: "-", 
                    bstTime: "01:00 AM BST",
                    venue: "Hard Rock Stadium", 
                    city: "Miami", 
                    broadcaster: "Toffee App / T-Sports" 
                },
                { 
                    id: 103, 
                    status: "upcoming", 
                    statusText: "Upcoming", 
                    group: "Group L", 
                    team1: "England", 
                    flag1: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", 
                    score1: "-", 
                    team2: "Croatia", 
                    flag2: "🇭🇷", 
                    score2: "-",
                    bstTime: "04:00 AM BST",
                    venue: "SoFi Stadium", 
                    city: "Los Angeles", 
                    broadcaster: "Toffee Live / Channel 9" 
                },
                { 
                    id: 104, 
                    status: "upcoming", 
                    statusText: "Upcoming", 
                    group: "Group J", 
                    team1: "Argentina", 
                    flag1: "🇦🇷", 
                    score1: "-", 
                    team2: "Algeria", 
                    flag2: "🇩🇿", 
                    score2: "-", 
                    bstTime: "07:00 AM BST",
                    venue: "AT&T Stadium", 
                    city: "Dallas", 
                    broadcaster: "Sony LIV Archive" 
                }
            ];
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matches-wrapper');
            const searchVal = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = matchData.filter(m => {
                const matchesTab = (currentFilter === 'all') || (m.status === currentFilter);
                const matchesSearch = m.team1.toLowerCase().includes(searchVal) || m.team2.toLowerCase().includes(searchVal);
                return matchesTab && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px;">No matches found matching your filters.</div>`;
                return;
            }

            filtered.forEach(match => {
                const isLive = match.status === 'live';
                const isUpcoming = match.status === 'upcoming';
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-status-bar">
                        <span>${match.group}</span>
                        <span class="status-pill ${match.status}">${match.statusText}</span>
                    </div>
                    <div class="teams-row">
                        <div class="team">
                            <div class="team-info"><span class="flag">${match.flag1}</span> ${match.team1}</div>
                            <div class="${isUpcoming ? 'score upcoming-score' : 'score'}">${match.score1}</div>
                        </div>
                        <div class="team">
                            <div class="team-info"><span class="flag">${match.flag2}</span> ${match.team2}</div>
                            <div class="${isUpcoming ? 'score upcoming-score' : 'score'}">${match.score2}</div>
                        </div>
                    </div>
                    
                    <div class="extra-info-panel">
                        <div class="info-item">Time (BD): <span class="bst-badge">${match.bstTime}</span></div>
                        <div class="info-item">Stadium: <strong>${match.venue}</strong></div>
                        <div class="info-item">City: <strong>${match.city}</strong></div>
                    </div>

                    <div class="card-footer">
                        <span>📺 ${match.broadcaster}</span>
                        ${isLive ? `<a href="https://toffeelive.com" target="_blank" class="stream-btn">Watch Live</a>` : ''}
                        ${isUpcoming ? `<a href="https://toffeelive.com" target="_blank" class="stream-btn" style="opacity:0.7;">Remind Me</a>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tabType) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentFilter = tabType;
            renderMatches();
        }

        function filterMatches() {
            renderMatches();
        }

        document.addEventListener("DOMContentLoaded", fetchLiveTournamentData);
    </script>
