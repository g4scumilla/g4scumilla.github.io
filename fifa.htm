<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Cup 2026 - Tournament Dashboard</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151a24;
            --accent: #ff6b00;
            --accent-glow: rgba(255, 107, 0, 0.2);
            --text-main: #f5f6f8;
            --text-muted: #8a96a3;
            --live-green: #00e676;
            --border-color: #242c3d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1f1202 0%, var(--bg-card) 100%);
            border-bottom: 2px solid var(--accent);
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .logo-area h1 span {
            color: var(--accent);
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Controls Section */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            border-color: var(--accent);
        }

        .tab-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .search-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 20px;
            color: var(--text-main);
            width: 100%;
            max-width: 300px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        /* Match Cards Grid */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 20px;
        }

        .match-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .match-card:hover {
            transform: translateY(-3px);
            border-color: #3b475e;
        }

        .match-status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-pill.live {
            color: var(--live-green);
        }

        .status-pill.live::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--live-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .teams-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flag {
            font-size: 1.4rem;
        }

        .score {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .upcoming-score {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stream-btn {
            background-color: rgba(255, 107, 0, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .stream-btn:hover {
            background-color: var(--accent);
            color: white;
        }

        /* Standings View Styling */
        .table-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }

        .group-title {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 30px;
        }

        table:last-child {
            margin-bottom: 0;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Dream <span>Cup 2026</span></h1>
            <div class="tagline">Live Match Hub & Tournament Tracker</div>
        </div>
    </header>

    <div class="container">
        <!-- Control Interface -->
        <div class="controls-bar">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('all')">All Matches</button>
                <button class="tab-btn" onclick="switchTab('live')">Live Now</button>
                <button class="tab-btn" onclick="switchTab('upcoming')">Upcoming</button>
                <button class="tab-btn" onclick="switchTab('standings')">Standings</button>
            </div>
            <input type="text" id="search" class="search-box" placeholder="Search team name..." oninput="filterMatches()">
        </div>

        <!-- Matches Panel -->
        <div id="matches-wrapper" class="match-grid">
            <!-- Dynamic Injection through JavaScript -->
        </div>

        <!-- Table Standings Panel -->
        <div id="standings-wrapper" class="table-container hidden">
            <div class="group-title">Group I Standings</div>
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>P</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GD</th>
                        <th>Pts</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>🇫🇷 France</td><td>1</td><td>1</td><td>0</td><td>0</td><td>+1</td><td>3</td></tr>
                    <tr><td>🇳🇴 Norway</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                    <tr><td>🇮🇶 Iraq</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                    <tr><td>🇸🇳 Senegal</td><td>1</td><td>0</td><td>0</td><td>1</td><td>-1</td><td>0</td></tr>
                </tbody>
            </table>

            <div class="group-title" style="margin-top: 20px;">Group J Standings</div>
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>P</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GD</th>
                        <th>Pts</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>🇦🇷 Argentina</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                    <tr><td>🇩🇿 Algeria</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                    <tr><td>🇦🇹 Austria</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                    <tr><td>🇯🇴 Jordan</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // June 17, 2026 World Cup match state matrix
        const matchData = [
            {
                id: 1,
                status: "live",
                statusText: "74'",
                group: "Group I",
                team1: "France",
                flag1: "🇫🇷",
                score1: 2,
                team2: "Senegal",
                flag2: "🇸🇳",
                score2: 1,
                info: "Live stream available via Toffee"
            },
            {
                id: 2,
                status: "upcoming",
                statusText: "Today 23:00",
                group: "Group K",
                team1: "Portugal",
                flag1: "🇵🇹",
                score1: "-",
                team2: "Congo DR",
                flag2: "🇨🇩",
                score2: "-",
                info: "Ronaldo's 6th World Cup appearance"
            },
            {
                id: 3,
                status: "upcoming",
                statusText: "Today 19:00",
                group: "Group L",
                team1: "Ghana",
                flag1: "🇬🇭",
                score1: "-",
                team2: "Panama",
                flag2: "🇵🇦",
                score2: "-",
                info: "Upcoming Stream"
            },
            {
                id: 4,
                status: "upcoming",
                statusText: "Tomorrow 16:00",
                group: "Group L",
                team1: "England",
                flag1: "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
                score1: "-",
                team2: "Croatia",
                flag2: "🇭🇷",
                score2: "-",
                info: "Marquee Group Match"
            },
            {
                id: 5,
                status: "finished",
                statusText: "FT",
                group: "Group J",
                team1: "Austria",
                flag1: "🇦🇹",
                score1: 1,
                team2: "Jordan",
                flag2: "🇯🇴",
                score2: 0,
                info: "Match Concluded"
            },
            {
                id: 6,
                status: "finished",
                statusText: "FT",
                group: "Group J",
                team1: "Argentina",
                flag1: "🇦🇷",
                score1: 3,
                team2: "Algeria",
                flag2: "🇩🇿",
                score2: 1,
                info: "Match Concluded"
            }
        ];

        let currentFilter = 'all';

        function renderMatches() {
            const container = document.getElementById('matches-wrapper');
            const searchVal = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = matchData.filter(m => {
                const matchesTab = (currentFilter === 'all') || (m.status === currentFilter);
                const matchesSearch = m.team1.toLowerCase().includes(searchVal) || m.team2.toLowerCase().includes(searchVal);
                return matchesTab && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px;">No matches found matching your filters.</div>`;
                return;
            }

            filtered.forEach(match => {
                const isLive = match.status === 'live';
                const isUpcoming = match.status === 'upcoming';
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-status-bar">
                        <span>${match.group}</span>
                        <span class="status-pill ${match.status}">${match.statusText}</span>
                    </div>
                    <div class="teams-row">
                        <div class="team">
                            <div class="team-info"><span class="flag">${match.flag1}</span> ${match.team1}</div>
                            <div class="${isUpcoming ? 'score upcoming-score' : 'score'}">${match.score1}</div>
                        </div>
                        <div class="team">
                            <div class="team-info"><span class="flag">${match.flag2}</span> ${match.team2}</div>
                            <div class="${isUpcoming ? 'score upcoming-score' : 'score'}">${match.score2}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span>${match.info}</span>
                        ${isLive ? `<a href="https://toffeelive.com" target="_blank" class="stream-btn">Watch Live</a>` : ''}
                        ${isUpcoming ? `<a href="https://toffeelive.com" target="_blank" class="stream-btn" style="opacity:0.7;">Set Reminder</a>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tabType) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const matchWrapper = document.getElementById('matches-wrapper');
            const standingsWrapper = document.getElementById('standings-wrapper');
            const searchBox = document.getElementById('search');

            if (tabType === 'standings') {
                matchWrapper.classList.add('hidden');
                searchBox.classList.add('hidden');
                standingsWrapper.classList.remove('hidden');
            } else {
                standingsWrapper.classList.add('hidden');
                matchWrapper.classList.remove('hidden');
                searchBox.classList.remove('hidden');
                currentFilter = tabType;
                renderMatches();
            }
        }

        function filterMatches() {
            renderMatches();
        }

        // Run rendering logic on window load
        document.addEventListener("DOMContentLoaded", () => {
            renderMatches();
        });
    </script>
</body>
</html>
