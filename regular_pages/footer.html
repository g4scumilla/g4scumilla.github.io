<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Internal Automation</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --primary: #1a73e8; 
    --bg: #f1f3f4;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }

/* 1. SEPARATE VIEW MODE (Laptop vs Mobile) */
body {
    margin: 0; background: #202124; /* Desktop background */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex; justify-content: center; height: 100vh; overflow: hidden;
}

.app-frame {
    width: 100%; max-width: 450px; /* Centered "Phone" view for Laptop */
    background: var(--bg); height: 100%; position: relative;
    display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.3);
}

/* Header */
header { background: #fff; padding: 40px 20px 20px; border-bottom: 1px solid #ddd; }
.logo { width: 70px; margin-bottom: 10px; }
h1 { font-size: 18px; margin: 0; color: #333; }

/* Content Scroll Area */
.main { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
.error-msg { margin-top: 50px; color: #666; }
.error-msg i { font-size: 50px; color: #d32f2f; margin-bottom: 10px; }

/* 2. APK STYLE FOOTER */
footer {
    height: calc(65px + var(--safe-bottom));
    background: #ffffff; border-top: 1px solid #ddd;
    display: flex; align-items: center; padding-bottom: var(--safe-bottom);
}

.nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    color: #5f6368; font-size: 11px; text-decoration: none; border: none; background: none; cursor: pointer;
}
.nav-btn i { font-size: 22px; margin-bottom: 4px; }
.nav-btn.active { color: var(--primary); }

/* 3. UPWARD SLIDING "ACTION SHEET" MENU */
.menu-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: none; z-index: 1000; animation: fadeIn 0.2s;
}

.action-sheet {
    position: absolute; bottom: 0; width: 100%;
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 20px 0 calc(20px + var(--safe-bottom));
    transform: translateY(100%); transition: transform 0.3s ease;
}

.menu-overlay.show { display: block; }
.menu-overlay.show .action-sheet { transform: translateY(0); }

.menu-item {
    display: flex; align-items: center; padding: 15px 25px;
    color: #333; text-decoration: none; font-size: 15px; border-bottom: 1px solid #f1f1f1;
}
.menu-item i { width: 30px; font-size: 18px; color: var(--primary); }
.menu-item:active { background: #f5f5f5; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="app-frame">
    <header>
        <img src="https://G4scumilla.github.io/Files/Img/IMG_20260426_004707.png" class="logo">
        <h1>Internal Automation</h1>
    </header>

    <div class="main">
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <h3>Webpage Not Found</h3>
            <p>Please use the menu below to navigate.</p>
        </div>
    </div>

    <footer>
        <a href="javascript:history.back()" class="nav-btn">
            <i class="fas fa-arrow-left"></i><span>Back</span>
        </a>
        <a href="index.html" class="nav-btn active">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <button class="nav-btn" onclick="openMenu()">
            <i class="fas fa-bars"></i><span>Menu</span>
        </button>
    </footer>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div style="width:40px; height:5px; background:#ddd; border-radius:10px; margin:0 auto 15px;"></div>
            
            <a href="pages/resignation_automations.html" class="menu-item">
                <i class="fas fa-file-alt"></i> Resignation Automations
            </a>
            <a href="pages/prepare_sheet.html" class="menu-item">
                <i class="fas fa-table"></i> Prepare Sheet
            </a>
            <a href="pages/training_sheet.html" class="menu-item">
                <i class="fas fa-user-graduate"></i> Prepare Training Sheet
            </a>
            <a href="pages/other_links.html" class="menu-item">
                <i class="fas fa-external-link-alt"></i> Other Internal Links
            </a>
            
            <button onclick="closeMenu()" style="width:90%; margin:20px 5%; padding:12px; border-radius:10px; border:none; background:#eee; font-weight:bold;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const overlay = document.getElementById('menuOverlay');

    function openMenu() {
        overlay.classList.add('show');
    }

    function closeMenu() {
        overlay.classList.remove('show');
    }

    // Auto-redirect and close logic
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            // The browser will follow the href, but we close overlay for smoothness
            setTimeout(closeMenu, 100); 
        });
    });
</script>

</body>
</html>
