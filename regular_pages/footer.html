<style>
    :root { --primary: #d32f2f; }
    
    .footer-nav {
        position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 100%; max-width: 450px; /* Laptop View Constraint */
        height: 65px; background: #fff; border-top: 1px solid #ddd;
        display: flex; justify-content: space-around; align-items: center;
        z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        color: #555; text-decoration: none; font-size: 11px; cursor: pointer;
        border: none; background: none;
    }
    .nav-item i { font-size: 20px; margin-bottom: 4px; }
    .nav-item.active { color: var(--primary); }

    /* APK Action Sheet Dropdown */
    .menu-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5);
        display: none; z-index: 2000;
    }
    .action-sheet {
        position: absolute; bottom: 0; width: 100%;
        background: #fff; border-radius: 20px 20px 0 0;
        padding: 15px 0 30px; transform: translateY(100%);
        transition: transform 0.3s ease;
    }
    .menu-overlay.open { display: block; }
    .menu-overlay.open .action-sheet { transform: translateY(0); }

    .sheet-item {
        display: flex; align-items: center; padding: 15px 25px;
        color: #333; text-decoration: none; font-size: 14px; border-bottom: 1px solid #f1f1f1;
    }
    .sheet-item i { width: 30px; color: var(--primary); }
</style>

<div class="footer-nav">
    <a href="javascript:history.back()" class="nav-item">
        <i class="fas fa-arrow-left"></i><span>Back</span>
    </a>
    <a href="/index.html" class="nav-item">
        <i class="fas fa-house"></i><span>Home</span>
    </a>
    <button class="nav-item menu-btn" onclick="toggleApkMenu(true)">
        <i class="fas fa-bars"></i><span>Menu</span>
    </button>
</div>

<div class="menu-overlay" id="apkMenu" onclick="toggleApkMenu(false)">
    <div class="action-sheet" onclick="event.stopPropagation()">
        <div style="width:40px; height:4px; background:#ddd; border-radius:10px; margin:0 auto 15px;"></div>
        <a href="pages/resignation_automations.html" class="sheet-item"><i class="fas fa-file-signature"></i> Resignation</a>
        <a href="#" class="sheet-item"><i class="fas fa-chalkboard-teacher"></i> Prepare Sheet</a>
        <a href="#" class="sheet-item"><i class="fas fa-table"></i> Training Sheet</a>
        <a href="/Projects/Wallet/index" class="sheet-item"><i class="fas fa-link"></i> Other Links</a>
    </div>
</div>

<script>
    function toggleApkMenu(show) {
        const menu = document.getElementById('apkMenu');
        if(show) menu.classList.add('open');
        else menu.classList.remove('open');
    }
</script>
