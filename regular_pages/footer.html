<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Internal Automation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --primary-blue: #1a73e8;
    --g4s-red: #d32f2f;
    --bg-light: #f8f9fa;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }

/* 1. SEPARATE VIEW MODE (Laptop vs Mobile) */
body {
    margin: 0;
    padding: 0;
    background: #202124; /* Dark background for desktop mode */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
}

/* App Container - The "APK" Look */
.app-wrapper {
    width: 100%;
    max-width: 480px; /* Limits width on desktop */
    height: 100vh;
    background: var(--bg-light);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

/* Scrollable Content Area */
.main-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 100px; /* Space for footer */
}

/* Header Styling */
header {
    background: white;
    padding: 40px 20px 20px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

.logo { width: 80px; margin-bottom: 15px; }
h1 { font-size: 20px; margin: 0; color: #3c4043; }
p { font-size: 13px; color: #70757a; margin: 5px 0 0; }

/* 2. FOOTER - BOTTOM NAV VIBE */
footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: calc(65px + var(--safe-bottom));
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-bottom: var(--safe-bottom);
    border-top: 1px solid #ddd;
    z-index: 1000;
}

.nav-item {
    text-decoration: none;
    color: #5f6368;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    transition: 0.2s;
    background: none;
    border: none;
    flex: 1;
}

.nav-item i { font-size: 20px; margin-bottom: 4px; }
.nav-item.active { color: var(--primary-blue); }

/* MENU DROPDOWN (Pops Upward) */
.footer-menu { position: relative; flex: 1; display: flex; justify-content: center; }

.menu-links {
    position: absolute;
    bottom: 80px;
    right: 15px;
    width: 220px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid #eee;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.menu-links a {
    padding: 15px 20px;
    font-size: 14px;
    color: #3c4043;
    text-decoration: none;
    border-bottom: 1px solid #f1f3f4;
}

.menu-links a:last-child { border: none; }
.menu-links a:active { background: #f8f9fa; }

/* Show menu when active */
.footer-menu.open .menu-links { display: flex; }

/* Error Page Placeholder styling */
.error-section {
    text-align: center;
    margin-top: 50px;
}
.error-icon { color: #ea4335; font-size: 48px; margin-bottom: 15px; }

</style>
</head>
<body>

<div class="app-wrapper">
    
    <header>
        <img src="https://G4scumilla.github.io/Files/Img/IMG_20260426_004707.png" class="logo" alt="G4S">
        <h1>Internal Automation Dashboard</h1>
        <p>Quick access to forms, sheets, & resources</p>
    </header>

    <div class="main-content">
        <div class="error-section">
            <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h2 style="font-size: 18px; color: #202124;">Webpage Not Found</h2>
            <p>The page you are looking for does not exist or has been moved.</p>
        </div>
    </div>

    <footer>
        <a href="javascript:history.back()" class="nav-item">
            <i class="fas fa-arrow-left"></i>
            <span>Back</span>
        </a>

        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <div class="footer-menu" id="footerMenu">
            <button class="nav-item" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
                <span>Menu</span>
            </button>
            <div class="menu-links">
                <a href="pages/resignation_automations.html"><i class="fas fa-file-signature"></i> &nbsp; Resignation</a>
                <a href="pages/prepare_sheet.html"><i class="fas fa-table"></i> &nbsp; Prepare Sheet</a>
                <a href="pages/training_sheet.html"><i class="fas fa-graduation-cap"></i> &nbsp; Training Sheet</a>
                <a href="pages/other_links.html"><i class="fas fa-link"></i> &nbsp; Other Links</a>
            </div>
        </div>
    </footer>

</div>

<script>
    // Toggle Menu
    function toggleMenu(e) {
        e.stopPropagation();
        document.getElementById('footerMenu').classList.toggle('open');
    }

    // Close menu when clicking anywhere else
    document.addEventListener('click', function() {
        document.getElementById('footerMenu').classList.remove('open');
    });

    // Prevent closing when clicking inside the menu itself
    document.querySelector('.menu-links').addEventListener('click', function(e) {
        e.stopPropagation();
    });
</script>

</body>
</html>
