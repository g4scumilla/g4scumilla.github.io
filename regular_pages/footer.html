<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Internal Automation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --primary-color: #1a73e8;
    --g4s-red: #d32f2f;
    --bg-light: #f8f9fa;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }

/* 1. SEPARATE VIEW MODES */
body {
    margin: 0;
    padding: 0;
    background: #e0e0e0; /* Desktop background */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    height: 100vh;
}

/* App Container (Phone Frame on Desktop) */
.app-container {
    width: 100%;
    max-width: 450px; /* Constraints for Laptop/PC */
    background: white;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,0.2);
}

/* Content Area */
.content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    text-align: center;
}

header {
    padding: 40px 20px 20px;
    text-align: left;
    border-bottom: 1px solid #f1f1f1;
}

.logo { width: 70px; margin-bottom: 10px; }
h1 { font-size: 19px; margin: 0; color: #333; }

/* 2. APK STYLE BOTTOM NAV */
footer {
    height: calc(65px + var(--safe-bottom));
    background: #ffffff;
    border-top: 1px solid #eee;
    display: flex;
    align-items: center;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
}

.nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #757575;
    font-size: 11px;
    position: relative;
    cursor: pointer;
}

.nav-item i { font-size: 20px; margin-bottom: 3px; }
.nav-item.active { color: var(--primary-color); }

/* 3. THE DROPDOWN REDIRECTOR */
.dropdown-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Hidden real select sitting over the fake button */
.nav-dropdown {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0; /* Invisible but clickable */
    cursor: pointer;
    font-size: 16px; /* Prevents iOS zoom */
}

/* Visual UI for the dropdown */
.dropdown-ui {
    pointer-events: none; /* Let clicks pass through to the <select> */
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #757575;
}

/* Error Section */
.error-box { margin-top: 60px; color: #555; }
.error-box i { font-size: 50px; color: var(--g4s-red); margin-bottom: 15px; }

</style>
</head>
<body>

<div class="app-container">
    
    <header>
        <img src="https://G4scumilla.github.io/Files/Img/IMG_20260426_004707.png" class="logo" alt="Logo">
        <h1>Internal Automation Dashboard</h1>
    </header>

    <div class="content">
        <div class="error-box">
            <i class="fas fa-circle-exclamation"></i>
            <h2>404</h2>
            <p>The requested page was not found.</p>
        </div>
    </div>

    <footer>
        <a href="javascript:history.back()" class="nav-item">
            <i class="fas fa-chevron-left"></i>
            <span>Back</span>
        </a>

        <a href="index.html" class="nav-item active">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>

        <div class="dropdown-wrapper">
            <div class="dropdown-ui">
                <i class="fas fa-bars"></i>
                <span>Menu</span>
            </div>
            <select class="nav-dropdown" onchange="if (this.value) window.location.href = this.value;">
                <option value="" selected disabled>Select Menu</option>
                <option value="pages/resignation_automations.html">Resignation Automations</option>
                <option value="pages/prepare_sheet.html">Prepare Sheet</option>
                <option value="pages/training_sheet.html">Prepare Training Sheet</option>
                <option value="pages/other_links.html">Other Internal Links</option>
            </select>
        </div>
    </footer>

</div>

</body>
</html>
