<!-- Footer dropdown JS -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const dropBtn = document.querySelector('.footer-dropdown .dropbtn');
    const dropdown = document.querySelector('.footer-dropdown .dropdown-content');

    dropBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('show');
    });

    document.addEventListener('click', () => {
        dropdown.classList.remove('show');
    });
});
</script>
