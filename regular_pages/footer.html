<style>
    :root { --apk-red: #d32f2f; }

    /* Bottom Bar */
    .footer-nav {
        position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 100%; max-width: 450px; height: 65px;
        background: #ffffff; border-top: 1px solid #e0e0e0;
        display: flex; justify-content: space-around; align-items: center;
        z-index: 9998; padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        color: #555; text-decoration: none; font-size: 10px; font-weight: 600;
        cursor: pointer; transition: 0.2s;
    }
    .nav-item i { font-size: 20px; margin-bottom: 3px; }
    .nav-item:active { color: var(--apk-red); transform: scale(0.9); }

    /* Menu Overlay */
    .menu-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 9999;
        display: none; opacity: 0; transition: opacity 0.3s ease;
    }
    .menu-overlay.active { display: block; opacity: 1; }

    /* Slide-up Sheet */
    .action-sheet {
        position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%);
        width: 100%; max-width: 450px; background: white;
        border-radius: 20px 20px 0 0; padding: 15px 0 30px;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-overlay.active .action-sheet { transform: translate(-50%, 0); }

    .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 10px; margin: 0 auto 15px; }
    .sheet-title { text-align: center; font-size: 12px; color: #999; font-weight: bold; margin-bottom: 10px; }

    .sheet-link {
        display: flex; align-items: center; padding: 15px 25px;
        color: #333; text-decoration: none; font-size: 15px;
        border-bottom: 1px solid #f5f5f5;
    }
    .sheet-link i { width: 35px; color: var(--apk-red); font-size: 18px; }
    .sheet-link:active { background: #f9f9f9; }

    .sheet-close {
        width: 90%; margin: 20px 5% 0; padding: 12px;
        border: none; background: #eee; border-radius: 10px;
        font-weight: bold; color: #666; cursor: pointer;
    }
</style>

<script>
    function toggleApkMenu() {
        const overlay = document.getElementById('menuOverlay');
        if (overlay.classList.contains('active')) {
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        } else {
            overlay.style.display = 'block';
            setTimeout(() => { overlay.classList.add('active'); }, 10);
        }
    }
</script>
