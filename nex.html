<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay Lite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --nexus-red: #f44336;
            --nexus-gradient: linear-gradient(180deg, #ff5f52 0%, #ffffff 180px);
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--nexus-gradient);
            background-attachment: fixed;
            color: #333;
            padding-bottom: 80px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            color: white;
        }

        /* LIGHTWEIGHT SMART CARD */
        .card-container { padding: 0 15px; margin-bottom: 20px; }
        
        .virtual-card {
            background: var(--card-bg);
            background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
            border-radius: 18px;
            padding: 20px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-info {
            position: absolute;
            top: 15px;
            left: 20px;
            text-align: left;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .balance-label { font-size: 13px; margin-bottom: 10px; font-weight: 300; }
        
        .balance-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            display: inline-block;
            margin: 0 auto;
            cursor: pointer;
            min-width: 130px;
        }

        /* GRID */
        .section-title { padding: 0 20px; font-weight: bold; font-size: 14px; margin-top: 20px; }
        
        .service-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .service-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        
        .icon-circle {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 20px;
        }

        .service-label { font-size: 10px; font-weight: 600; color: #555; text-align: center; }

        /* LISTS */
        .content-area { padding: 0 15px; }
        .tx-card {
            background: white;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .tx-icon { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .icon-in { background: #e8f5e9; color: #4caf50; }
        .icon-out { background: #ffebee; color: #f44336; }

        .tx-info { flex: 1; }
        .tx-info b { font-size: 13px; }
        .tx-info div { font-size: 10px; color: #888; }
        .tx-amt { font-weight: bold; font-size: 13px; }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid #eee;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #ccc; }
        .nav-item.active { color: var(--nexus-red); }
        .nav-item i { font-size: 18px; }

        /* LOADING SPINNER */
        #loader { text-align: center; padding: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight:bold; font-size:20px;">NexusPay</div>
    <i class="fa-regular fa-bell"></i>
</div>

<div id="view">
    <div id="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading secure data...</div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="renderDash()"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="loadHistory()"><i class="fa-solid fa-list"></i><span>History</span></div>
    <div style="width: 50px;"></div>
    <div class="nav-item" onclick="loadUsers()"><i class="fa-solid fa-users"></i><span>Users</span></div>
    <div class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";
    let DATA = {transactions:[], users:{}};

    // Faster initial load
    window.onload = () => { sync(); };

    async function sync() {
        try {
            const response = await fetch(API);
            const json = await response.json();
            DATA = json;
            renderDash();
        } catch(e) {
            document.getElementById('view').innerHTML = "<div style='text-align:center; padding:20px;'>Connection error. Check script permissions.</div>";
        }
    }

    function toggleBal(el, val) {
        el.innerText = "৳ " + val;
        setTimeout(() => { el.innerText = "Tap for Balance"; }, 30000);
    }

    function renderDash() {
        const bal = DATA.transactions.length > 0 ? DATA.transactions[DATA.transactions.length - 1].balance : 0;
        const recent = DATA.transactions.slice(-2).reverse(); // Show only 2 recent items

        document.getElementById('view').innerHTML = `
            <div class="card-container">
                <div class="virtual-card">
                    <div class="card-info">ABDULLAHIL KUAFI<br>**** 7537</div>
                    <div class="balance-label">Available Balance</div>
                    <div class="balance-box" onclick="toggleBal(this, '${bal}')">Tap for Balance</div>
                </div>
            </div>

            <div class="section-title">Banking Services</div>
            <div class="service-grid">
                <div class="service-item" onclick="loadAddForm()">
                    <div class="icon-circle"><i class="fa-solid fa-exchange" style="color:#ff9800"></i></div>
                    <span class="service-label">Transaction</span>
                </div>
                <div class="service-item" onclick="loadUsers()">
                    <div class="icon-circle"><i class="fa-solid fa-address-book" style="color:#2196f3"></i></div>
                    <span class="service-label">User Summary</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle"><i class="fa-solid fa-user-plus" style="color:#4caf50"></i></div>
                    <span class="service-label">Add User</span>
                </div>
                <div class="service-item" onclick="loadHistory()">
                    <div class="icon-circle"><i class="fa-solid fa-clock-rotate-left" style="color:#9c27b0"></i></div>
                    <span class="service-label">Histories</span>
                </div>
            </div>

            <div class="section-title">Recent Activity</div>
            <div class="content-area">
                ${recent.map(t => `
                    <div class="tx-card">
                        <div class="tx-icon ${t.type==='Expense'?'icon-out':'icon-in'}">
                            <i class="fa-solid ${t.type==='Expense'?'fa-minus':'fa-plus'}"></i>
                        </div>
                        <div class="tx-info"><b>${t.person}</b><div>${t.category}</div></div>
                        <div class="tx-amt" style="color:${t.type==='Expense'?'#f44336':'#4caf50'}">
                            ${t.type==='Expense'?'-':'+'}৳${t.amount}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function loadUsers() {
        let h = `<div class="section-title">Users</div><div class="content-area">`;
        for(let u in DATA.users) {
            h += `<div class="tx-card"><div class="tx-info"><b>${u}</b></div><div class="tx-amt" style="color:#2196f3">৳${DATA.users[u].balance}</div></div>`;
        }
        document.getElementById('view').innerHTML = h + `<button onclick="renderDash()" style="width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">Back</button></div>`;
    }

    function loadHistory() {
        let h = `<div class="section-title">History</div><div class="content-area">`;
        DATA.transactions.slice().reverse().forEach(t => {
            h += `<div class="tx-card"><div class="tx-info"><b>${t.person}</b><div>${t.type}</div></div><div class="tx-amt">৳${t.amount}</div></div>`;
        });
        document.getElementById('view').innerHTML = h + `<button onclick="renderDash()" style="width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">Back</button></div>`;
    }

    function loadAddForm() {
        document.getElementById('view').innerHTML = `
            <div class="content-area" style="padding-top:20px">
                <div style="background:white; padding:20px; border-radius:15px;">
                    <input id="p" placeholder="Name" style="width:90%; padding:10px; margin-bottom:10px;">
                    <select id="t" style="width:100%; padding:10px; margin-bottom:10px;"><option>Income</option><option>Expense</option></select>
                    <input id="a" type="number" placeholder="Amount" style="width:90%; padding:10px; margin-bottom:10px;">
                    <button onclick="postData()" style="width:100%; padding:12px; background:var(--nexus-red); color:white; border:none; border-radius:10px;">Submit</button>
                </div>
            </div>
        `;
    }

    function postData() {
        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({person:p.value, type:t.value, amount:a.value}) });
        alert("Sent!"); sync();
    }
</script>
</body>
</html>
