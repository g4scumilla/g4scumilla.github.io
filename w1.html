<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXGEN CRYPTO | Nexus Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            background: #05070a; 
            color: #e2e8f0; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }

        /* Nexus/EBL Style Card */
        .bank-card { 
            background: linear-gradient(145deg, #1e40af 0%, #1e3a8a 100%);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
        }

        /* Neumorphic Glass Panels */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Floating Text Animation */
        .scrolling-container { overflow: hidden; white-space: nowrap; width: 100%; border-radius: 8px; }
        .scrolling-text { display: inline-block; animation: scroll-left 18s linear infinite; }
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* NexusPay Styled Inputs */
        .nexus-input { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nexus-input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); 
        }

        /* Premium Buttons */
        .btn-primary {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* Bottom Nav (Like EBL Skybanking) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            z-index: 50;
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.5; font-size: 10px; }
        .nav-item.active { opacity: 1; color: #3b82f6; }

        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen p-5 pb-28">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold tracking-[.25em] text-white uppercase italic">NEXGEN</h1>
            <div class="h-1 w-20 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>
        
        <div class="glass-panel p-8 rounded-[2.5rem] w-full max-w-sm">
            <div id="loginFields">
                <p class="text-center text-xs opacity-50 mb-6 uppercase tracking-widest">Secure Login</p>
                <input id="lPhone" type="tel" placeholder="Mobile Number" class="w-full nexus-input p-4 mb-4 text-white">
                <input id="lPass" type="tel" inputmode="numeric" maxlength="6" placeholder="6-Digit PIN" style="-webkit-text-security: disc;" class="w-full nexus-input p-4 mb-8 text-center tracking-[0.8em] font-bold">
                <button onclick="handleLogin()" class="w-full btn-primary font-bold py-4 rounded-2xl mb-6">UNLOCK PROTOCOL</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] uppercase tracking-widest text-blue-400 font-bold">New Member? Register</button>
            </div>

            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full nexus-input p-4">
                <input id="sPhone" type="tel" placeholder="Phone Number" class="w-full nexus-input p-4">
                <input id="sPass" type="tel" inputmode="numeric" maxlength="6" placeholder="Create 6-Digit PIN" class="w-full nexus-input p-4 text-center">
                <div class="pt-4">
                    <input id="sOTP" type="tel" maxlength="6" placeholder="Access Key" class="w-full bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 text-center font-mono tracking-[0.3em] text-blue-400">
                </div>
                <button onclick="handleSignup()" class="w-full btn-primary font-bold py-4 rounded-2xl">REGISTER</button>
                <button onclick="toggleAuth(true)" class="w-full text-xs text-center opacity-40">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        
        <div class="flex justify-between items-center px-2">
            <div>
                <p class="text-[10px] uppercase tracking-widest opacity-40">Welcome back,</p>
                <h2 id="dName" class="text-xl font-bold">User</h2>
            </div>
            <div class="w-10 h-10 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </div>

        <div class="bank-card p-7 rounded-[2rem] aspect-[1.58/1] flex flex-col justify-between overflow-hidden">
            <div class="flex justify-between items-start">
                <span class="text-xs font-bold tracking-widest opacity-80 uppercase italic">NEXUS PROTOCOL</span>
                <img src="https://img.icons8.com/color/48/000000/chip.png" class="w-10 opacity-80" />
            </div>
            <div>
                <p class="text-[9px] uppercase tracking-[0.2em] opacity-60 mb-1">Available Liquidity</p>
                <div class="text-3xl font-bold tracking-tight text-white">$ <span id="dBal">0.00</span></div>
            </div>
            <div class="flex justify-between items-end">
                <p id="dUID" class="text-[10px] font-mono tracking-[0.2em] opacity-80"></p>
                <div class="flex -space-x-2">
                    <div class="w-6 h-6 rounded-full bg-red-500/80"></div>
                    <div class="w-6 h-6 rounded-full bg-yellow-500/80"></div>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-2xl border-l-4 border-blue-500">
            <div class="flex items-center gap-2 mb-1">
                <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Live Notice Board</p>
            </div>
            <div class="scrolling-container">
                <p id="displayNotice" class="scrolling-text text-xs text-blue-100/80 font-medium">Connecting to secure broadcast node...</p>
            </div>
            
            <div id="noticeAdmin" class="hidden mt-4 pt-3 border-t border-white/5">
                <textarea id="noticeInput" placeholder="Update Notice Board..." class="w-full nexus-input p-3 rounded-xl text-[11px] mb-2 h-14 text-white"></textarea>
                <button onclick="updateNotice()" class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/30 font-bold py-2 rounded-xl text-[9px] uppercase">Publish Update</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-panel p-4 rounded-2xl">
                    <p class="text-[8px] opacity-40 uppercase mb-1">Market Cap</p>
                    <p class="text-lg font-bold text-blue-400">$<span id="totalCirc">0</span></p>
                </div>
                <div class="glass-panel p-4 rounded-2xl">
                    <p class="text-[8px] opacity-40 uppercase mb-1">Total nodes</p>
                    <p class="text-lg font-bold text-purple-400" id="totalUsers">0</p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-3xl">
                <p class="text-[10px] uppercase opacity-40 mb-4 font-bold tracking-widest">Forge Assets</p>
                <input id="forgeUID" type="text" placeholder="User UID" class="w-full nexus-input p-3 rounded-xl text-xs mb-2 text-white">
                <input id="forgeAmt" type="number" placeholder="Asset Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-3 text-white">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600/20 text-green-500 border border-green-500/20 py-3 rounded-xl text-[10px] font-bold uppercase">Mint (+)</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600/20 text-red-500 border border-red-500/20 py-3 rounded-xl text-[10px] font-bold uppercase">Burn (-)</button>
                </div>
            </div>

            <div class="glass-panel p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p class="text-[8px] opacity-40 uppercase mb-1">Dynamic Access Key</p>
                    <p id="liveOTP" class="font-mono text-yellow-500 font-bold text-xl tracking-widest">------</p>
                </div>
                <button onclick="generateNewOTP()" class="bg-blue-600/10 p-3 rounded-xl">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>

            <div id="pendingPayouts" class="space-y-2"></div>
        </div>

        <div id="userTools" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-3xl text-center">
                    <div class="w-10 h-10 bg-orange-500/10 rounded-full flex items-center justify-center mx-auto mb-3">
                        <svg class="text-orange-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20m10-10H2"/></svg>
                    </div>
                    <p class="text-xs font-bold">Transfer</p>
                </div>
                <div class="glass-panel p-5 rounded-3xl text-center">
                    <div class="w-10 h-10 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-3">
                        <svg class="text-green-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 9V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2m2 4h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2z"/></svg>
                    </div>
                    <p class="text-xs font-bold">Withdraw</p>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-[2rem]">
                <p class="text-[10px] font-bold uppercase opacity-30 mb-4 tracking-widest">New Transfer</p>
                <div class="flex gap-2 mb-3">
                    <input id="sendTo" type="text" placeholder="Receiver UID" class="flex-1 nexus-input p-3 text-xs uppercase text-white">
                    <input id="sendAmt" type="number" placeholder="Amt" class="w-20 nexus-input p-3 text-xs text-white">
                </div>
                <button onclick="executeTransfer()" class="w-full btn-primary py-3 rounded-xl font-bold text-xs">CONFIRM SEND</button>
            </div>
            
            <div class="glass-panel p-6 rounded-[2rem]">
                <p class="text-[10px] font-bold uppercase opacity-30 mb-4 tracking-widest">Payout Portal</p>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <select id="coMethod" class="flex-1 text-xs px-3 nexus-input"><option>bKash</option><option>Nagad</option><option>Rocket</option></select>
                        <input id="coAmt" type="number" placeholder="Amount" class="w-24 nexus-input p-3 text-xs text-white">
                    </div>
                    <input id="coNum" type="tel" placeholder="Mobile Wallet Number" class="w-full nexus-input p-3 text-xs text-white">
                    <button onclick="submitCashout()" class="w-full bg-white/5 border border-white/10 py-3 rounded-xl text-xs font-bold hover:bg-white/10 transition">SUBMIT WITHDRAWAL</button>
                </div>
            </div>
        </div>

        <div id="txList" class="space-y-3 pb-24"></div>
    </div>

    <div id="bottomNav" class="bottom-nav hidden">
        <div class="nav-item active">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 11v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>Assets</span>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
            <span>Settings</span>
        </div>
        <div onclick="handleLogout()" class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            <span>Exit</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
        };

        window.handleLogout = () => { if(confirm("Terminate protocol session?")) location.reload(); };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) startBank(p);
            else alert("Protocol Access Denied");
        };

        window.handleSignup = async () => {
            const otp = document.getElementById('sOTP').value;
            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(otp !== conf.data().current_otp) return alert("Access Key Invalid");
            const p = document.getElementById('sPhone').value;
            const myUID = `NEX-${Math.floor(1000+Math.random()*8999)}-${p.slice(-4)}`;
            await setDoc(doc(db, "users", p), { Name: document.getElementById('sName').value, Password: document.getElementById('sPass').value, UID: myUID.toUpperCase(), Balance: 0 });
            alert("Protocol Node Created"); location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            
            onSnapshot(doc(db, "system_config", "broadcast"), d => {
                if(d.exists()) document.getElementById('displayNotice').innerText = d.data().message;
            });

            if(phone === MASTER_PHONE) {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('userTools').classList.add('hidden');
                document.getElementById('noticeAdmin').classList.remove('hidden');
                initMaster();
            }
            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });
            onSnapshot(query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc")), sn => {
                const list = document.getElementById('txList');
                list.innerHTML = `<p class="text-[10px] uppercase opacity-30 font-bold tracking-widest ml-1 mb-3">Activity Log</p>`;
                sn.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="glass-panel p-4 rounded-2xl flex justify-between items-center mb-2">
                        <div><p class="text-xs font-semibold">${t.Title}</p><p class="text-[8px] opacity-40 uppercase">${t.Date}</p></div>
                        <p class="font-bold ${t.Amount.includes('-')?'text-red-400':'text-green-400'}">${t.Amount} $</p></div>`;
                });
            });
        }

        window.updateNotice = async () => {
            const msg = document.getElementById('noticeInput').value;
            if(!msg) return;
            await setDoc(doc(db, "system_config", "broadcast"), { message: msg });
            document.getElementById('noticeInput').value = "";
        };

        function initMaster() {
            onSnapshot(doc(db, "system_config", "access_codes"), ds => { document.getElementById('liveOTP').innerText = ds.data().current_otp; });
            onSnapshot(collection(db, "users"), snap => {
                let total = 0; snap.forEach(d => total += (d.data().Balance || 0));
                document.getElementById('totalCirc').innerText = total.toLocaleString();
                document.getElementById('totalUsers').innerText = snap.size;
            });
            onSnapshot(query(collection(db, "cashout_requests"), where("Status", "==", "Pending")), sn => {
                const list = document.getElementById('pendingPayouts');
                list.innerHTML = "";
                sn.forEach(dDoc => {
                    const r = dDoc.data();
                    list.innerHTML += `<div class="glass-panel p-4 rounded-2xl flex justify-between items-center mb-2">
                        <div><p class="text-[10px] font-bold">${r.UserName}</p><p class="text-[8px] text-yellow-500">${r.Method} • $${r.Amount}</p></div>
                        <button onclick="clearPayout('${dDoc.id}', '${r.User}', ${r.Amount}, '${r.Method}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[9px] font-bold">SETTLE</button>
                    </div>`;
                });
            });
        }

        window.generateNewOTP = async () => {
            const k = Math.floor(100000 + Math.random() * 900000).toString();
            await updateDoc(doc(db, "system_config", "access_codes"), { current_otp: k });
        };

        window.handleForge = async (type) => {
            const uid = document.getElementById('forgeUID').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            const q = query(collection(db, "users"), where("UID", "==", uid));
            const s = await getDocs(q);
            if(s.empty) return alert("Node Not Found");
            const uDoc = s.docs[0];
            const nb = type === 'MINT' ? (uDoc.data().Balance + amt) : (uDoc.data().Balance - amt);
            await updateDoc(doc(db, "users", uDoc.id), { Balance: nb });
            await addDoc(collection(db, "transactions"), { User: uDoc.id, Title: `Protocol ${type}`, Amount: (type === 'MINT' ? "+" : "-") + amt, Date: "Now", Timestamp: new Date() });
            alert("Assets Forged");
        };

        window.submitCashout = async () => {
            const p = document.getElementById('lPhone').value;
            const amt = parseInt(document.getElementById('coAmt').value);
            const s = await getDoc(doc(db, "users", p));
            if(s.data().Balance < amt) return alert("Not enough fund");
            await updateDoc(doc(db, "users", p), { Balance: s.data().Balance - amt });
            await addDoc(collection(db, "cashout_requests"), { User: p, UserName: s.data().Name, Amount: amt, Method: document.getElementById('coMethod').value, AccountNumber: document.getElementById('coNum').value, Status: "Pending", Timestamp: new Date() });
            alert("Withdrawal Logged");
        };

        window.clearPayout = async (id, p, a, m) => {
            await updateDoc(doc(db, "cashout_requests", id), { Status: "Cleared" });
            await addDoc(collection(db, "transactions"), { User: p, Title: `Withdrawal (${m})`, Amount: `-${a}`, Date: "Settled", Timestamp: new Date() });
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('sendAmt').value);
            const myP = document.getElementById('lPhone').value;
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("Target Node Not Found");
            const rDoc = rSnap.docs[0];
            const sDoc = await getDoc(doc(db, "users", myP));
            if(sDoc.data().Balance < amt) return alert("Not enough fund");
            await updateDoc(doc(db, "users", myP), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rDoc.id), { Balance: (rDoc.data().Balance || 0) + amt });
            await addDoc(collection(db, "transactions"), { User: myP, Title: "Sent to "+uid, Amount: "-"+amt, Timestamp: new Date(), Date: "Now" });
            await addDoc(collection(db, "transactions"), { User: rDoc.id, Title: "Received Assets", Amount: "+"+amt, Timestamp: new Date(), Date: "Now" });
            alert("Transfer Complete");
        };
    </script>
</body>
</html>
