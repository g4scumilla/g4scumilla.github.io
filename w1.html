<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXGEN CRYPTO Central Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #050508 60%); z-index: -1; }
        .bank-card { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .hidden { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 24px; }
        .nexus-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); outline: none; color: white; }
        .menu-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.2s; cursor: pointer; }
        .menu-item:active { transform: scale(0.92); }
        select option { background: #050508; color: white; }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">
    <div class="bg-glow"></div>

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-500 uppercase">NEXGEN</h1>
        </div>
        <div class="glass-panel p-8 w-full max-w-sm">
            <div id="loginFields">
                <input id="lPhone" type="tel" placeholder="Phone Number" class="w-full nexus-input p-4 rounded-2xl mb-4 text-center font-bold tracking-widest">
                <input id="lPass" type="tel" maxlength="6" placeholder="Enter PIN" style="-webkit-text-security: disc;" class="w-full nexus-input p-4 rounded-2xl mb-6 text-center tracking-[1em] font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl mb-4">Authorize Access</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Register Account</button>
            </div>
            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full nexus-input p-4 rounded-2xl text-center">
                <input id="sPhone" type="tel" placeholder="Mobile Number" class="w-full nexus-input p-4 rounded-2xl text-center font-bold tracking-widest">
                <input id="sPass" type="tel" maxlength="6" placeholder="Set PIN" class="w-full nexus-input p-4 rounded-2xl text-center font-bold tracking-[1em]">
                <button onclick="handleSignup()" class="w-full bg-green-600 font-bold py-4 rounded-2xl">Create Account</button>
                <button onclick="toggleAuth(true)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        
        <div class="bank-card p-8 rounded-[2.5rem] aspect-[1.6/1] flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">NEXGEN CRYPTO</h2>
                <div class="w-10 h-6 bg-white/10 rounded border border-white/20"></div>
            </div>
            <div>
                <p class="text-[9px] uppercase opacity-60 tracking-[0.3em] mb-1">Account Balance</p>
                <div class="text-4xl font-bold">$<span id="dBal">0</span></div>
            </div>
            <div class="flex justify-between items-end">
                <div><p id="dName" class="text-lg font-semibold mb-1"></p><p id="dUID" class="text-[9px] font-mono opacity-50 uppercase"></p></div>
            </div>
        </div>

        <div id="userMenu" class="grid grid-cols-4 gap-4 px-2">
            <div onclick="showModal('transferModal')" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2">
                <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-400">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                </div>
                <span class="text-[9px] font-bold uppercase opacity-60">Transfer</span>
            </div>
            <div onclick="showModal('payoutModal')" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2 text-orange-400">
                <div class="w-10 h-10 bg-orange-500/20 rounded-full flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 00 2 2h2m2 4h10a2 2 0 00 2-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 00 2 2z"/></svg>
                </div>
                <span class="text-[9px] font-bold uppercase opacity-60">Payout</span>
            </div>
            <div onclick="scrollToStatement()" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2 text-green-400">
                <div class="w-10 h-10 bg-green-500/20 rounded-full flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 2v-6m-8-5h11a2 2 0 012 2v11a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>
                </div>
                <span class="text-[9px] font-bold uppercase opacity-60">History</span>
            </div>
            <div onclick="handleLogout()" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2 text-red-400">
                <div class="w-10 h-10 bg-red-500/20 rounded-full flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </div>
                <span class="text-[9px] font-bold uppercase opacity-60">Exit</span>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-4">
            <div class="glass-panel p-6">
                <p class="text-[9px] uppercase opacity-40 mb-4 font-bold tracking-widest">Central Asset Forge</p>
                <input id="forgeInput" type="text" placeholder="UID or Phone" oninput="lookupForgeUser()" class="w-full nexus-input p-3 rounded-xl text-xs mb-2 uppercase">
                <div id="forgeTargetName" class="text-[10px] text-blue-400 font-bold mb-2 ml-1 h-4"></div>
                <input id="forgeAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600/20 text-green-400 py-3 rounded-xl text-[10px] font-bold uppercase border border-green-500/20">Mint</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600/20 text-red-400 py-3 rounded-xl text-[10px] font-bold uppercase border border-red-500/20">Burn</button>
                </div>
            </div>
            <div id="pendingPayouts" class="space-y-2"></div>
        </div>

        <div id="statementSection" class="pt-6">
            <div class="glass-panel p-5 mb-4">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-bold uppercase opacity-40">Transaction Filters</p>
                    <button onclick="downloadPDF()" class="bg-blue-600/20 text-blue-400 text-[9px] font-bold px-3 py-1.5 rounded-lg border border-blue-500/20">Export PDF</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="filterType" onchange="applyFilters()" class="nexus-input p-2 rounded-xl text-[10px]">
                        <option value="ALL">All Categories</option>
                        <option value="TRANSFER">Transfers</option>
                        <option value="PAYOUT">Payouts</option>
                        <option value="MINT">System Mint</option>
                        <option value="BURN">System Burn</option>
                    </select>
                    <input type="date" id="filterDate" onchange="applyFilters()" class="nexus-input p-2 rounded-xl text-[10px]">
                </div>
            </div>
            <div id="txList" class="space-y-2 pb-24"></div>
        </div>

        <div id="transferModal" class="hidden glass-panel p-6 mx-2">
            <p class="text-[10px] font-bold uppercase text-blue-400 mb-4">Send Assets</p>
            <input id="sendTo" type="text" placeholder="Receiver UID" class="w-full nexus-input p-3 rounded-xl text-xs uppercase mb-2">
            <input id="sendAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
            <button onclick="executeTransfer()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Confirm</button>
            <button onclick="closeModals()" class="w-full text-[10px] mt-3 opacity-30 uppercase">Cancel</button>
        </div>

        <div id="payoutModal" class="hidden glass-panel p-6 mx-2">
            <p class="text-[10px] font-bold uppercase text-orange-400 mb-4">Request Payout</p>
            <select id="coMethod" class="w-full nexus-input p-3 rounded-xl text-xs mb-2"><option>bKash</option><option>Nagad</option><option>Rocket</option></select>
            <input id="coAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-2">
            <input id="coNum" type="tel" placeholder="Wallet Number" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
            <button onclick="submitCashout()" class="w-full bg-orange-600 py-3 rounded-xl font-bold text-xs uppercase">Submit</button>
            <button onclick="closeModals()" class="w-full text-[10px] mt-3 opacity-30 uppercase">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";
        let activePhone = "";
        let masterTxData = [];

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) {
                activePhone = p;
                startBank(p);
            } else alert("Auth Failed");
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            
            if (phone === MASTER_PHONE) {
                document.getElementById('adminPanel').classList.remove('hidden');
            }

            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString();
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });

            // TRANSACTION LISTENER WITH FULL PERMISSIONS
            const qry = (phone === MASTER_PHONE) 
                ? query(collection(db, "transactions"), orderBy("Timestamp", "desc"))
                : query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));

            onSnapshot(qry, sn => {
                masterTxData = [];
                sn.forEach(d => masterTxData.push({ id: d.id, ...d.data() }));
                applyFilters();
            });
        }

        window.applyFilters = () => {
            const type = document.getElementById('filterType').value;
            const dateStr = document.getElementById('filterDate').value;
            const list = document.getElementById('txList');
            list.innerHTML = "";

            const filtered = masterTxData.filter(t => {
                const matchType = type === "ALL" || t.Category === type;
                let matchDate = true;
                if(dateStr && t.Timestamp) {
                    const txDate = new Date(t.Timestamp.seconds * 1000).toISOString().split('T')[0];
                    matchDate = txDate === dateStr;
                }
                return matchType && matchDate;
            });

            filtered.forEach(t => {
                const dStr = t.Timestamp ? new Date(t.Timestamp.seconds * 1000).toLocaleString() : "Syncing...";
                list.innerHTML += `<div class="glass-panel p-4 flex justify-between items-center mb-2">
                    <div>
                        <p class="text-[11px] font-bold uppercase tracking-tight">${t.Title}</p>
                        <p class="text-[8px] opacity-40">${dStr} • Ref: ${t.Ref || 'SYSTEM'}</p>
                    </div>
                    <p class="font-bold ${t.Amount.toString().includes('-')?'text-red-400':'text-green-400'}">${t.Amount} $</p>
                </div>`;
            });
        };

        window.downloadPDF = () => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            const name = document.getElementById('dName').innerText;
            const uid = document.getElementById('dUID').innerText;

            docPdf.setFontSize(20);
            docPdf.text("NEXGEN CENTRAL PROTOCOL", 105, 20, { align: 'center' });
            docPdf.setFontSize(10);
            docPdf.text(`Account Statement for: ${name} (${uid})`, 105, 28, { align: 'center' });
            docPdf.text(`Generated on: ${new Date().toLocaleString()}`, 105, 34, { align: 'center' });

            const rows = [];
            // PDF prints current filtered view
            const type = document.getElementById('filterType').value;
            const dateStr = document.getElementById('filterDate').value;
            
            masterTxData.filter(t => {
                const matchType = type === "ALL" || t.Category === type;
                let matchDate = true;
                if(dateStr && t.Timestamp) {
                    const txDate = new Date(t.Timestamp.seconds * 1000).toISOString().split('T')[0];
                    matchDate = txDate === dateStr;
                }
                return matchType && matchDate;
            }).forEach(t => {
                const d = t.Timestamp ? new Date(t.Timestamp.seconds * 1000).toLocaleString() : "N/A";
                rows.push([d, t.Title, t.Ref || 'SYSTEM', t.Amount + " $"]);
            });

            docPdf.autoTable({
                startY: 45,
                head: [['Date/Time', 'Action', 'Reference', 'Amount']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [30, 58, 138] }
            });

            docPdf.save(`NEXGEN_Report_${name}.pdf`);
        };

        // ENFORCED DUAL-ENTRY LOGIC FOR EVERY TRANSACTION
        window.handleForge = async (type) => {
            const val = document.getElementById('forgeInput').value.trim();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            if(!val || isNaN(amt)) return;

            let targetId = null;
            let targetData = null;

            const q = query(collection(db, "users"), where("UID", "==", val.toUpperCase()));
            const snap = await getDocs(q);
            if(!snap.empty) { targetId = snap.docs[0].id; targetData = snap.docs[0].data(); }
            else { 
                const s = await getDoc(doc(db, "users", val)); 
                if(s.exists()) { targetId = s.id; targetData = s.data(); }
            }

            if(!targetId) return alert("User Not Found");

            const newBal = type === 'MINT' ? (targetData.Balance + amt) : (targetData.Balance - amt);
            await updateDoc(doc(db, "users", targetId), { Balance: newBal });
            await addDoc(collection(db, "transactions"), { 
                User: targetId, Title: `Central Asset ${type}`, Category: type, Ref: "ADMIN_FORGE", Amount: (type === 'MINT' ? "+" : "-") + amt, Timestamp: serverTimestamp() 
            });
            alert("Protocol Updated");
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('sendAmt').value);
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("UID Not Found");
            const rDoc = rSnap.docs[0];
            const sDoc = await getDoc(doc(db, "users", activePhone));
            if(sDoc.data().Balance < amt) return alert("Insufficient Funds");

            await updateDoc(doc(db, "users", activePhone), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rDoc.id), { Balance: (rDoc.data().Balance || 0) + amt });

            // Dual receipt
            await addDoc(collection(db, "transactions"), { 
                User: activePhone, Title: "Sent to "+uid, Category: "TRANSFER", Ref: uid, Amount: "-"+amt, Timestamp: serverTimestamp() 
            });
            await addDoc(collection(db, "transactions"), { 
                User: rDoc.id, Title: "Received Assets", Category: "TRANSFER", Ref: sDoc.data().UID, Amount: "+"+amt, Timestamp: serverTimestamp() 
            });
            closeModals();
        };

        window.submitCashout = async () => {
            const amt = parseInt(document.getElementById('coAmt').value);
            const s = await getDoc(doc(db, "users", activePhone));
            if(s.data().Balance < amt) return alert("Insufficient Funds");
            await updateDoc(doc(db, "users", activePhone), { Balance: s.data().Balance - amt });
            await addDoc(collection(db, "cashout_requests"), { User: activePhone, UserName: s.data().Name, Amount: amt, Method: document.getElementById('coMethod').value, AccountNumber: document.getElementById('coNum').value, Status: "Pending", Timestamp: serverTimestamp() });
            await addDoc(collection(db, "transactions"), { 
                User: activePhone, Title: "Payout Requested", Category: "PAYOUT", Ref: document.getElementById('coNum').value, Amount: "-"+amt, Timestamp: serverTimestamp() 
            });
            closeModals();
        };

        window.showModal = (id) => { closeModals(); document.getElementById(id).classList.remove('hidden'); };
        window.closeModals = () => { document.getElementById('transferModal').classList.add('hidden'); document.getElementById('payoutModal').classList.add('hidden'); };
        window.scrollToStatement = () => document.getElementById('statementSection').scrollIntoView({ behavior: 'smooth' });
        window.handleLogout = () => location.reload();
        window.toggleAuth = (isLogin) => { document.getElementById('loginFields').classList.toggle('hidden', !isLogin); document.getElementById('signupFields').classList.toggle('hidden', isLogin); };
    </script>
</body>
</html>
