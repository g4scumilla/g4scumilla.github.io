<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Bank - Abdullahil Kuafi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-gradient-to-br from-blue-600 to-indigo-900 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-white/10">
        <div class="flex justify-between items-start mb-12">
            <div>
                <h2 class="text-2xl font-black tracking-tighter italic">NEX1</h2>
                <p id="statusDisplay" class="text-[10px] tracking-[0.2em] opacity-60 uppercase">Connecting...</p>
            </div>
            <div class="w-12 h-9 bg-yellow-400/80 rounded-md shadow-inner"></div>
        </div>
        
        <p class="text-xs uppercase opacity-50 mb-1 font-semibold tracking-wider">Total Balance</p>
        <div class="text-5xl font-bold mb-10 flex items-center">
            <span class="text-2xl mr-1 opacity-80">৳</span>
            <span id="balanceDisplay">0</span>
        </div>

        <div class="flex justify-between items-end">
            <div>
                <p class="text-[9px] uppercase opacity-40 mb-1">Account Holder</p>
                <p id="nameDisplay" class="text-lg font-medium tracking-wide">Loading...</p>
                <p id="districtDisplay" class="text-[10px] opacity-60"></p>
            </div>
            <div class="text-right">
                <p class="text-[9px] uppercase opacity-40 mb-1">Status</p>
                <p id="userStatus" class="text-xs font-mono font-bold text-green-400"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. PLACE YOUR REAL KEYS HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. USE YOUR PHONE NUMBER (Ensure no spaces)
        const userRef = doc(db, "users", "01747479667");

        onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Matching your specific Firebase field names (Case Sensitive)
                document.getElementById("balanceDisplay").innerText = Number(data.Balance).toLocaleString();
                document.getElementById("nameDisplay").innerText = data.Name;
                document.getElementById("DistrictDisplay").innerText = data.District;
                document.getElementById("userStatus").innerText = data.Status;
                document.getElementById("statusDisplay").innerText = "Digital Banking";
                
                console.log("Welcome,", data.Name);
            } else {
                document.getElementById("nameDisplay").innerText = "User Not Found";
                console.log("No document found with that phone number.");
            }
        }, (error) => {
            console.error("Firebase Error:", error.message);
        });
    </script>
</body>
</html>
