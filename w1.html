<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Bank Pro - Abdullahil Kuafi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 flex flex-col items-center">

    <div class="w-full max-w-sm mb-6 flex justify-between items-center px-2">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] uppercase tracking-widest opacity-50">Live Network</span>
        </div>
        <div id="liveClock" class="text-[11px] font-mono bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30">
            00:00:00
        </div>
    </div>

    <div class="bg-gradient-to-br from-indigo-600 via-blue-700 to-indigo-900 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-white/10 relative overflow-hidden mb-8">
        <div class="flex justify-between items-start mb-12 relative z-10">
            <div>
                <h2 class="text-2xl font-black tracking-tighter italic">NEX1</h2>
                <p id="statusDisplay" class="text-[9px] tracking-[0.3em] opacity-60 uppercase">Digital Banking</p>
            </div>
            <div class="w-12 h-9 bg-yellow-400/70 rounded-md shadow-inner flex flex-col justify-around p-1">
                <div class="h-[1px] bg-black/10 w-full"></div><div class="h-[1px] bg-black/10 w-full"></div>
            </div>
        </div>
        
        <p class="text-[10px] uppercase opacity-50 mb-1 font-bold tracking-widest relative z-10">Total Balance</p>
        <div class="text-5xl font-bold mb-10 relative z-10 flex items-baseline">
            <span class="text-2xl mr-1 opacity-70">৳</span>
            <span id="balanceDisplay">0</span>
        </div>

        <div class="flex justify-between items-end relative z-10">
            <div>
                <p class="text-[8px] uppercase opacity-40 mb-1 font-bold">Account Holder</p>
                <p id="nameDisplay" class="text-lg font-medium tracking-wide">Loading...</p>
                <p id="districtDisplay" class="text-[10px] opacity-60 mt-0.5 font-light"></p>
            </div>
            <div class="text-right">
                <p id="userStatus" class="text-[10px] font-bold text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20 uppercase tracking-tighter">
                    Active
                </p>
            </div>
        </div>

        <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-sm mb-10">
        <button onclick="alert('The Transfer system is currently being integrated for your Cumilla branch account.')" 
                class="w-full bg-white text-black font-bold py-4 rounded-2xl flex justify-center items-center gap-2 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
            Send Money
        </button>
    </div>

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="text-xs font-bold opacity-40 uppercase tracking-widest">Recent Activity</h3>
            <span class="text-[10px] text-blue-400 opacity-80">View All</span>
        </div>
        <div id="transactionList" class="space-y-3">
            <div class="animate-pulse flex space-x-4 bg-gray-800/30 p-4 rounded-2xl">
                <div class="flex-1 space-y-2 py-1">
                    <div class="h-2 bg-gray-700 rounded w-3/4"></div>
                    <div class="h-2 bg-gray-700 rounded w-1/4"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPhone = "01747479667";

        // LIVE CLOCK FUNCTION
        function updateClock() {
            const now = new Date();
            document.getElementById("liveClock").innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // PROFILE & BALANCE REAL-TIME UPDATE
        onSnapshot(doc(db, "users", userPhone), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("balanceDisplay").innerText = Number(data.Balance || 0).toLocaleString();
                document.getElementById("nameDisplay").innerText = data.Name || "User";
                // Fixed the District undefined issue with a fallback
                document.getElementById("districtDisplay").innerText = data.District || "Cumilla";
                document.getElementById("userStatus").innerText = data.Status || "Active";
            }
        });

        // TRANSACTION HISTORY LIST
        // Note: Make sure you create a 'transactions' collection in Firebase
        const q = query(
            collection(db, "transactions"), 
            where("User", "==", userPhone),
            limit(5)
        );

        onSnapshot(q, (snapshot) => {
            const listBody = document.getElementById("transactionList");
            listBody.innerHTML = ""; 
            
            if (snapshot.empty) {
                listBody.innerHTML = `
                    <div class="bg-gray-800/20 p-8 rounded-2xl text-center border border-dashed border-white/5">
                        <p class="text-xs opacity-30 italic">No transactions found for this account.</p>
                    </div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const tx = doc.data();
                const amount = String(tx.Amount);
                const isNegative = amount.includes('-');
                
                listBody.innerHTML += `
                    <div class="bg-gray-800/40 p-4 rounded-2xl flex justify-between items-center border border-white/5 hover:bg-gray-800/60 transition">
                        <div>
                            <p class="font-medium text-sm text-gray-200">${tx.Title || 'Transaction'}</p>
                            <p class="text-[9px] opacity-40 uppercase tracking-tighter">${tx.Date || 'Recent'}</p>
                        </div>
                        <p class="font-bold ${isNegative ? 'text-red-400' : 'text-green-400'}">
                            ${amount} ৳
                        </p>
                    </div>
                `;
            });
        }, (err) => {
            console.log("Transaction Error:", err);
            document.getElementById("transactionList").innerHTML = "<p class='text-[10px] opacity-30 text-center'>History currently unavailable.</p>";
        });
    </script>
</body>
</html>
