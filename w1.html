<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Central Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        .bank-card { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .bank-card::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 90%; background-image: url('https://www.transparentpng.com/download/flower/lotus-flower-free-png-transparent-8.png'); background-size: contain; background-repeat: no-repeat; opacity: 0.1; filter: brightness(2); pointer-events: none; }
        .hidden { display: none; }
        body { background-color: #0a0a0c; color: white; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen font-sans p-4 pb-24">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-500">NEX1</h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-40 mt-2">Central Bank Protocol</p>
        </div>

        <div class="bg-gray-900/50 p-8 rounded-[2.5rem] w-full max-w-sm border border-white/5 backdrop-blur-xl">
            <div id="loginFields">
                <input id="lPhone" type="tel" placeholder="Phone Number" class="w-full bg-black/40 p-4 rounded-2xl mb-4 outline-none border border-white/5 focus:border-blue-500 transition text-white">
                <input id="lPass" type="tel" inputmode="numeric" maxlength="6" placeholder="Enter PIN" style="-webkit-text-security: disc;" class="w-full bg-black/40 p-4 rounded-2xl mb-6 outline-none border border-white/5 focus:border-blue-500 transition text-white text-center tracking-[1em] font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl mb-4 active:scale-95 transition text-white">Authorize Access</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Create New Account</button>
            </div>

            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5 text-white">
                <input id="sPhone" type="tel" placeholder="Mobile Number" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5 text-white">
                <input id="sPass" type="tel" inputmode="numeric" maxlength="6" placeholder="Set 6-Digit PIN" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5 text-white text-center">
                <div>
                    <input id="sRefer" type="text" placeholder="Referral (UID)" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5 text-white uppercase" oninput="lookupReferrer()">
                    <p id="referNameDisplay" class="text-[10px] mt-2 ml-2 font-medium text-blue-400 hidden"></p>
                </div>
                <div class="pt-2 border-t border-white/5 mt-4">
                    <p class="text-[9px] uppercase opacity-40 mb-2 ml-2 text-white">6-Digit Access Key</p>
                    <input id="sOTP" type="tel" maxlength="6" placeholder="000000" class="w-full bg-red-900/10 p-4 rounded-2xl outline-none border border-red-500/20 text-center font-mono tracking-[0.5em] text-red-400">
                </div>
                <button onclick="handleSignup()" class="w-full bg-green-600 font-bold py-4 rounded-2xl text-white shadow-lg">Initialize Account</button>
                <button onclick="toggleAuth(true)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        
        <div class="flex justify-end">
            <button onclick="handleLogout()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 flex items-center gap-1 transition p-2">
                Secure Exit 
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>

        <div id="adminPanel" class="hidden bg-red-600/10 border border-red-500/30 p-6 rounded-[2.5rem]">
            <h3 class="text-red-500 text-[11px] font-black uppercase tracking-widest mb-5 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Master Terminal
            </h3>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] opacity-50 uppercase mb-1">Circulation</p>
                    <p class="text-lg font-bold text-blue-400">৳<span id="totalCirc">0</span></p>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] opacity-50 uppercase mb-1">Users</p>
                    <p class="text-lg font-bold text-purple-400" id="totalUsers">0</p>
                </div>
            </div>

            <div class="mb-6 p-4 bg-white/5 rounded-2xl border border-white/5">
                <p class="text-[9px] uppercase opacity-50 mb-3 tracking-widest text-white">Currency Forge</p>
                <div class="space-y-2">
                    <input id="forgeUID" type="text" placeholder="Target UID" class="w-full bg-black/40 p-3 rounded-xl text-[10px] outline-none border border-white/5 uppercase text-white">
                    <input id="forgeAmt" type="number" placeholder="৳ Amount" class="w-full bg-black/40 p-3 rounded-xl text-[10px] outline-none border border-white/5 text-white">
                    <div class="flex gap-2">
                        <button onclick="handleForge('MINT')" class="flex-1 bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase active:scale-95 transition">Mint (+)</button>
                        <button onclick="handleForge('BURN')" class="flex-1 bg-red-600 text-white py-3 rounded-xl text-[10px] font-black uppercase active:scale-95 transition">Burn (-)</button>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between bg-black/60 p-4 rounded-2xl border border-red-500/10">
                    <div><p class="text-[8px] opacity-40 uppercase">Access Key</p><p id="liveOTP" class="font-mono text-yellow-500 font-bold text-xl tracking-widest">------</p></div>
                    <button onclick="generateNewOTP()" class="bg-red-600 px-4 py-2 rounded-xl text-[10px] font-bold active:scale-90 transition">Refresh</button>
                </div>
                <div class="flex gap-2">
                    <input id="reportDate" type="date" class="flex-1 bg-black p-4 rounded-2xl text-[10px] border border-white/5 text-white outline-none">
                    <button onclick="generatePDFReport()" class="bg-white text-black px-5 rounded-2xl text-[10px] font-black uppercase">Audit</button>
                </div>
                <p class="text-[9px] uppercase opacity-40 mt-4 mb-2 ml-1">Pending Cashouts</p>
                <div id="pendingPayouts" class="space-y-2"></div>
            </div>
        </div>

        <div class="bank-card p-8 rounded-[2.5rem] shadow-2xl aspect-[1.6/1] flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <h2 class="text-2xl font-black italic tracking-tighter">NEX1</h2>
                <div class="w-12 h-9 bg-gradient-to-br from-yellow-200 to-yellow-600 rounded-lg opacity-70"></div>
            </div>
            <div>
                <p class="text-[9px] uppercase opacity-50 tracking-[0.3em] mb-1">Total Assets</p>
                <div class="text-4xl font-bold">৳<span id="dBal">0</span></div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <p id="dName" class="text-lg font-medium leading-none mb-1"></p>
                    <p id="dUID" class="text-[9px] font-mono opacity-40 uppercase tracking-widest"></p>
                </div>
            </div>
        </div>

        <div id="userTools" class="space-y-6">
            <div class="bg-gray-900/40 p-6 rounded-[2.5rem] border border-white/5">
                <p class="text-[10px] font-bold uppercase opacity-30 tracking-widest mb-4 text-blue-400">Transfer Capital</p>
                <div class="space-y-4">
                    <input id="sendTo" type="text" placeholder="Recipient UID" class="w-full bg-black/40 p-4 rounded-2xl text-xs outline-none uppercase border border-white/5 text-white">
                    <div class="flex gap-2">
                        <input id="sendAmt" type="number" placeholder="৳ Amount" class="flex-1 bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5 text-white">
                        <button onclick="executeTransfer()" class="bg-blue-600 px-8 rounded-2xl font-bold transition active:scale-95">Send</button>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900/40 p-6 rounded-[2.5rem] border border-white/5">
                <p class="text-[10px] font-bold uppercase opacity-30 tracking-widest mb-4 text-orange-400">Request Withdrawal</p>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <select id="coMethod" class="bg-black/40 p-4 rounded-2xl text-xs flex-1 outline-none border border-white/5 text-white">
                            <option>bKash</option><option>Nagad</option><option>Rocket</option>
                        </select>
                        <input id="coAmt" type="number" placeholder="৳" class="bg-black/40 p-4 rounded-2xl text-xs flex-1 outline-none border border-white/5 text-white">
                    </div>
                    <input id="coNum" type="tel" placeholder="Account Number" class="w-full bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5 text-white">
                    <button onclick="submitCashout()" class="w-full bg-orange-600/10 border border-orange-500/20 py-4 rounded-2xl text-[11px] font-bold text-orange-500 transition active:scale-95">Request Payout</button>
                </div>
            </div>
        </div>

        <div id="txList" class="space-y-3 pb-12"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
        };

        window.handleLogout = () => {
            if(confirm("Securely close your session?")) {
                document.getElementById('lPass').value = "";
                document.getElementById('mainDashboard').classList.add('hidden');
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('userTools').classList.remove('hidden');
                window.scrollTo(0,0);
            }
        };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            if(!p || !pin) return alert("Enter credentials");
            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) startBank(p);
            else alert("Phone or PIN incorrect.");
        };

        window.lookupReferrer = async () => {
            const val = document.getElementById('sRefer').value.toUpperCase().trim();
            const disp = document.getElementById('referNameDisplay');
            if(val.length < 5) return disp.classList.add('hidden');
            const snap = await getDocs(query(collection(db, "users"), where("UID", "==", val)));
            if(!snap.empty) {
                disp.innerText = "✓ Found: " + snap.docs[0].data().Name;
                disp.className = "text-[10px] mt-2 ml-2 text-blue-400";
                disp.classList.remove('hidden');
            } else {
                disp.innerText = "⚠ Not Found";
                disp.className = "text-[10px] mt-2 ml-2 text-red-400";
                disp.classList.remove('hidden');
            }
        };

        window.handleSignup = async () => {
            const name = document.getElementById('sName').value;
            const phone = document.getElementById('sPhone').value;
            const pin = document.getElementById('sPass').value;
            const otp = document.getElementById('sOTP').value;
            if(!name || !phone || !pin || !otp) return alert("Fill all fields");
            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(otp !== conf.data().current_otp) return alert("Invalid Key");
            const myUID = `NEX-${Math.floor(1000+Math.random()*8999)}-${phone.slice(-4)}`;
            await setDoc(doc(db, "users", phone), { Name: name, Password: pin, UID: myUID, Balance: 0 });
            alert("Protocol Initialized! UID: " + myUID);
            location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if(phone === MASTER_PHONE) {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('userTools').classList.add('hidden');
                initMaster();
            }
            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString();
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });
            const q = query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('txList');
                list.innerHTML = `<p class="text-[10px] font-bold uppercase opacity-30 tracking-[0.4em] mb-4 text-blue-400">Statement</p>`;
                sn.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between border border-white/5">
                        <div><p class="text-xs font-semibold">${t.Title}</p><p class="text-[8px] opacity-40">${t.Date}</p></div>
                        <p class="font-bold ${t.Amount.includes('-')?'text-red-400':'text-green-400'}">${t.Amount} ৳</p></div>`;
                });
            });
        }

        function initMaster() {
            onSnapshot(doc(db, "system_config", "access_codes"), ds => document.getElementById('liveOTP').innerText = ds.data().current_otp);
            onSnapshot(collection(db, "users"), snap => {
                let total = 0; snap.forEach(d => total += (d.data().Balance || 0));
                document.getElementById('totalCirc').innerText = total.toLocaleString();
                document.getElementById('totalUsers').innerText = snap.size;
            });
            const qP = query(collection(db, "cashout_requests"), where("Status", "==", "Pending"));
            onSnapshot(qP, sn => {
                const list = document.getElementById('pendingPayouts');
                list.innerHTML = "";
                sn.forEach(dDoc => {
                    const r = dDoc.data();
                    list.innerHTML += `<div class="bg-black/60 p-4 rounded-2xl border border-white/10 mb-2">
                        <p class="text-[10px] font-bold text-white">${r.UserName} - ৳${r.Amount}</p>
                        <p class="text-[8px] opacity-50 mb-3">${r.Method} • ${r.AccountNumber}</p>
                        <button onclick="clearPayout('${dDoc.id}', '${r.User}', ${r.Amount}, '${r.Method}')" class="w-full bg-green-600 text-[10px] font-bold py-2 rounded-xl active:scale-95 transition">MARK PAID</button>
                    </div>`;
                });
            });
        }

        window.handleForge = async (type) => {
            const uid = document.getElementById('forgeUID').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            if(!uid || !amt) return alert("Enter UID & Amount");
            const q = query(collection(db, "users"), where("UID", "==", uid));
            const s = await getDocs(q);
            if(s.empty) return alert("UID Not Found");
            const uDoc = s.docs[0];
            const current = uDoc.data().Balance || 0;
            if(type === 'BURN' && current < amt) return alert("Insufficient user balance");
            const nb = type === 'MINT' ? current + amt : current - amt;
            await updateDoc(doc(db, "users", uDoc.id), { Balance: nb });
            await addDoc(collection(db, "transactions"), { User: uDoc.id, Title: type === 'MINT' ? "Central Issue" : "Central Recovery", Amount: (type === 'MINT' ? "+" : "-") + amt, Date: "Today", Timestamp: new Date() });
            alert("Forge Successful");
        };

        window.clearPayout = async (id, p, a, m) => {
            if(!confirm("Mark this as paid?")) return;
            await updateDoc(doc(db, "cashout_requests", id), { Status: "Cleared" });
            await addDoc(collection(db, "transactions"), { User: p, Title: `Payout (${m})`, Amount: `-${a}`, Date: "Today", Timestamp: new Date() });
        };

        window.generateNewOTP = async () => {
            const k = Math.floor(100000+Math.random()*900000).toString();
            await updateDoc(doc(db, "system_config", "access_codes"), { current_otp: k });
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('sendAmt').value);
            const myP = document.getElementById('lPhone').value;
            if(!uid || !amt) return alert("Fill data");
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("User not found");
            const rDoc = rSnap.docs[0];
            const sDoc = await getDoc(doc(db, "users", myP));
            if(sDoc.data().Balance < amt) return alert("Insufficient Balance");
            await updateDoc(doc(db, "users", myP), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rDoc.id), { Balance: (rDoc.data().Balance || 0) + amt });
            const ts = { Timestamp: new Date(), Date: "Now" };
            await addDoc(collection(db, "transactions"), { ...ts, User: myP, Title: "To: "+rDoc.data().Name, Amount: "-"+amt });
            await addDoc(collection(db, "transactions"), { ...ts, User: rDoc.id, Title: "From: "+sDoc.data().Name, Amount: "+"+amt });
            alert("Transfer Complete");
        };

        window.submitCashout = async () => {
            const p = document.getElementById('lPhone').value;
            const amt = parseInt(document.getElementById('coAmt').value);
            const m = document.getElementById('coMethod').value;
            const n = document.getElementById('coNum').value;
            const s = await getDoc(doc(db, "users", p));
            if(s.data().Balance < amt) return alert("Insufficient Balance");
            await updateDoc(doc(db, "users", p), { Balance: s.data().Balance - amt });
            await addDoc(collection(db, "cashout_requests"), { User: p, UserName: s.data().Name, Amount: amt, Method: m, AccountNumber: n, Status: "Pending", Date: new Date().toISOString().split('T')[0], Timestamp: new Date() });
            alert("Requested successfully!");
        };

        window.generatePDFReport = async () => {
            const d = document.getElementById('reportDate').value;
            if(!d) return alert("Pick a date");
            const s = await getDocs(query(collection(db, "cashout_requests"), where("Date", "==", d)));
            const { jsPDF } = window.jspdf;
            const docP = new jsPDF();
            docP.text("Nex1 Audit Report: " + d, 14, 20);
            const rows = []; s.forEach(x => { const v = x.data(); rows.push([v.UserName, v.Method, v.AccountNumber, v.Amount, v.Status]); });
            docP.autoTable({ startY: 30, head: [['User', 'Method', 'Acc', 'Amt', 'Status']], body: rows });
            docP.save(`Nex1_Audit_${d}.pdf`);
        };
    </script>
</body>
</html>
