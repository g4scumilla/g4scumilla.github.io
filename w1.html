<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Central - Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bank-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* The Flower Watermark */
        .bank-card::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 90%;
            background-image: url('https://www.transparentpng.com/download/flower/lotus-flower-free-png-transparent-8.png');
            background-size: contain; background-repeat: no-repeat;
            opacity: 0.12; filter: brightness(2) grayscale(100%); pointer-events: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-white min-h-screen font-sans p-6">

    <div id="loginSection" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">NEX1</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] opacity-40">Central Banking</p>
        </div>
        <div class="bg-gray-900/50 p-8 rounded-[2.5rem] w-full max-w-sm border border-white/5 backdrop-blur-xl">
            <input id="loginPhone" type="tel" placeholder="Mobile Number" class="w-full bg-black/40 p-4 rounded-2xl mb-4 outline-none border border-white/5 focus:border-blue-500 transition">
            <input id="loginPass" type="password" placeholder="Secure Password" class="w-full bg-black/40 p-4 rounded-2xl mb-6 outline-none border border-white/5 focus:border-blue-500 transition">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">Authorize Access</button>
        </div>
    </div>

    <div id="dashboardSection" class="hidden max-w-sm mx-auto">
        
        <div id="adminPanel" class="hidden bg-red-600/10 border border-red-500/30 p-6 rounded-[2rem] mb-8 shadow-[0_0_20px_rgba(220,38,38,0.1)]">
            <h3 class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Master Currency Control
            </h3>
            <div class="space-y-3">
                <input id="targetUser" type="tel" placeholder="User Phone (e.g. 017...)" class="w-full bg-black p-4 rounded-2xl text-sm border border-white/5 outline-none focus:border-red-500">
                <div class="flex gap-2">
                    <button onclick="adjustBalance(true)" class="flex-1 bg-green-600/20 text-green-500 border border-green-500/30 font-bold py-3 rounded-xl text-xs hover:bg-green-600 hover:text-white transition">+ Mint Money</button>
                    <button onclick="adjustBalance(false)" class="flex-1 bg-red-600/20 text-red-500 border border-red-500/30 font-bold py-3 rounded-xl text-xs hover:bg-red-600 hover:text-white transition">- Burn Money</button>
                </div>
                <input id="adjustAmt" type="number" placeholder="Enter Amount ৳" class="w-full bg-black p-4 rounded-2xl text-sm border border-white/5 outline-none">
            </div>
        </div>

        <div class="bank-card p-8 rounded-[2.5rem] shadow-2xl mb-8 aspect-[1.6/1] flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <h2 class="text-2xl font-black italic tracking-tighter">NEX1</h2>
                <div class="w-12 h-9 bg-gradient-to-br from-yellow-200 to-yellow-600 rounded-lg opacity-70"></div>
            </div>
            
            <div>
                <p class="text-[9px] uppercase opacity-50 tracking-[0.3em] mb-1">Total Assets</p>
                <div class="text-4xl font-bold">৳<span id="bal">0</span></div>
            </div>

            <div class="flex justify-between items-end">
                <div>
                    <p id="userName" class="text-lg font-medium leading-none mb-1"></p>
                    <p id="userUID" class="text-[9px] font-mono opacity-40 tracking-[0.2em] uppercase"></p>
                </div>
                <p id="dist" class="text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/10 font-bold text-blue-100"></p>
            </div>
        </div>

        <h3 class="text-[10px] font-bold uppercase opacity-30 tracking-[0.4em] mb-4 ml-2 text-blue-400">Audit Ledger</h3>
        <div id="txList" class="space-y-3 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const adminPhone = "01747479667"; 

        window.handleLogin = async () => {
            const phone = document.getElementById('loginPhone').value;
            const pass = document.getElementById('loginPass').value;
            const userDoc = await getDoc(doc(db, "users", phone));
            
            if(userDoc.exists() && userDoc.data().Password === pass) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                if(phone === adminPhone) document.getElementById('adminPanel').classList.remove('hidden');
                startSync(phone);
            } else {
                alert("Authorization Failed");
            }
        };

        // THE MASTER POWER FUNCTION
        window.adjustBalance = async (isAdding) => {
            const target = document.getElementById('targetUser').value;
            const amount = parseInt(document.getElementById('adjustAmt').value);
            
            if(!target || !amount) return alert("Enter Target Phone & Amount");

            const ref = doc(db, "users", target);
            const snap = await getDoc(ref);

            if(snap.exists()) {
                const currentBal = snap.data().Balance || 0;
                const newBal = isAdding ? currentBal + amount : currentBal - amount;
                
                await updateDoc(ref, { Balance: newBal });
                
                // Add to Global Ledger
                await addDoc(collection(db, "transactions"), {
                    User: target,
                    Title: isAdding ? "Central Credit" : "Central Debit",
                    Amount: (isAdding ? "+" : "-") + amount,
                    Date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
                });
                
                alert(`Master Ledger Updated: ৳${amount} ${isAdding ? 'Minted' : 'Burned'}`);
                document.getElementById('targetUser').value = "";
                document.getElementById('adjustAmt').value = "";
            } else {
                alert("User Account Not Found");
            }
        };

        function startSync(phone) {
            onSnapshot(doc(db, "users", phone), (ds) => {
                const d = ds.data();
                document.getElementById('bal').innerText = Number(d.Balance || 0).toLocaleString();
                document.getElementById('userName').innerText = d.Name;
                document.getElementById('dist').innerText = d.District || "Cumilla";
                document.getElementById('userUID').innerText = d.UID || "NEX-WAITING";
            });

            const q = query(collection(db, "transactions"), where("User", "==", phone));
            onSnapshot(q, (sn) => {
                const list = document.getElementById('txList');
                list.innerHTML = "";
                sn.forEach(doc => {
                    const t = doc.data();
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between border border-white/5">
                        <div><p class="text-sm font-semibold">${t.Title}</p><p class="text-[9px] opacity-40 uppercase tracking-tighter">${t.Date}</p></div>
                        <p class="font-bold ${String(t.Amount).includes('-') ? 'text-red-400' : 'text-green-400'}">${t.Amount} ৳</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
