<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Central Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0a0a0c; color: white; font-family: 'Inter', sans-serif; }
        .bank-card { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .bank-card::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 90%; background-image: url('https://www.transparentpng.com/download/flower/lotus-flower-free-png-transparent-8.png'); background-size: contain; background-repeat: no-repeat; opacity: 0.1; filter: brightness(2); pointer-events: none; }
        .hidden { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-500">NEX1</h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-40 mt-2">Central Bank Protocol</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm">
            <div id="loginFields">
                <input id="lPhone" type="tel" placeholder="Phone Number" class="w-full bg-black/40 p-4 rounded-2xl mb-4 outline-none border border-white/5 focus:border-blue-500 transition text-white">
                <input id="lPass" type="tel" maxlength="6" placeholder="PIN" style="-webkit-text-security: disc;" class="w-full bg-black/40 p-4 rounded-2xl mb-4 outline-none border border-white/5 focus:border-blue-500 text-center font-bold tracking-widest">
                <input id="lAccess" type="tel" maxlength="6" placeholder="Access Code" class="w-full bg-blue-900/10 p-4 rounded-2xl mb-6 outline-none border border-blue-500/20 text-center font-mono tracking-[0.3em] text-blue-400">
                <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl mb-4 active:scale-95 transition">Authorize Access</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Create New Account</button>
            </div>

            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5">
                <input id="sPhone" type="tel" placeholder="Mobile Number" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5">
                <input id="sPass" type="tel" maxlength="6" placeholder="Set 6-Digit PIN" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/5 text-center">
                <div class="pt-2 border-t border-white/5 mt-4 text-center">
                    <p class="text-[9px] uppercase opacity-40 mb-2">Required Access Key</p>
                    <input id="sOTP" type="tel" maxlength="6" placeholder="000000" class="w-full bg-red-900/10 p-4 rounded-2xl outline-none border border-red-500/20 text-center font-mono tracking-[0.5em] text-red-400">
                </div>
                <button onclick="handleSignup()" class="w-full bg-green-600 font-bold py-4 rounded-2xl shadow-lg">Initialize Identity</button>
                <button onclick="toggleAuth(true)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Return to Login</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        
        <div class="flex justify-end">
            <button onclick="handleLogout()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 flex items-center gap-1 transition p-2">
                Secure Exit 
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            </button>
        </div>

        <div id="adminPanel" class="hidden bg-red-600/10 border border-red-500/30 p-6 rounded-[2.5rem] space-y-6">
            <div class="flex items-center justify-between">
                <h3 class="text-red-500 text-[11px] font-black uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Master Terminal
                </h3>
                <div class="text-right">
                    <p class="text-[8px] opacity-50 uppercase">Circulation</p>
                    <p class="text-sm font-bold text-blue-400">৳<span id="totalCirc">0</span></p>
                </div>
            </div>
            
            <div class="flex items-center justify-between bg-black/60 p-5 rounded-2xl border border-red-500/10">
                <div>
                    <p class="text-[8px] opacity-40 uppercase">Live Access Key</p>
                    <p id="liveOTP" class="font-mono text-yellow-500 font-bold text-2xl tracking-widest">------</p>
                </div>
                <button onclick="generateNewOTP()" class="bg-red-600 px-5 py-3 rounded-xl text-[10px] font-bold active:scale-90 transition">REFRESH</button>
            </div>

            <div class="bg-white/5 p-5 rounded-2xl border border-white/5 space-y-3">
                <input id="forgeUID" type="text" placeholder="Target UID" class="w-full bg-black/40 p-3 rounded-xl text-[10px] outline-none uppercase">
                <input id="forgeAmt" type="number" placeholder="৳ Amount" class="w-full bg-black/40 p-3 rounded-xl text-[10px] outline-none">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600 py-3 rounded-xl text-[10px] font-black uppercase">Mint</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Burn</button>
                </div>
            </div>
            
            <div id="pendingPayouts" class="space-y-2"></div>
        </div>

        <div class="bank-card p-8 rounded-[2.5rem] shadow-2xl aspect-[1.6/1] flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <h2 class="text-2xl font-black italic tracking-tighter">NEX1</h2>
                <div class="w-10 h-7 bg-gradient-to-br from-yellow-200 to-yellow-600 rounded opacity-60"></div>
            </div>
            <div>
                <p class="text-[9px] uppercase opacity-50 tracking-[0.3em] mb-1">Total Assets</p>
                <div class="text-4xl font-bold">৳<span id="dBal">0</span></div>
            </div>
            <div>
                <p id="dName" class="text-lg font-medium leading-none mb-1"></p>
                <p id="dUID" class="text-[9px] font-mono opacity-40 uppercase tracking-widest"></p>
            </div>
        </div>

        <div id="userTools" class="space-y-4">
            <div class="glass p-6 rounded-[2.5rem]">
                <p class="text-[10px] font-bold uppercase opacity-30 tracking-widest mb-4">Transfer</p>
                <div class="flex flex-col gap-3">
                    <input id="sendTo" type="text" placeholder="Recipient UID" class="bg-black/40 p-4 rounded-2xl text-xs outline-none uppercase border border-white/5">
                    <div class="flex gap-2">
                        <input id="sendAmt" type="number" placeholder="৳ Amount" class="flex-1 bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5">
                        <button onclick="executeTransfer()" class="bg-blue-600 px-8 rounded-2xl font-bold active:scale-95 transition">Send</button>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem]">
                <p class="text-[10px] font-bold uppercase opacity-30 tracking-widest mb-4">Withdrawal</p>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="coMethod" class="bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5"><option>bKash</option><option>Nagad</option></select>
                    <input id="coAmt" type="number" placeholder="৳" class="bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5">
                </div>
                <input id="coNum" type="tel" placeholder="Account Number" class="w-full bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/5 mb-3">
                <button onclick="submitCashout()" class="w-full bg-orange-600/20 text-orange-500 py-4 rounded-2xl text-[11px] font-bold border border-orange-500/20 active:scale-95 transition">Request Payout</button>
            </div>
        </div>

        <div id="txList" class="space-y-3 pb-12"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg", authDomain: "my-wallet-920a6.firebaseapp.com", projectId: "my-wallet-920a6", storageBucket: "my-wallet-920a6.firebasestorage.app", messagingSenderId: "414624520334", appId: "1:414624520334:web:c36fa879d7e28808f691df" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";
        let activePhone = "";

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
        };

        window.handleLogout = () => { location.reload(); };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            const access = document.getElementById('lAccess').value;
            if(!p || !pin || !access) return alert("All fields required");
            
            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(access !== conf.data().current_otp) return alert("Invalid Access Code");

            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) {
                activePhone = p;
                startBank(p);
            } else alert("Invalid Phone or PIN");
        };

        window.handleSignup = async () => {
            const name = document.getElementById('sName').value;
            const phone = document.getElementById('sPhone').value;
            const pin = document.getElementById('sPass').value;
            const otp = document.getElementById('sOTP').value;
            if(!name || !phone || !pin || !otp) return alert("Missing fields");

            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(otp !== conf.data().current_otp) return alert("Invalid Protocol Key");

            const myUID = `NEX-${Math.floor(1000+Math.random()*8999)}-${phone.slice(-4)}`;
            await setDoc(doc(db, "users", phone), { Name: name, Password: pin, UID: myUID, Balance: 0 });
            alert("Success! UID: " + myUID);
            location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if(phone === MASTER_PHONE) {
                document.getElementById('adminPanel').classList.remove('hidden');
                initMaster();
            }
            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString();
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });
            const q = query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('txList');
                list.innerHTML = `<p class="text-[10px] font-bold uppercase opacity-30 tracking-widest mb-4">Transaction History</p>`;
                sn.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between border border-white/5">
                        <div><p class="text-xs font-semibold">${t.Title}</p><p class="text-[8px] opacity-40">${t.Date || 'Today'}</p></div>
                        <p class="font-bold ${t.Amount.toString().includes('-')?'text-red-400':'text-green-400'}">${t.Amount} ৳</p></div>`;
                });
            });
        }

        function initMaster() {
            onSnapshot(doc(db, "system_config", "access_codes"), ds => document.getElementById('liveOTP').innerText = ds.data().current_otp);
            onSnapshot(collection(db, "users"), snap => {
                let total = 0; snap.forEach(d => total += (d.data().Balance || 0));
                document.getElementById('totalCirc').innerText = total.toLocaleString();
            });
            onSnapshot(query(collection(db, "cashout_requests"), where("Status", "==", "Pending")), sn => {
                const list = document.getElementById('pendingPayouts');
                list.innerHTML = "";
                sn.forEach(doc => {
                    const r = doc.data();
                    list.innerHTML += `<div class="bg-black/60 p-4 rounded-2xl border border-red-500/10 mb-2 flex justify-between items-center">
                        <div><p class="text-[10px] font-bold">${r.UserName}</p><p class="text-[8px] opacity-50">${r.Method}: ${r.AccountNumber} • ৳${r.Amount}</p></div>
                        <button onclick="clearPayout('${doc.id}', '${r.User}', ${r.Amount}, '${r.Method}')" class="bg-green-600 px-4 py-2 rounded-xl text-[9px] font-bold">SETTLE</button></div>`;
                });
            });
        }

        window.generateNewOTP = async () => {
            const k = Math.floor(100000+Math.random()*900000).toString();
            await updateDoc(doc(db, "system_config", "access_codes"), { current_otp: k });
        };

        window.handleForge = async (type) => {
            const uid = document.getElementById('forgeUID').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            const q = query(collection(db, "users"), where("UID", "==", uid));
            const s = await getDocs(q);
            if(s.empty) return alert("User not found");
            const uDoc = s.docs[0];
            const nb = type === 'MINT' ? (uDoc.data().Balance + amt) : (uDoc.data().Balance - amt);
            await updateDoc(doc(db, "users", uDoc.id), { Balance: nb });
            await addDoc(collection(db, "transactions"), { User: uDoc.id, Title: "Central " + type, Amount: (type === 'MINT' ? "+" : "-") + amt, Timestamp: serverTimestamp() });
            alert("Protocol Forge Successful");
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('sendAmt').value);
            if(!uid || !amt) return alert("Fill data");
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("User not found");
            const rDoc = rSnap.docs[0];
            const sDoc = await getDoc(doc(db, "users", activePhone));
            if(sDoc.data().Balance < amt) return alert("Insufficient Assets");
            await updateDoc(doc(db, "users", activePhone), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rDoc.id), { Balance: (rDoc.data().Balance || 0) + amt });
            await addDoc(collection(db, "transactions"), { User: activePhone, Title: "To: "+rDoc.data().Name, Amount: "-"+amt, Timestamp: serverTimestamp() });
            await addDoc(collection(db, "transactions"), { User: rDoc.id, Title: "From: "+sDoc.data().Name, Amount: "+"+amt, Timestamp: serverTimestamp() });
            alert("Transfer Complete");
        };

        window.submitCashout = async () => {
            const amt = parseInt(document.getElementById('coAmt').value);
            const s = await getDoc(doc(db, "users", activePhone));
            if(s.data().Balance < amt) return alert("Insufficient Assets");
            await updateDoc(doc(db, "users", activePhone), { Balance: s.data().Balance - amt });
            await addDoc(collection(db, "cashout_requests"), { User: activePhone, UserName: s.data().Name, Amount: amt, Method: document.getElementById('coMethod').value, AccountNumber: document.getElementById('coNum').value, Status: "Pending", Timestamp: serverTimestamp() });
            alert("Request Dispatched");
        };

        window.clearPayout = async (id, p, a, m) => {
            await updateDoc(doc(db, "cashout_requests", id), { Status: "Cleared" });
            await addDoc(collection(db, "transactions"), { User: p, Title: `Payout (${m})`, Amount: `-${a}`, Timestamp: serverTimestamp() });
        };
    </script>
</body>
</html>
