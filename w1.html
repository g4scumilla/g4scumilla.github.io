<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXGEN CRYPTO Central Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #050508 60%); z-index: -1; }
        .bank-card { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .hidden { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 24px; }
        .nexus-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); outline: none; color: white; }
        .menu-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.2s; cursor: pointer; }
        .menu-item:active { transform: scale(0.92); }
        .scrolling-container { overflow: hidden; white-space: nowrap; width: 100%; }
        .scrolling-text { display: inline-block; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">
    <div class="bg-glow"></div>

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <h1 class="text-6xl font-black italic text-blue-500 uppercase mb-10 tracking-tighter">NEXGEN</h1>
        <div class="glass-panel p-8 w-full max-w-sm">
            
            <div id="loginFields">
                <input id="lPhone" type="tel" placeholder="Phone Number" class="w-full nexus-input p-4 rounded-2xl mb-4 text-center font-bold">
                <input id="lPass" type="tel" maxlength="6" placeholder="PIN" style="-webkit-text-security: disc;" class="w-full nexus-input p-4 rounded-2xl mb-6 text-center">
                <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl mb-4">Authorize</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] opacity-40 uppercase tracking-widest text-center">Register Protocol</button>
            </div>

            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full nexus-input p-4 rounded-2xl text-center">
                <input id="sPhone" type="tel" placeholder="Mobile Number" class="w-full nexus-input p-4 rounded-2xl text-center font-bold">
                <input id="sPass" type="tel" maxlength="6" placeholder="Set 6-Digit PIN" class="w-full nexus-input p-4 rounded-2xl text-center">
                <input id="sAccess" type="text" placeholder="Access Code" class="w-full nexus-input p-4 rounded-2xl text-center border-blue-500/30">
                
                <button onclick="handleSignup()" class="w-full bg-green-600 font-bold py-4 rounded-2xl">Initialize Identity</button>
                <button onclick="toggleAuth(true)" class="w-full text-[10px] opacity-40 uppercase tracking-widest text-center">Return</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        <div class="bank-card p-8 rounded-[2.5rem] aspect-[1.6/1] flex flex-col justify-between">
            <h2 class="text-2xl font-black text-white italic tracking-tighter">NEXGEN CRYPTO</h2>
            <div>
                <p class="text-[9px] opacity-60 uppercase mb-1 tracking-widest">Available Assets</p>
                <div class="text-4xl font-bold">$<span id="dBal">0</span></div>
            </div>
            <div>
                <p id="dName" class="text-lg font-semibold leading-none mb-1"></p>
                <p id="dUID" class="text-[9px] font-mono opacity-50 uppercase"></p>
            </div>
        </div>

        <div class="glass-panel p-5">
            <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">Broadcast</p>
            <div class="scrolling-container"><p id="displayNotice" class="scrolling-text text-xs">Syncing Protocol...</p></div>
            <div id="noticeAdmin" class="hidden mt-4 pt-3 border-t border-white/5">
                <textarea id="noticeInput" placeholder="Enter message..." class="w-full nexus-input p-3 rounded-xl text-[11px] mb-2 h-14"></textarea>
                <button onclick="updateNotice()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[9px] uppercase font-bold border border-blue-500/20">Update</button>
            </div>
        </div>

        <div id="sharedMenu" class="grid grid-cols-4 gap-4 px-2">
            <div onclick="showModal('transferModal')" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2">
                <div class="text-blue-400"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg></div>
                <span class="text-[9px] font-bold uppercase opacity-60">Send</span>
            </div>
            <div onclick="showModal('payoutModal')" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2">
                <div class="text-orange-400"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 00 2 2h2m2 4h10a2 2 0 00 2-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 00 2 2z"/></svg></div>
                <span class="text-[9px] font-bold uppercase opacity-60">Payout</span>
            </div>
            <div onclick="toggleStatement()" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2">
                <div class="text-green-400"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 2v-6m-8-5h11a2 2 0 012 2v11a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg></div>
                <span class="text-[9px] font-bold uppercase opacity-60">History</span>
            </div>
            <div onclick="location.reload()" class="menu-item p-4 rounded-2xl flex flex-col items-center gap-2 text-red-400">
                <div class="text-red-400"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></div>
                <span class="text-[9px] font-bold uppercase opacity-60">Exit</span>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-4">
            <div class="glass-panel p-6">
                <p class="text-[9px] uppercase opacity-40 mb-4 font-bold tracking-widest">Protocol Forge</p>
                <input id="forgeInput" type="text" placeholder="UID or Phone" class="w-full nexus-input p-3 rounded-xl text-xs uppercase mb-2">
                <input id="forgeAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600/20 text-green-400 py-3 rounded-xl text-[10px] font-bold uppercase border border-green-500/20">Mint</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600/20 text-red-400 py-3 rounded-xl text-[10px] font-bold uppercase border border-red-500/20">Burn</button>
                </div>
            </div>
            <div id="pendingPayouts" class="space-y-2"></div>
        </div>

        <div id="statementSection" class="hidden pt-4 pb-20">
            <div class="glass-panel p-5 mb-4">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-bold uppercase opacity-40">Statement Logs</p>
                    <button onclick="downloadPDF()" class="bg-blue-600/20 text-blue-400 text-[9px] font-bold px-3 py-1 rounded-lg">Export PDF</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="filterType" onchange="applyFilters()" class="nexus-input p-2 rounded-xl text-[10px]">
                        <option value="ALL">All Actions</option>
                        <option value="TRANSFER">Transfers</option>
                        <option value="PAYOUT">Payouts</option>
                        <option value="MINT">Forge Mint</option>
                        <option value="BURN">Forge Burn</option>
                    </select>
                    <input type="date" id="filterDate" onchange="applyFilters()" class="nexus-input p-2 rounded-xl text-[10px]">
                </div>
            </div>
            <div id="txList" class="space-y-2"></div>
        </div>
    </div>

    <div id="transferModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass-panel p-6 w-full max-w-sm">
            <input id="sendTo" type="text" placeholder="Receiver UID" class="w-full nexus-input p-3 rounded-xl text-xs uppercase mb-2">
            <input id="sendAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
            <button onclick="executeTransfer()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Send</button>
            <button onclick="closeModals()" class="w-full text-[10px] mt-4 opacity-30 text-center uppercase">Cancel</button>
        </div>
    </div>

    <div id="payoutModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass-panel p-6 w-full max-w-sm">
            <select id="coMethod" class="w-full nexus-input p-3 rounded-xl text-xs mb-2"><option>bKash</option><option>Nagad</option></select>
            <input id="coAmt" type="number" placeholder="Amount" class="w-full nexus-input p-3 rounded-xl text-xs mb-2">
            <input id="coNum" type="tel" placeholder="Receiver Number" class="w-full nexus-input p-3 rounded-xl text-xs mb-3">
            <button onclick="submitCashout()" class="w-full bg-orange-600 py-3 rounded-xl font-bold text-xs uppercase">Request Payout</button>
            <button onclick="closeModals()" class="w-full text-[10px] mt-4 opacity-30 text-center uppercase">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg", authDomain: "my-wallet-920a6.firebaseapp.com", projectId: "my-wallet-920a6", storageBucket: "my-wallet-920a6.firebasestorage.app", messagingSenderId: "414624520334", appId: "1:414624520334:web:c36fa879d7e28808f691df" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";
        let activePhone = ""; let masterData = [];

        window.toggleAuth = (isL) => { document.getElementById('loginFields').classList.toggle('hidden', !isL); document.getElementById('signupFields').classList.toggle('hidden', isL); };
        window.closeModals = () => { document.getElementById('transferModal').classList.add('hidden'); document.getElementById('payoutModal').classList.add('hidden'); };
        window.showModal = (id) => { closeModals(); document.getElementById(id).classList.remove('hidden'); };
        window.toggleStatement = () => { document.getElementById('statementSection').classList.toggle('hidden'); };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value; const pin = document.getElementById('lPass').value;
            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) { activePhone = p; startBank(p); } else alert("Access Denied");
        };

        window.handleSignup = async () => {
            const p = document.getElementById('sPhone').value; 
            const n = document.getElementById('sName').value;
            const pin = document.getElementById('sPass').value;
            const acc = document.getElementById('sAccess').value; // Restored field

            if(!p || !n || !pin || !acc) return alert("Fill all fields");
            
            const uid = `NEX-${Math.floor(1000+Math.random()*8999)}-${p.slice(-4)}`;
            await setDoc(doc(db, "users", p), { 
                Name: n, 
                Password: pin, 
                AccessCode: acc, // Saved to DB
                UID: uid.toUpperCase(), 
                Balance: 0 
            });
            alert("Protocol Identity Created"); location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if(phone === MASTER_PHONE) { 
                document.getElementById('adminPanel').classList.remove('hidden'); 
                document.getElementById('noticeAdmin').classList.remove('hidden'); 
                initMaster(); 
            }
            
            onSnapshot(doc(db, "system_config", "broadcast"), d => { if(d.exists()) document.getElementById('displayNotice').innerText = d.data().message; });
            onSnapshot(doc(db, "users", phone), s => { 
                const d = s.data(); 
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString(); 
                document.getElementById('dName').innerText = d.Name; 
                document.getElementById('dUID').innerText = d.UID; 
            });
            
            // SMART FALLBACK QUERY
            const q = (phone === MASTER_PHONE) 
                ? query(collection(db, "transactions"), orderBy("Timestamp", "desc")) 
                : query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));

            onSnapshot(q, sn => {
                masterData = []; sn.forEach(d => masterData.push(d.data())); applyFilters();
            }, (err) => {
                onSnapshot(query(collection(db, "transactions"), where("User", "==", phone)), sn => {
                    masterData = []; sn.forEach(d => masterData.push(d.data()));
                    masterData.sort((a,b) => (b.Timestamp?.seconds || 0) - (a.Timestamp?.seconds || 0));
                    applyFilters();
                });
            });
        }

        window.applyFilters = () => {
            const type = document.getElementById('filterType').value;
            const dateStr = document.getElementById('filterDate').value;
            const list = document.getElementById('txList');
            list.innerHTML = "";

            const filtered = masterData.filter(t => {
                const matchType = type === "ALL" || t.Category === type;
                let matchDate = true;
                if(dateStr && t.Timestamp) {
                    const txD = new Date(t.Timestamp.seconds * 1000).toISOString().split('T')[0];
                    matchDate = txD === dateStr;
                }
                return matchType && matchDate;
            });

            if(filtered.length === 0) { list.innerHTML = `<p class="text-center opacity-20 text-[10px] py-10 uppercase tracking-widest">No Protocol Logs</p>`; return; }

            filtered.forEach(t => {
                const d = t.Timestamp ? new Date(t.Timestamp.seconds * 1000).toLocaleString() : "Syncing...";
                const isNeg = t.Amount.toString().includes('-');
                list.innerHTML += `<div class="glass-panel p-4 flex justify-between items-center mb-2"><div><p class="text-xs font-bold uppercase">${t.Title}</p><p class="text-[8px] opacity-40">${d}</p></div><p class="font-bold ${isNeg?'text-red-400':'text-green-400'}">${t.Amount} $</p></div>`;
            });
        };

        window.downloadPDF = () => {
            const { jsPDF } = window.jspdf; const docP = new jsPDF();
            docP.text("NEXGEN TRANSACTION LOG", 105, 20, {align:'center'});
            const rows = masterData.map(t => [t.Timestamp ? new Date(t.Timestamp.seconds*1000).toLocaleString() : 'N/A', t.Title, t.Amount + " $"]);
            docP.autoTable({ startY: 30, head: [['Date', 'Description', 'Amount']], body: rows });
            docP.save("NEXGEN_Log.pdf");
        };

        window.handleForge = async (type) => {
            const val = document.getElementById('forgeInput').value.trim().toUpperCase();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            let tId = null;
            const q = query(collection(db, "users"), where("UID", "==", val));
            const snap = await getDocs(q);
            if(!snap.empty) tId = snap.docs[0].id; else { const s = await getDoc(doc(db, "users", val.toLowerCase())); if(s.exists()) tId = s.id; }
            if(!tId) return alert("UID Fail");
            const s = await getDoc(doc(db, "users", tId));
            const nB = type === 'MINT' ? (s.data().Balance + amt) : (s.data().Balance - amt);
            await updateDoc(doc(db, "users", tId), { Balance: nB });
            await addDoc(collection(db, "transactions"), { User: tId, Title: `Central ${type}`, Category: type, Amount: (type==='MINT'?'+':'-')+amt, Timestamp: serverTimestamp() });
            alert("Protocol Forge Successful");
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase();
            const amt = parseInt(document.getElementById('sendAmt').value);
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("Receiver Fail");
            const rId = rSnap.docs[0].id; const sDoc = await getDoc(doc(db, "users", activePhone));
            if(sDoc.data().Balance < amt) return alert("Low Assets");
            await updateDoc(doc(db, "users", activePhone), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rId), { Balance: (rSnap.docs[0].data().Balance || 0) + amt });
            await addDoc(collection(db, "transactions"), { User: activePhone, Title: "To: "+uid, Category: "TRANSFER", Amount: "-"+amt, Timestamp: serverTimestamp() });
            await addDoc(collection(db, "transactions"), { User: rId, Title: "From: "+sDoc.data().UID, Category: "TRANSFER", Amount: "+"+amt, Timestamp: serverTimestamp() });
            alert("Transfer Sent"); closeModals();
        };

        window.submitCashout = async () => {
            const amt = parseInt(document.getElementById('coAmt').value);
            const s = await getDoc(doc(db, "users", activePhone));
            if(s.data().Balance < amt) return alert("Low Assets");
            await updateDoc(doc(db, "users", activePhone), { Balance: s.data().Balance - amt });
            await addDoc(collection(db, "cashout_requests"), { User: activePhone, UserName: s.data().Name, Amount: amt, Method: document.getElementById('coMethod').value, Status: "Pending", Timestamp: serverTimestamp() });
            await addDoc(collection(db, "transactions"), { User: activePhone, Title: "Payout Request", Category: "PAYOUT", Amount: "-"+amt, Timestamp: serverTimestamp() });
            alert("Payout Logged"); closeModals();
        };

        window.updateNotice = async () => { await setDoc(doc(db, "system_config", "broadcast"), { message: document.getElementById('noticeInput').value }); document.getElementById('noticeInput').value = ""; alert("Board Updated"); };
        function initMaster() {
            onSnapshot(query(collection(db, "cashout_requests"), where("Status", "==", "Pending")), sn => {
                const list = document.getElementById('pendingPayouts'); list.innerHTML = "";
                sn.forEach(d => { const r = d.data(); list.innerHTML += `<div class="glass-panel p-4 flex justify-between items-center mb-2"><div><p class="text-[10px] font-bold">${r.UserName}</p><p class="text-[8px] text-yellow-500">${r.Method} • $${r.Amount}</p></div><button onclick="clearPayout('${d.id}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Settle</button></div>`; });
            });
        }
        window.clearPayout = async (id) => { await updateDoc(doc(db, "cashout_requests", id), { Status: "Cleared" }); alert("Settled"); };
    </script>
</body>
</html>
