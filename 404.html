<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DASHBOARD CSS REPLICA */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* The Visa Card Header */
        .card-container {
            padding: 20px;
            background: #fff;
            display: flex;
            justify-content: center;
        }

        .visa-card {
            width: 100%;
            max-width: 400px;
            height: 200px;
            background: linear-gradient(135deg, #1a1a1a 0%, #3d3d3d 100%);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .card-timestamp {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* 404 Main Section */
        .error-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-content h1 {
            font-size: 6rem;
            margin: 0;
            color: #2c3e50;
            font-weight: 900;
        }

        .error-content p {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-home { background: #1a73e8; color: white; }
        .btn-dev { background: #333; color: white; }
        .btn-sync { background: #fff; color: #333; border: 1px solid #ddd; }

        /* Bottom Menu Bar */
        .bottom-menu {
            height: 70px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .menu-item {
            text-decoration: none;
            color: #999;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
        }

        .menu-item.active { color: #1a73e8; }
        .menu-item i { font-size: 1.2rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="visa-card">
            <div>
                <div class="card-label">SECURE PERSONAL HUB</div>
                <div class="card-timestamp" id="clock">--:--:--</div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div style="font-weight: bold; letter-spacing: 1px;">KUAFI DASHBOARD</div>
                <i class="fab fa-cc-visa" style="font-size: 2rem; opacity: 0.8;"></i>
            </div>
        </div>
    </div>

    <div class="error-content">
        <h1>404</h1>
        <p>This page is currently unavailable.</p>
        
        <div class="btn-group">
            <a href="/index" class="btn btn-home">
                <i class="fas fa-home"></i> Home Page
            </a>
            <a href="https://kaficumilla.shop/Projects/mydashboard/index" class="btn btn-dev">
                <i class="fas fa-user-shield"></i> Developer Dashboard
            </a>
            <button onclick="location.reload()" class="btn btn-sync">
                <i class="fas fa-sync"></i> Sync Now
            </button>
        </div>
    </div>

    <div class="bottom-menu">
        <a href="/index" class="menu-item">
            <i class="fas fa-th-large"></i>
            <span>Home</span>
        </a>
        <a href="#" class="menu-item">
            <i class="fas fa-compass"></i>
            <span>Explore</span>
        </a>
        <a href="#" class="menu-item">
            <i class="fas fa-bell"></i>
            <span>Alerts</span>
        </a>
        <a href="#" class="menu-item active">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
