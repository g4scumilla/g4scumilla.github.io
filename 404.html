<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>404 - Page Not Found</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#8b0000">

<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --g4s-red: #8b0000; 
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: calc(60px + var(--safe-bottom));
    background: linear-gradient(rgba(248, 249, 250, 0.98), rgba(248, 249, 250, 0.98)), 
                url('https://www.transparenttextures.com/patterns/floral-paper.png');
    background-size: auto;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header-section {
    background: linear-gradient(180deg, var(--g4s-red) 0%, #fff 100%);
    height: 60px; 
    padding-top: var(--safe-top);
}

.card-container { 
    padding: 0 15px 20px; 
    margin-top: -30px; 
    position: relative;
    z-index: 10;
}

.visa-card {
    border-radius: 15px; aspect-ratio: 1.58 / 1; width: 100%;
    color: white; display: flex; flex-direction: column;
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
    background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1400&q=80');
    background-size: cover;
}

.visa-card::before {
    content: ""; 
    position: absolute; 
    inset: 0; 
    width: 100%;
    background: url('https://g4scumilla.github.io/Files/Img/logo.png');
    background-size: 35%; 
    background-repeat: no-repeat;
    background-position: 15px center; 
    opacity: 0.85; 
    z-index: 1;
    mask-image: linear-gradient(to right, black 30%, transparent 80%);
    -webkit-mask-image: linear-gradient(to right, black 30%, transparent 80%);
}

.visa-card::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(139, 0, 0, 0.5));
    z-index: 2;
}

.visa-card > * { position: relative; z-index: 3; }

/* ENLARGED 404 CONTENT */
.error-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    background: radial-gradient(circle at center, rgba(139, 0, 0, 0.08) 0%, transparent 70%);
}

.error-section h1 {
    font-family: 'Lobster', cursive;
    font-size: 110px;
    color: var(--g4s-red);
    margin: 0;
    line-height: 1;
    text-shadow: 2px 4px 10px rgba(0,0,0,0.1);
}

.error-section p {
    font-size: 18px;
    font-weight: 800;
    color: #444;
    margin-top: -5px;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

/* LARGE ACTION BUTTONS */
.action-btn {
    text-decoration: none;
    width: 280px;
    padding: 16px;
    margin: 10px 0;
    background: #fff;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    font-size: 16px;
    font-weight: 800;
    color: var(--g4s-red);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    border: 1px solid rgba(139, 0, 0, 0.1);
    transition: all 0.2s ease;
}

.action-btn i { font-size: 20px; }
.action-btn:active { transform: scale(0.95); background: #fdf2f2; }

/* BOTTOM NAV RESTORED */
.bottom-nav {
    position: fixed; bottom: 0; width: 100%; background: white;
    display: flex; justify-content: space-around;
    padding: 10px 0 calc(10px + var(--safe-bottom));
    border-top: 1px solid #eee; z-index: 2000;
}

.nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; font-weight: 600; }
.nav-active { color: var(--g4s-red); }

.rotating { animation: rotate 1s linear; }
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (min-width: 768px) {
    body, .bottom-nav { width: 100%; max-width: 450px; margin: 0 auto; }
    .bottom-nav { left: 50% !important; transform: translateX(-50%); }
}
</style>
</head>

<body>

<div class="header-section"></div>

<div class="card-container">
    <div class="visa-card">
        <div style="flex:1; display:flex; padding: 20px; position: relative;">
            <div style="flex: 0.42;"></div>
            <div style="flex: 0.58; display: flex; flex-direction: column; justify-content: center; text-align: left; padding-left: 15px; border-left: 2px solid rgba(255,255,255,0.3);">
                <div style="margin-bottom: 12px;">
                    <div style="font-family: 'Lobster', cursive; font-size: 20px; color: #fff; letter-spacing: 0.5px; border-bottom: 2px solid var(--g4s-red); display: inline-block; padding-bottom: 2px;">Welcome to G4S</div>
                    <div style="font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.95); margin-top: 4px; border-bottom: 1px solid rgba(255,255,255,0.4); display: inline-block;">Productivity & Automation</div>
                </div>
                <div>
                    <div style="font-family: 'Lobster', cursive; font-size: 14px; color: #ffeb3b; letter-spacing: 0.5px;">Secure Access</div>
                    <div style="font-size: 7px; font-weight: 600; opacity: 0.9; line-height: 1.4; margin-top: 2px;">Professional internal resource hub.</div>
                </div>
            </div>
        </div>
        <div style="padding:10px 15px; background: rgba(0,0,0,0.4); font-size: 8px; text-align: left; letter-spacing: 2px; display: flex; justify-content: space-between; align-items: center; font-weight: 800;">
            <span style="font-family: 'Lobster', cursive; font-size: 11px; text-transform: none; letter-spacing: 0.5px;"><i class="fa-solid fa-code"></i> Developed By: Abdullahil Kuafi</span>
            <span id="live-clock" style="background: rgba(255,255,255,0.15); padding: 3px 12px; border-radius: 5px; font-family: 'Lobster', cursive; font-size: 10px; font-weight: bold; letter-spacing: 0.8px;">--:--:-- --</span>
        </div>
    </div>
</div>

<div class="error-section">
    <h1>404</h1>
    <p>LOCATION NOT FOUND</p>

    <a href="/index" class="action-btn">
        <i class="fa-solid fa-house-chimney"></i> 
        <span>Home Dashboard</span>
    </a>
    
    <a href="https://kaficumilla.shop/Projects/mydashboard/index" class="action-btn">
        <i class="fa-solid fa-user-shield"></i> 
        <span>Developer Portal</span>
    </a>

    <a href="javascript:void(0)" class="action-btn" onclick="syncPage(this)">
        <i class="fa-solid fa-arrows-rotate" id="sync-icon"></i> 
        <span>Refresh & Sync</span>
    </a>
</div>

<div class="bottom-nav">
    <a href="/index" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-circle-plus" style="font-size: 26px; color: var(--g4s-red);"></i></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
    <a href="#" class="nav-item nav-active"><i class="fa-solid fa-user-circle"></i><span>Account</span></a>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const clockEl = document.getElementById('live-clock');
        if(clockEl) {
            clockEl.innerText = now.toLocaleTimeString([], { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            });
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

    function syncPage(el) {
        const icon = document.getElementById('sync-icon');
        icon.classList.add('rotating');
        setTimeout(() => {
            location.reload();
        }, 800);
    }
</script>

</body>
</html>
