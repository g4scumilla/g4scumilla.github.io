<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>G4S Internal Dashboard</title>

<link rel="stylesheet" href="regular_pages/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    :root {
        --primary-red: #d32f2f;
        --app-bg: #f0f2f5;
        --header-height: 80px; /* Adjust this to match your actual header height */
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }

    body {
        margin: 0; padding: 0;
        background-color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        display: flex; justify-content: center; height: 100vh; overflow: hidden;
    }

    .app-shell {
        width: 100%;
        max-width: 450px;
        background-color: var(--app-bg);
        height: 100vh;
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    /* HEADER FIX: Ensure it stays at the top */
    #header {
        position: absolute;
        top: 0;
        width: 100%;
        z-index: 100;
        background: #fff;
    }

    /* CONTENT FIX: Padding-top prevents overlap with header */
    .main-content {
        flex: 1;
        overflow-y: auto;
        /* Padding top must equal header height */
        padding: calc(var(--header-height) + 15px) 12px 100px; 
        scrollbar-width: none;
    }
    .main-content::-webkit-scrollbar { display: none; }

    /* GRID STYLING */
    .service-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px 8px;
    }

    .grid-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.1s ease;
    }
    .grid-item:active { transform: scale(0.9); }

    .icon-box {
        width: 60px;
        height: 60px;
        background: #fff;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
        font-size: 22px;
        color: var(--primary-red);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.03);
    }

    .grid-label {
        font-size: 9px;
        font-weight: 700;
        color: #444;
        text-align: center;
        line-height: 1.1;
    }

    #footer { width: 100%; }
</style>
</head>
<body>

<div class="app-shell">
    <div id="header"></div>

    <div class="main-content">
        <div class="service-grid">
            <a href="pages/resignation_automations.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-file-signature"></i></div>
                <span class="grid-label">Resignation</span>
            </a>
            <a href="pages/prepare_sheet.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-table-list"></i></div>
                <span class="grid-label">Prepare Sheet</span>
            </a>
            <a href="pages/training_sheet.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-graduation-cap"></i></div>
                <span class="grid-label">Training</span>
            </a>
            <a href="/Projects/Wallet/index" class="grid-item">
                <div class="icon-box"><i class="fas fa-wallet"></i></div>
                <span class="grid-label">Wallet</span>
            </a>
            <a href="pages/attendance.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
                <span class="grid-label">Attendance</span>
            </a>
            <a href="pages/inventory.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-boxes-stacked"></i></div>
                <span class="grid-label">Inventory</span>
            </a>
            <a href="pages/vouchers.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-receipt"></i></div>
                <span class="grid-label">Vouchers</span>
            </a>
            <a href="pages/reports.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-chart-line"></i></div>
                <span class="grid-label">Reports</span>
            </a>
            <a href="pages/staff.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-users-gear"></i></div>
                <span class="grid-label">Staff</span>
            </a>
            <a href="pages/payroll.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-money-check-dollar"></i></div>
                <span class="grid-label">Payroll</span>
            </a>
            <a href="pages/mushak.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-file-invoice-dollar"></i></div>
                <span class="grid-label">Mushak</span>
            </a>
            <a href="pages/settings.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-gear"></i></div>
                <span class="grid-label">Settings</span>
            </a>
            <a href="pages/cloud.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-cloud"></i></div>
                <span class="grid-label">Cloud</span>
            </a>
            <a href="pages/archive.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-box-archive"></i></div>
                <span class="grid-label">Archive</span>
            </a>
            <a href="pages/support.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-headset"></i></div>
                <span class="grid-label">Support</span>
            </a>
            <a href="pages/other.html" class="grid-item">
                <div class="icon-box"><i class="fas fa-ellipsis"></i></div>
                <span class="grid-label">More</span>
            </a>
        </div>
    </div>

    <div id="footer"></div>
</div>

<script>
function loadComponent(id, file) {
    fetch(file)
        .then(response => response.text())
        .then(data => {
            const container = document.getElementById(id);
            container.innerHTML = data;
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                newScript.text = oldScript.text;
                document.body.appendChild(newScript);
            });
        });
}

window.onload = () => {
    loadComponent("header", "regular_pages/header.html");
    loadComponent("footer", "regular_pages/footer.html");
};
</script>

</body>
</html>
