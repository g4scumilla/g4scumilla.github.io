<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kuafi Wallet</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: auto;
      padding: 20px;
      background: #f4f6f8;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <h2>💰 My Wallet</h2>

  <div class="box">

    <input id="person" placeholder="Person">

    <select id="type">
      <option>Income</option>
      <option>Expense</option>
    </select>

    <input id="category" placeholder="Category">
    <input id="amount" type="number" placeholder="Amount">
    <input id="note" placeholder="Note">

    <button onclick="sendData()">Add Transaction</button>

  </div>

  <script>
    function sendData() {

      fetch("https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          person: document.getElementById("person").value,
          type: document.getElementById("type").value,
          category: document.getElementById("category").value,
          amount: document.getElementById("amount").value,
          note: document.getElementById("note").value
        })
      })
      .then(res => res.text())
      .then(data => {
        alert("Saved: " + data);

        // clear inputs
        document.getElementById("person").value = "";
        document.getElementById("category").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
      })
      .catch(err => {
        alert("Error: " + err);
      });

    }
  </script>

</body>
</html>
