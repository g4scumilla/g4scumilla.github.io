<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f0ebf8;
  margin:0;
}

/* Header */
.header{
  background:#673ab7;
  color:white;
  padding:30px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* Form container */
.container{
  max-width:650px;
  margin:30px auto;
}

/* Question card */
.card{
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* Question text */
.question{
  font-size:16px;
  margin-bottom:12px;
}

/* Input fields */
input[type=text],
input[type=email],
select,
textarea{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:14px;
}

/* Radio buttons spacing */
label{
  display:block;
  margin:6px 0;
}

/* Submit button */
.submit-btn{
  background:#673ab7;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

.submit-btn:hover{
  background:#5a31a8;
}

.footer{
  text-align:center;
  color:gray;
  font-size:12px;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
Simple Survey Form
</div>

<div class="container">

<form>

<div class="card">
<div class="question">1. What is your name?</div>
<input type="text" placeholder="Your answer">
</div>

<div class="card">
<div class="question">2. What is your email?</div>
<input type="email" placeholder="Your answer">
</div>

<div class="card">
<div class="question">3. Your gender</div>
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Prefer not to say</label>
</div>

<div class="card">
<div class="question">4. Which service do you like?</div>
<select>
<option>Select an option</option>
<option>Security Service</option>
<option>Cleaning Service</option>
<option>IT Service</option>
</select>
</div>

<div class="card">
<div class="question">5. Any suggestions?</div>
<textarea rows="4" placeholder="Your answer"></textarea>
</div>

<div style="text-align:center">
<button class="submit-btn">Submit</button>
</div>

</form>

<div class="footer">
This is a demo form
</div>

</div>

</body>
</html>
