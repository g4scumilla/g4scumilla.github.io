@<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 Bank - My Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex items-center justify-center min-h-screen">

    <div class="bg-gradient-to-br from-blue-700 to-blue-900 p-8 rounded-3xl shadow-2xl w-full max-w-xs border border-blue-400">
        <div class="flex justify-between items-start mb-10">
            <h2 class="text-xl font-bold tracking-tighter">NEX BANK</h2>
            <div class="w-10 h-8 bg-yellow-400 rounded-md opacity-80"></div> </div>
        
        <p class="text-xs uppercase opacity-70 mb-1">Available Balance</p>
        <div class="text-4xl font-mono font-bold mb-8">
            ৳<span id="balance">0</span>
        </div>

        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] uppercase opacity-50">Account Holder</p>
                <p id="userName" class="text-sm font-medium tracking-wide">Loading...</p>
            </div>
            <p class="text-xs font-mono">04/29</p>
        </div>
    </div>

    <script type="module">
        // 1. Connect to Google's Servers
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 2. YOUR SECRET KEYS (Paste exactly what you copied from Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        // 3. Start the Connection
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Get the Data (Change the phone number below to yours!)
        const userRef = doc(db, "users", "01747479667"); 

        onSnapshot(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                document.getElementById("balance").innerText = data.balance.toLocaleString();
                document.getElementById("userName").innerText = data.name;
            } else {
                console.log("No user found! Check your phone number in Firebase.");
            }
        });
    </script>
</body>
</html>
