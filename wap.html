<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise Wallet</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

/* TOP CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  padding:15px;
  border-radius:16px;
  color:white;
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* COLORFUL CARDS */
.balanceCard{
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
}

.userCard{
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

/* NAV */
.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:12px;
  background:#1f2937;
  color:white;
  border:none;
  font-weight:bold;
}

/* CONTENT */
.section{
  padding:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

/* TRANSACTION CARDS */
.txCard{
  background:#111827;
  padding:12px;
  margin:10px 0;
  border-radius:14px;
  border-left:5px solid #22c55e;
}

.txExpense{
  border-left-color:#ef4444;
}

.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🏦 Enterprise Wallet System</div>

<div class="grid">
  <div class="card balanceCard">
    <div>💰 Balance</div>
    <div style="font-size:22px;font-weight:bold" id="bal">0</div>
  </div>

  <div class="card userCard">
    <div>👥 Users</div>
    <div style="font-size:22px;font-weight:bold" id="users">0</div>
  </div>
</div>

<div class="nav">
  <button onclick="loadDash()">🏠 Dashboard</button>
  <button onclick="loadAdd()">➕ Add</button>
  <button onclick="loadTx()">📄 Transactions</button>
</div>

<div class="section" id="view"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";

let DATA = {transactions:[],users:{}};
let currentView = "dash";

/* AUTO REFRESH */
function loadData(){
  fetch(API)
  .then(r=>r.json())
  .then(res=>{

    DATA = res;

    let bal = 0;

    if(res.transactions.length > 0){
      bal = res.transactions[res.transactions.length - 1].balance;
    }

    document.getElementById("bal").innerText = bal;
    document.getElementById("users").innerText = Object.keys(res.users).length;

    if(currentView === "dash") loadDash();
    if(currentView === "tx") loadTx();

  });
}

setInterval(loadData, 4000);
loadData();

/* DASHBOARD */
function loadDash(){
  currentView = "dash";

  let users = DATA.users;
  let html = "<h3>📊 Users Summary</h3>";

  for(let u in users){
    html += `
    <div class="card" style="background:linear-gradient(135deg,#1f2937,#374151)">
      <b>${u}</b><br>
      💵 Income: ${users[u].income || 0}<br>
      💸 Expense: ${users[u].expense || 0}<br>
      💰 Balance: ${users[u].balance || 0}
    </div>`;
  }

  view.innerHTML = html;
}

/* ADD */
function loadAdd(){
  currentView = "add";

  view.innerHTML = `
  <h3>➕ Add Transaction</h3>

  <input id="p" placeholder="Person">
  <select id="t">
    <option>Income</option>
    <option>Expense</option>
  </select>

  <input id="c" placeholder="Category">
  <input id="a" type="number" placeholder="Amount">
  <input id="n" placeholder="Note">

  <button onclick="send()">Save Transaction</button>
  `;
}

/* TRANSACTIONS */
function loadTx(){
  currentView = "tx";

  let html = "<h3>📄 Transactions</h3>";

  DATA.transactions.slice().reverse().forEach(t=>{

    let cls = t.type === "Expense" ? "txCard txExpense" : "txCard";

    html += `
    <div class="${cls}">
      <b>${t.person}</b> • ${t.type}<br>
      <div style="font-size:18px;font-weight:bold">${t.amount}</div>
      <div class="small">${t.category || ""} ${t.note || ""}</div>
    </div>
    `;
  });

  view.innerHTML = html;
}

/* SEND */
function send(){
  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      person:p.value,
      type:t.value,
      category:c.value,
      amount:a.value,
      note:n.value
    })
  });

  alert("Saved ✔");
  setTimeout(loadData,1500);
}

</script>

</body>
</html>
