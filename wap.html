<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise Wallet</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

/* TOP CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

/* NAV */
.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:10px;
  background:#1f2937;
  color:white;
  border:none;
}

/* CONTENT */
.section{
  padding:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🏦 Enterprise Wallet System</div>

<div class="grid">
  <div class="card">Balance: <span id="bal">0</span></div>
  <div class="card">Users: <span id="users">0</span></div>
</div>

<div class="nav">
  <button onclick="loadDash()">Dashboard</button>
  <button onclick="loadAdd()">Add</button>
  <button onclick="loadTx()">Transactions</button>
</div>

<div class="section" id="view"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";

let DATA = {transactions:[],users:{}};
let currentView = "dash";

/* ======================
   LIVE AUTO REFRESH
====================== */
function loadData(){

  fetch(API)
  .then(r=>r.json())
  .then(res=>{

    DATA = res;

    let bal = 0;

    if(res.transactions.length > 0){
      bal = res.transactions[res.transactions.length - 1].balance;
    }

    document.getElementById("bal").innerText = bal;
    document.getElementById("users").innerText = Object.keys(res.users).length;

    if(currentView === "dash") loadDash();
    if(currentView === "tx") loadTx();

  });

}

/* AUTO REFRESH EVERY 4s */
setInterval(loadData, 4000);
loadData();

/* ======================
   DASHBOARD
====================== */
function loadDash(){
  currentView = "dash";

  let users = DATA.users;
  let html = "<h3>Users Summary</h3>";

  for(let u in users){
    html += `
    <div class="card">
      <b>${u}</b><br>
      Income: ${users[u].income || 0}<br>
      Expense: ${users[u].expense || 0}<br>
      Balance: ${users[u].balance || 0}
    </div>`;
  }

  view.innerHTML = html;
}

/* ======================
   ADD PAGE
====================== */
function loadAdd(){
  currentView = "add";

  view.innerHTML = `
  <h3>Add Transaction</h3>

  <input id="p" placeholder="Person">
  <select id="t">
    <option>Income</option>
    <option>Expense</option>
  </select>

  <input id="c" placeholder="Category">
  <input id="a" type="number" placeholder="Amount">
  <input id="n" placeholder="Note">

  <button onclick="send()">Submit</button>
  `;
}

/* ======================
   TRANSACTIONS
====================== */
function loadTx(){
  currentView = "tx";

  let html = "<h3>All Transactions</h3>";

  DATA.transactions.slice().reverse().forEach(t=>{
    html += `
    <div class="card">
      <b>${t.person}</b> | ${t.type} | ${t.amount}<br>
      <small>${t.category || ""} ${t.note || ""}</small>
    </div>`;
  });

  view.innerHTML = html;
}

/* ======================
   SEND DATA
====================== */
function send(){

  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      person:p.value,
      type:t.value,
      category:c.value,
      amount:a.value,
      note:n.value
    })
  });

  alert("Saved ✔");

  setTimeout(loadData, 1500);
}

</script>

</body>
</html>
