<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --nexus-red: #f44336;
            --nexus-gradient: linear-gradient(180deg, #ff5f52 0%, #ffffff 40%);
            --bg-light: #f8f9fa;
            --text-dark: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--nexus-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
        }

        /* CARD STYLE */
        .card-container {
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .virtual-card {
            background: #000;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-radius: 20px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            min-height: 160px;
        }

        .card-holder { font-size: 14px; opacity: 0.8; letter-spacing: 1px; }
        .card-number { font-size: 18px; margin: 10px 0; font-family: monospace; }
        
        .balance-box {
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            display: inline-block;
            margin-top: 15px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* SERVICES GRID */
        .section-title {
            padding: 0 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            text-align: center;
        }

        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 24px;
            color: #3b82f6;
        }

        .service-label { font-size: 11px; font-weight: 500; color: #555; }

        /* FORM STYLING */
        .form-container {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .btn-save {
            background: #f44336;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #888;
            cursor: pointer;
        }

        .nav-item.active { color: var(--nexus-red); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        .fab {
            width: 60px;
            height: 60px;
            background: var(--nexus-red);
            border-radius: 50%;
            position: absolute;
            top: -30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        /* TRANSACTION LIST */
        .tx-list { padding: 0 20px; }
        .tx-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .tx-amount.expense { color: #f44336; }
        .tx-amount.income { color: #4caf50; }

    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">Enterprise<span>Pay</span></div>
    <i class="fa-regular fa-bell"></i>
</div>

<div id="main-content">
    </div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="loadDash()">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </div>
    <div class="nav-item" onclick="loadTx()">
        <i class="fa-solid fa-wallet"></i>
        <span>History</span>
    </div>
    <div style="width: 60px; position: relative;">
        <div class="fab" onclick="loadAdd()">
            <i class="fa-solid fa-plus"></i>
        </div>
    </div>
    <div class="nav-item">
        <i class="fa-solid fa-grid-2"></i>
        <span>Services</span>
    </div>
    <div class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";
let DATA = {transactions:[],users:{}};

async function loadData() {
    try {
        const r = await fetch(API);
        DATA = await r.json();
        // Update current view if needed
    } catch(e) { console.error("Sync failed"); }
}

function loadDash() {
    let bal = DATA.transactions.length > 0 ? DATA.transactions[DATA.transactions.length - 1].balance : 0;
    
    let html = `
    <div class="card-container">
        <div class="virtual-card">
            <div class="card-holder">ENTERPRISE USER</div>
            <div class="card-number">**** **** **** 2024</div>
            <div class="balance-box" onclick="this.innerHTML='৳ ' + ${bal}">
                Tap for Balance
            </div>
            <div style="position:absolute; bottom:20px; right:20px; font-weight:bold; font-style:italic; font-size:20px; opacity:0.6">VISA</div>
        </div>
    </div>

    <div class="section-title">
        <span>Payment Services</span>
        <span style="color:#f44336; font-size:12px;">See All ></span>
    </div>

    <div class="service-grid">
        <div class="service-item">
            <div class="icon-circle"><i class="fa-solid fa-right-left" style="color:#ff9800"></i></div>
            <span class="service-label">Fund Transfer</span>
        </div>
        <div class="service-item">
            <div class="icon-circle"><i class="fa-solid fa-mobile-screen" style="color:#2196f3"></i></div>
            <span class="service-label">Recharge</span>
        </div>
        <div class="service-item">
            <div class="icon-circle"><i class="fa-solid fa-file-invoice-dollar" style="color:#4caf50"></i></div>
            <span class="service-label">Bill Pay</span>
        </div>
        <div class="service-item">
            <div class="icon-circle"><i class="fa-solid fa-shop" style="color:#9c27b0"></i></div>
            <span class="service-label">Merchant</span>
        </div>
    </div>

    <div class="section-title">
        <span>User Summary</span>
    </div>
    <div style="padding: 20px;">
        ${Object.keys(DATA.users).map(u => `
            <div class="tx-item">
                <div><b>${u}</b><br><small>Active Member</small></div>
                <div style="text-align:right"><b>৳ ${DATA.users[u].balance}</b></div>
            </div>
        `).join('')}
    </div>
    `;
    document.getElementById('main-content').innerHTML = html;
}

function loadAdd() {
    document.getElementById('main-content').innerHTML = `
    <div class="form-container">
        <h3>New Transaction</h3>
        <input id="p" placeholder="Person Name">
        <select id="t">
            <option>Income</option>
            <option>Expense</option>
        </select>
        <input id="c" placeholder="Category (e.g. Food)">
        <input id="a" type="number" placeholder="Amount">
        <input id="n" placeholder="Notes">
        <button class="btn-save" onclick="send()">Confirm Transaction</button>
    </div>`;
}

function loadTx() {
    let html = `<div class="section-title"><span>Transaction History</span></div><div class="tx-list">`;
    DATA.transactions.slice().reverse().forEach(t => {
        const isExp = t.type === "Expense";
        html += `
        <div class="tx-item">
            <div>
                <b style="font-size:14px">${t.person}</b><br>
                <small style="color:#888">${t.category || 'General'}</small>
            </div>
            <div class="tx-amount ${isExp ? 'expense' : 'income'}">
                ${isExp ? '-' : '+'} ৳${t.amount}
            </div>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('main-content').innerHTML = html;
}

function send() {
    const payload = {
        person: document.getElementById('p').value,
        type: document.getElementById('t').value,
        category: document.getElementById('c').value,
        amount: document.getElementById('a').value,
        note: document.getElementById('n').value
    };
    
    fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    alert("Processing...");
    setTimeout(() => { loadData().then(loadDash); }, 1500);
}

// Init
loadData().then(loadDash);
setInterval(loadData, 10000);
</script>

</body>
</html>
