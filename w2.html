<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXGEN Financial Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { 
            background: #0a0a0c; 
            background-image: radial-gradient(circle at 10% 20%, rgba(91, 33, 182, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(29, 78, 216, 0.15) 0%, transparent 40%);
            color: white; font-family: 'Inter', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .visa-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
            aspect-ratio: 1.586/1; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .visa-card::after {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; background: url('https://www.transparentpng.com/download/flower/lotus-flower-free-png-transparent-8.png') no-repeat center;
            background-size: contain; opacity: 0.05; filter: brightness(2); pointer-events: none;
        }
        .marquee-area { background: rgba(59, 130, 246, 0.1); border-radius: 1rem; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="mb-8 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter text-blue-500 drop-shadow-2xl">NEXGEN</h1>
            <p class="text-[10px] uppercase tracking-[0.6em] opacity-40">Financial Network Protocol</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <div id="loginFields">
                <input id="lPhone" type="tel" inputmode="numeric" placeholder="Phone Number" class="w-full bg-black/40 p-4 rounded-2xl mb-4 outline-none border border-white/10 focus:border-blue-500 text-white">
                <input id="lPass" type="tel" inputmode="numeric" maxlength="6" placeholder="Enter PIN" style="-webkit-text-security: disc;" class="w-full bg-black/40 p-4 rounded-2xl mb-6 outline-none border border-white/10 focus:border-blue-500 text-center font-bold tracking-[1em]">
                <button onclick="handleLogin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl mb-4 active:scale-95 transition">Authorize Access</button>
                <button onclick="toggleAuth(false)" class="w-full text-[10px] uppercase tracking-widest opacity-40">Initialize New Protocol</button>
            </div>

            <div id="signupFields" class="hidden space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/10">
                <input id="sPhone" type="tel" inputmode="numeric" placeholder="Phone Number" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/10">
                <input id="sPass" type="tel" inputmode="numeric" maxlength="6" placeholder="Set 6-Digit PIN" class="w-full bg-black/40 p-4 rounded-2xl outline-none border border-white/10 text-center">
                <div class="pt-2 border-t border-white/5">
                    <p class="text-[9px] uppercase opacity-40 mb-2 text-center">Required Admin Key</p>
                    <input id="sOTP" type="tel" maxlength="6" placeholder="000000" class="w-full bg-red-900/10 p-4 rounded-2xl outline-none border border-red-500/20 text-center font-mono tracking-[0.5em] text-red-400">
                </div>
                <button onclick="handleSignup()" class="w-full bg-green-600 font-bold py-4 rounded-2xl active:scale-95 transition">Initialize Identity</button>
                <button onclick="toggleAuth(true)" class="w-full text-[10px] uppercase tracking-widest opacity-40 text-center block">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-sm mx-auto space-y-6">
        
        <div id="adminPanel" class="hidden bg-red-600/5 border border-red-500/20 p-6 rounded-[2.5rem] space-y-6">
            <h3 class="text-red-500 text-[10px] font-black uppercase tracking-widest">Master Terminal</h3>
            <div class="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-white/5">
                <div><p class="text-[8px] opacity-40 uppercase">Reg. Code</p><p id="liveOTP" class="font-mono text-yellow-500 font-bold text-xl tracking-widest">------</p></div>
                <button onclick="generateNewOTP()" class="bg-red-600 px-4 py-2 rounded-xl text-[10px] font-bold">REFRESH</button>
            </div>
            <div class="space-y-3">
                <input id="forgeUID" type="text" placeholder="Target UID" class="w-full bg-black/40 p-4 rounded-2xl text-xs border border-white/5 uppercase">
                <input id="forgeAmt" type="number" placeholder="Amount ($)" class="w-full bg-black/40 p-4 rounded-2xl text-xs border border-white/5">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600 py-3 rounded-xl text-[10px] font-bold uppercase">Mint</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-bold uppercase">Burn</button>
                </div>
            </div>
            <div id="pendingPayouts" class="space-y-2"></div>
        </div>

        <div class="visa-card p-7 rounded-[2rem] shadow-2xl flex flex-col justify-between">
            <h2 class="text-2xl font-black italic tracking-tighter">NEXGEN</h2>
            <div>
                <p class="text-[10px] uppercase opacity-60 tracking-[0.2em] mb-1">Total Assets</p>
                <div class="text-4xl font-bold tracking-tight">$<span id="dBal">0</span></div>
            </div>
            <div>
                <p id="dName" class="text-sm font-semibold uppercase"></p>
                <p id="dUID" class="text-[10px] font-mono opacity-50 tracking-widest"></p>
            </div>
        </div>

        <div class="marquee-area glass p-3">
            <div id="noticeBoard" class="marquee-content text-blue-400 text-xs font-bold">Connecting...</div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] space-y-4">
            <p class="text-[10px] font-bold uppercase opacity-30 tracking-widest">Transfer Assets</p>
            <input id="sendTo" type="text" placeholder="Recipient UID" class="w-full bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/10 uppercase">
            <div class="flex gap-2">
                <input id="sendAmt" type="number" placeholder="Amount" class="flex-1 bg-black/40 p-4 rounded-2xl text-xs border border-white/10">
                <button onclick="executeTransfer()" class="bg-blue-600 px-8 rounded-2xl font-bold">Send</button>
            </div>
        </div>

        <div id="txList" class="space-y-2 pb-10"></div>
        <button onclick="handleLogout()" class="w-full bg-red-600/20 text-red-500 py-4 rounded-2xl font-black uppercase text-xs">Secure Exit</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg", authDomain: "my-wallet-920a6.firebaseapp.com", projectId: "my-wallet-920a6", storageBucket: "my-wallet-920a6.firebasestorage.app", messagingSenderId: "414624520334", appId: "1:414624520334:web:c36fa879d7e28808f691df" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";
        let activePhone = "";

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
        };

        window.handleLogout = () => { location.reload(); };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            if(!p || !pin) return alert("Required");
            const s = await getDoc(doc(db, "users", p));
            // Using "Password" to match your successful login test
            if(s.exists() && s.data().Password == pin) {
                activePhone = p;
                startBank(p);
            } else alert("Error: Check Phone or PIN");
        };

        window.handleSignup = async () => {
            const name = document.getElementById('sName').value;
            const phone = document.getElementById('sPhone').value;
            const pin = document.getElementById('sPass').value;
            const otp = document.getElementById('sOTP').value;
            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(otp !== conf.data().current_otp) return alert("Invalid Key");
            const uid = `NEX-${Math.floor(1000+Math.random()*8999)}-${phone.slice(-4)}`;
            await setDoc(doc(db, "users", phone), { Name: name, Password: pin, UID: uid, Balance: 0 });
            alert("Registered: " + uid); location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if(phone === MASTER_PHONE) { document.getElementById('adminPanel').classList.remove('hidden'); initMaster(); }
            
            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString();
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });

            onSnapshot(doc(db, "system_config", "access_codes"), s => document.getElementById('noticeBoard').innerText = s.data().notice_text);

            const q = query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('txList'); list.innerHTML = "";
                sn.forEach(d => {
                    const t = d.data(); const isNeg = t.Amount.toString().includes('-');
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between border border-white/5">
                        <div><p class="text-xs font-bold">${t.Title}</p><p class="text-[8px] opacity-40 uppercase">${t.Timestamp?.toDate().toLocaleString() || '...'}</p></div>
                        <p class="font-black ${isNeg?'text-red-400':'text-green-400'}">${t.Amount} $</p></div>`;
                });
            });
        }

        function initMaster() {
            onSnapshot(doc(db, "system_config", "access_codes"), ds => document.getElementById('liveOTP').innerText = ds.data().current_otp);
        }

        window.generateNewOTP = async () => {
            const k = Math.floor(100000+Math.random()*900000).toString();
            await updateDoc(doc(db, "system_config", "access_codes"), { current_otp: k });
        };

        window.handleForge = async (type) => {
            const uid = document.getElementById('forgeUID').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            const q = query(collection(db, "users"), where("UID", "==", uid));
            const s = await getDocs(q);
            if(s.empty) return alert("User not found");
            const uDoc = s.docs[0];
            const nb = type === 'MINT' ? (uDoc.data().Balance + amt) : (uDoc.data().Balance - amt);
            await updateDoc(doc(db, "users", uDoc.id), { Balance: nb });
            await addDoc(collection(db, "transactions"), { User: uDoc.id, Title: "Central " + type, Amount: (type === 'MINT' ? "+" : "-") + amt, Timestamp: serverTimestamp() });
        };

        window.executeTransfer = async () => {
            const uid = document.getElementById('sendTo').value.toUpperCase().trim();
            const amt = parseInt(document.getElementById('sendAmt').value);
            const rSnap = await getDocs(query(collection(db, "users"), where("UID", "==", uid)));
            if(rSnap.empty) return alert("Recipient missing");
            const rDoc = rSnap.docs[0];
            const sDoc = await getDoc(doc(db, "users", activePhone));
            if(sDoc.data().Balance < amt) return alert("Insufficient Assets");
            await updateDoc(doc(db, "users", activePhone), { Balance: sDoc.data().Balance - amt });
            await updateDoc(doc(db, "users", rDoc.id), { Balance: (rDoc.data().Balance || 0) + amt });
            await addDoc(collection(db, "transactions"), { User: activePhone, Title: "To: "+rDoc.data().Name, Amount: "-"+amt, Timestamp: serverTimestamp() });
            await addDoc(collection(db, "transactions"), { User: rDoc.id, Title: "From: "+sDoc.data().Name, Amount: "+"+amt, Timestamp: serverTimestamp() });
            alert("Transfer Sent");
        };
    </script>
</body>
</html>
