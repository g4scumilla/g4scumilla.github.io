<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kuafi Wallet Dashboard</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

.header {
  padding:15px;
  text-align:center;
  background:#1e293b;
  font-size:20px;
  font-weight:bold;
}

.nav {
  display:flex;
}

.nav button {
  flex:1;
  padding:12px;
  border:none;
  background:#334155;
  color:white;
  cursor:pointer;
}

.nav button:hover {
  background:#475569;
}

.section {
  padding:15px;
  display:none;
}

.active {
  display:block;
}

.card {
  background:#1e293b;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button.action {
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:6px;
}

.summaryBox {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="header">💰 Wallet Dashboard</div>

<div class="nav">
  <button onclick="openTab('dashboard')">Dashboard</button>
  <button onclick="openTab('add')">Add</button>
  <button onclick="openTab('person')">Person</button>
  <button onclick="openTab('all')">All</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
  <div class="summaryBox">
    <div>Total Balance</div>
    <div id="totalBalance">0</div>
  </div>

  <div class="summaryBox">
    <div>Total Transactions</div>
    <div id="totalTxn">0</div>
  </div>
</div>

<!-- ADD -->
<div id="add" class="section">

  <h3>Add Transaction</h3>

  <select id="person"></select>

  <select id="type">
    <option>Income</option>
    <option>Expense</option>
  </select>

  <input id="category" placeholder="Category">
  <input id="amount" type="number" placeholder="Amount">
  <input id="note" placeholder="Note">

  <button class="action" onclick="send()">Submit</button>

</div>

<!-- PERSON -->
<div id="personTab" class="section">

  <h3>Person Summary</h3>

  <select id="personSelect" onchange="loadPerson()"></select>

  <div id="personData"></div>

</div>

<!-- ALL -->
<div id="all" class="section">
  <h3>All Transactions</h3>
  <div id="allData"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";

let data = [];
let persons = [];

function openTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// LOAD DATA
fetch(API)
.then(r=>r.json())
.then(res=>{
  data = res;

  let total = 0;

  data.forEach(d=>{
    total = d.balance;

    if(!persons.includes(d.person)) persons.push(d.person);
  });

  document.getElementById("totalBalance").innerText = total;
  document.getElementById("totalTxn").innerText = data.length;

  let opt = "";
  persons.forEach(p=>{
    opt += `<option>${p}</option>`;
  });

  document.getElementById("person").innerHTML = opt;
  document.getElementById("personSelect").innerHTML = opt;

  renderAll();
});

// ADD TXN
function send(){
  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      person:person.value,
      type:type.value,
      category:category.value,
      amount:amount.value,
      note:note.value
    })
  });

  alert("Saved ✔ Refresh dashboard");
}

// PERSON VIEW
function loadPerson(){
  let p = document.getElementById("personSelect").value;
  let html = "";
  let bal = 0;

  data.forEach(d=>{
    if(d.person == p){
      bal = d.balance;
      html += `<div class="card">${d.type} | ${d.amount} | ${d.category}</div>`;
    }
  });

  document.getElementById("personData").innerHTML =
    `<h4>Balance: ${bal}</h4>` + html;
}

// ALL VIEW
function renderAll(){
  let html = "";

  data.forEach(d=>{
    html += `<div class="card">${d.person} | ${d.type} | ${d.amount}</div>`;
  });

  document.getElementById("allData").innerHTML = html;
}

</script>

</body>
</html>
