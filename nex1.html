<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4SPay Business</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g4s-red: #d32f2f; --bg-gray: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #fff; padding-bottom: 80px; padding-top: 310px; }
        
        /* FIXED HEADER SECTION */
        .fixed-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(180deg, #f44336 0%, #fff 100%);
            z-index: 1000; padding-bottom: 10px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; color: white; font-weight: bold; font-size: 20px; }

        /* VISA STYLE CARD - SPLIT DESIGN */
        .card-container { padding: 0 15px; }
        .visa-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            border-radius: 15px; color: white; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); overflow: hidden; height: 160px;
            display: flex; flex-direction: column;
        }
        .visa-card::after {
            content: '\f06c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: -15px; bottom: -15px; font-size: 120px;
            opacity: 0.07; transform: rotate(-20deg); pointer-events: none;
        }

        .card-top { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chip { width: 35px; height: 25px; background: #c0c0c0; border-radius: 4px; opacity: 0.8; }
        
        .card-split { display: flex; flex: 1; border-top: 1px solid rgba(255,255,255,0.1); }
        .split-box { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer; 
            transition: background 0.3s; position: relative; z-index: 2;
        }
        .split-box:first-child { border-right: 1px solid rgba(255,255,255,0.1); }
        .split-box:active { background: rgba(255,255,255,0.05); }
        
        .split-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 5px; }
        .split-value { font-size: 15px; font-weight: bold; }
        .holder-name-small { position: absolute; bottom: 10px; left: 20px; font-size: 10px; letter-spacing: 2px; opacity: 0.5; }

        /* NAVIGATION & GRID */
        .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: white; }
        .service-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; cursor: pointer; color: #444; }
        .icon-circle { width: 45px; height: 45px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 5px; font-size: 18px; }

        /* CONTENT AREA */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .section-title { font-weight: 800; font-size: 15px; color: #333; }
        .back-btn { padding: 5px 15px; background: #f0f0f0; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; }

        .tx-card { background: white; padding: 15px; border-radius: 18px; margin: 0 15px 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f0f0f0; }
        
        /* FORM BOX */
        .form-box { background: #fff; padding: 20px; border-radius: 20px; margin: 0 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; display: block; margin: 10px 0 5px 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
        .submit-btn { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; cursor: pointer; }
        .nav-active { color: var(--g4s-red); }

        /* LOADING OVERLAY */
        #sync-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body>

<div id="sync-overlay">
    <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--g4s-red)"></i>
    <p id="sync-text" style="margin-top:20px; font-weight:bold; color:#555;">Syncing from Abdullahil Kuafi...</p>
</div>

<div class="fixed-header">
    <div class="top-bar"><span>G4SPay</span><i class="fa-solid fa-shield-halved"></i></div>
    
    <div class="card-container">
        <div class="visa-card">
            <div class="card-top"><div class="chip"></div><i class="fa-brands fa-cc-visa fa-xl" style="opacity:0.5"></i></div>
            <div class="card-split">
                <div class="split-box" onclick="showBalance(this)">
                    <span class="split-label">Balance</span>
                    <span class="split-value" id="bal-text">Tap for Balance</span>
                </div>
                <div class="split-box" onclick="sync()">
                    <span class="split-label">Synchronization</span>
                    <span class="split-value"><i class="fa-solid fa-rotate"></i> Refresh</span>
                </div>
            </div>
            <div class="holder-name-small">ABDULLAHIL KUAFI</div>
        </div>
    </div>

    <div class="service-grid">
        <div class="service-item" onclick="loadAddForm()"><div class="icon-circle"><i class="fa-solid fa-plus-minus" style="color:red"></i></div>Transact</div>
        <div class="service-item" onclick="loadUsers()"><div class="icon-circle"><i class="fa-solid fa-users-viewfinder" style="color:blue"></i></div>Users</div>
        <div class="service-item" onclick="loadAddUserForm()"><div class="icon-circle"><i class="fa-solid fa-user-plus" style="color:green"></i></div>Add User</div>
        <div class="service-item" onclick="loadHistory()"><div class="icon-circle"><i class="fa-solid fa-receipt" style="color:purple"></i></div>History</div>
    </div>
</div>

<div id="main-content">
    </div>

<div class="bottom-nav">
    <div class="nav-item nav-active" onclick="renderDash()"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="loadHistory()"><i class="fa-solid fa-list-check"></i><span>History</span></div>
    <div class="nav-item" onclick="loadUsers()"><i class="fa-solid fa-user-group"></i><span>Users</span></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";
    let DATA = {transactions:[], users:{}};

    window.onload = () => sync(true);

    async function sync(isFirstLoad = false) {
        const overlay = document.getElementById('sync-overlay');
        const syncText = document.getElementById('sync-text');
        
        overlay.style.display = 'flex';
        syncText.innerText = isFirstLoad ? "Initializing G4SPay..." : "Synchronizing from Abdullahil Kuafi...";

        try {
            const r = await fetch(API);
            DATA = await r.json();
            renderDash();
        } catch(e) { alert("Sync Failed"); }
        
        setTimeout(() => { overlay.style.display = 'none'; }, 800);
    }

    function showBalance(el) {
        const bal = DATA.transactions.length > 0 ? DATA.transactions[DATA.transactions.length - 1].balance : 0;
        const textEl = document.getElementById('bal-text');
        textEl.innerText = '৳ ' + bal;
        
        setTimeout(() => {
            textEl.innerText = 'Tap for Balance';
        }, 20000);
    }

    function renderDash() {
        document.getElementById('main-content').innerHTML = `
            <div class="section-header"><div class="section-title">Recent Transactions</div></div>
            <div class="content-area">
                ${DATA.transactions.slice(-10).reverse().map(t => `
                    <div class="tx-card">
                        <div><b>${t.person}</b><br><small style="color:#999">${t.category}</small></div>
                        <b style="color:${t.type=='Withdraw'?'#d32f2f':'#388e3c'}">${t.type=='Withdraw'?'+':'-'}৳${t.amount}</b>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function loadUsers() {
        let h = `<div class="section-header"><div class="section-title">User Directory</div><div class="back-btn" onclick="renderDash()">Back</div></div>`;
        for(let u in DATA.users) {
            h += `<div class="tx-card">
                <div><b>${u}</b><br><small style="color:#888">${DATA.users[u].designation}</small></div>
                <b style="color:var(--g4s-red)">৳${DATA.users[u].balance}</b>
            </div>`;
        }
        document.getElementById('main-content').innerHTML = h;
    }

    function loadAddForm() {
        let options = Object.keys(DATA.users).map(u => `<option value="${u}">${u}</option>`).join('');
        document.getElementById('main-content').innerHTML = `
            <div class="section-header"><div class="section-title">New Entry</div><div class="back-btn" onclick="renderDash()">Back</div></div>
            <div class="form-box">
                <label>Person</label><select id="p">${options}</select>
                <label>Type</label><select id="t"><option value="Withdraw">Withdraw (+)</option><option value="Deposit">Deposit (-)</option></select>
                <label>Category</label><input id="c" value="Imprest">
                <label>Amount</label><input id="a" type="number" placeholder="৳ 0.00">
                <label>Reference</label><input id="n" placeholder="Advance / Voucher details...">
                <button class="submit-btn" onclick="postTX()">SUBMIT TO LEDGER</button>
            </div>
        `;
    }

    function loadAddUserForm() {
        document.getElementById('main-content').innerHTML = `
            <div class="section-header"><div class="section-title">Add New User</div><div class="back-btn" onclick="renderDash()">Back</div></div>
            <div class="form-box">
                <label>Full Name</label><input id="un">
                <label>Designation</label><input id="ud">
                <label>Opening Receivable</label><input id="ub" type="number" value="0">
                <button class="submit-btn" style="background:#388e3c" onclick="submitUser()">REGISTER USER</button>
            </div>`;
    }

    async function postTX() {
        const p = { person:document.getElementById('p').value, type:document.getElementById('t').value, category:document.getElementById('c').value, amount:document.getElementById('a').value, note:document.getElementById('n').value };
        await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(p) });
        sync();
    }

    async function submitUser() {
        const u = { action:"addUser", name:document.getElementById('un').value, designation:document.getElementById('ud').value, balance:document.getElementById('ub').value };
        await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(u) });
        sync();
    }

    function loadHistory() {
        let h = `<div class="section-header"><div class="section-title">Full History</div><div class="back-btn" onclick="renderDash()">Back</div></div>`;
        DATA.transactions.slice().reverse().forEach(t => {
            h += `<div class="tx-card">
                <div><b>${t.person}</b><br><small>${t.category}</small></div>
                <div style="text-align:right"><b style="color:${t.type=='Withdraw'?'red':'green'}">৳${t.amount}</b><br><small style="font-size:9px">${t.date.split('T')[0]}</small></div>
            </div>`;
        });
        document.getElementById('main-content').innerHTML = h;
    }
</script>
</body>
</html>
