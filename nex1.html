<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex1 - Central Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --nexus-red: #d32f2f; }
        body { background-color: #f8f9fa; color: #333; font-family: 'Inter', sans-serif; }
        .nexus-header { background: linear-gradient(to right, #b71c1c, #d32f2f); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .bank-card { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; position: relative; overflow: hidden; border-radius: 20px; }
        .bank-card::after { content: ""; position: absolute; top: 10px; right: 10px; width: 60px; height: 60px; background: url('https://www.transparentpng.com/download/flower/lotus-flower-free-png-transparent-8.png') no-repeat; background-size: contain; opacity: 0.15; }
        .hidden { display: none; }
        input, select { border: 1px solid #e0e0e0; transition: 0.3s; }
        input:focus { border-color: var(--nexus-red); outline: none; }
        .admin-btn { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 10px; font-weight: bold; color: #444; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen">
        <div class="nexus-header p-10 text-center mb-6 shadow-lg">
            <h1 class="text-4xl font-black italic tracking-tighter">NEX1</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-80">Digital Banking Service</p>
        </div>

        <div class="px-6 max-w-md mx-auto">
            <div id="loginFields" class="space-y-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                    <input id="lPhone" type="tel" placeholder="Mobile Number" class="w-full p-4 rounded-xl mb-4 bg-gray-50">
                    <input id="lPass" type="tel" inputmode="numeric" maxlength="6" placeholder="6-Digit PIN" style="-webkit-text-security: disc;" class="w-full p-4 rounded-xl mb-6 bg-gray-50 text-center tracking-widest font-bold">
                    <button onclick="handleLogin()" class="w-full bg-[#d32f2f] text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 active:scale-95 transition">Login</button>
                </div>
                <div class="flex justify-between px-2 text-[11px] font-bold text-gray-500 uppercase tracking-tighter">
                    <button onclick="showForgot()">Forgot PIN?</button>
                    <button onclick="toggleAuth(false)" class="text-red-600">Register Account</button>
                </div>
            </div>

            <div id="signupFields" class="hidden space-y-4 pb-10">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 space-y-3">
                    <input id="sName" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl bg-gray-50">
                    <input id="sEmail" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl bg-gray-50">
                    
                    <div class="flex gap-2">
                        <select id="sCountry" class="p-4 rounded-xl bg-gray-50 text-xs w-28">
                            <option value="+880">BD (+880)</option>
                            <option value="+91">IN (+91)</option>
                            <option value="+1">US (+1)</option>
                        </select>
                        <input id="sPhone" type="tel" placeholder="Mobile" class="flex-1 p-4 rounded-xl bg-gray-50">
                    </div>

                    <select id="sDistrict" class="w-full p-4 rounded-xl bg-gray-50 text-xs">
                        <option value="">Select District</option>
                        <option>Cumilla</option><option>Dhaka</option><option>Chapainawabganj</option>
                        <option>Chittagong</option><option>Sylhet</option><option>Rajshahi</option>
                        </select>

                    <div class="grid grid-cols-2 gap-2">
                        <input id="sPass1" type="tel" inputmode="numeric" maxlength="6" placeholder="Set PIN" style="-webkit-text-security: disc;" class="p-4 rounded-xl bg-gray-50 text-center font-bold">
                        <input id="sPass2" type="tel" inputmode="numeric" maxlength="6" placeholder="Confirm" style="-webkit-text-security: disc;" class="p-4 rounded-xl bg-gray-50 text-center font-bold">
                    </div>

                    <input id="sRefer" type="text" placeholder="Referral (Mobile/UID)" class="w-full p-4 rounded-xl bg-gray-50 text-xs uppercase" oninput="lookupReferrer()">
                    <p id="referNameDisplay" class="text-[10px] ml-2 font-bold text-red-600 hidden"></p>

                    <div class="pt-4">
                        <p class="text-[9px] uppercase opacity-40 mb-2 font-bold">6-Digit Access Key</p>
                        <input id="sOTP" type="tel" maxlength="6" placeholder="000000" class="w-full p-4 rounded-xl bg-red-50 border-red-100 text-center font-mono tracking-widest text-red-600 font-bold">
                    </div>
                    
                    <button onclick="handleSignup()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl mt-4">Create Account</button>
                </div>
                <button onclick="toggleAuth(true)" class="w-full text-center text-[11px] font-bold text-gray-400 uppercase tracking-widest">Back to Login</button>
            </div>

            <div id="forgotFields" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm text-center">
                    <p id="maskPhone" class="text-sm font-bold text-gray-400 mb-4 tracking-widest"></p>
                    <input id="fEmail" type="email" placeholder="Confirm Registered Email" class="w-full p-4 rounded-xl bg-gray-50 mb-4">
                    <button onclick="requestReset()" class="w-full bg-[#d32f2f] text-white font-bold py-4 rounded-xl">Verify & Reset</button>
                </div>
                <button onclick="location.reload()" class="w-full text-center text-[10px] font-bold text-gray-400 uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-md mx-auto px-4 pb-20">
        <div class="flex justify-between items-center py-6">
            <div>
                <p class="text-xs text-gray-400 font-bold">Welcome,</p>
                <h2 id="dName" class="text-xl font-black text-gray-800">---</h2>
            </div>
            <button onclick="handleLogout()" class="p-3 bg-white rounded-full shadow-sm text-red-600">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            </button>
        </div>

        <div class="bank-card p-6 shadow-xl aspect-[1.6/1] flex flex-col justify-between mb-8">
            <div class="flex justify-between items-start">
                <span class="text-xl font-black italic italic">NEX1</span>
                <div class="w-10 h-7 bg-yellow-500/30 rounded border border-yellow-500/20"></div>
            </div>
            <div>
                <p class="text-[10px] opacity-60 font-bold tracking-widest uppercase">Available Balance</p>
                <h3 class="text-3xl font-black">৳<span id="dBal">0</span></h3>
            </div>
            <p id="dUID" class="text-[10px] font-mono opacity-50 tracking-widest uppercase">NEX-XXXX-XXXX</p>
        </div>

        <div id="adminPanel" class="hidden space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <button onclick="showForge()" class="admin-btn">
                    <span class="p-3 bg-blue-50 text-blue-600 rounded-2xl">💰</span>
                    Mint/Burn
                </button>
                <button onclick="showPayouts()" class="admin-btn">
                    <span class="p-3 bg-red-50 text-red-600 rounded-2xl">📥</span>
                    Payouts
                </button>
                <button onclick="generatePDFReport()" class="admin-btn">
                    <span class="p-3 bg-green-50 text-green-600 rounded-2xl">📄</span>
                    Reports
                </button>
            </div>

            <div id="forgeBox" class="hidden bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-[10px] font-black uppercase text-gray-400 mb-4">Currency Forge</p>
                <input id="forgeUID" type="text" placeholder="User UID" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-xs uppercase">
                <input id="forgeAmt" type="number" placeholder="Amount" class="w-full p-3 bg-gray-50 rounded-xl mb-4 text-xs">
                <div class="flex gap-2">
                    <button onclick="handleForge('MINT')" class="flex-1 bg-green-600 text-white py-3 rounded-xl text-[10px] font-bold">MINT</button>
                    <button onclick="handleForge('BURN')" class="flex-1 bg-red-600 text-white py-3 rounded-xl text-[10px] font-bold">BURN</button>
                </div>
            </div>
            
            <div id="payoutList" class="hidden space-y-3"></div>
        </div>

        <div id="userTools" class="space-y-4">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Services</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <p class="text-[8px] font-bold text-blue-600 uppercase mb-2 tracking-tighter">Send Money</p>
                    <input id="sendTo" type="text" placeholder="UID" class="w-full text-xs p-2 bg-gray-50 rounded-lg mb-2">
                    <input id="sendAmt" type="number" placeholder="Amount" class="w-full text-xs p-2 bg-gray-50 rounded-lg mb-2">
                    <button onclick="executeTransfer()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold">Transfer</button>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <p class="text-[8px] font-bold text-orange-600 uppercase mb-2 tracking-tighter">Cashout</p>
                    <input id="coAmt" type="number" placeholder="Amount" class="w-full text-xs p-2 bg-gray-50 rounded-lg mb-2">
                    <input id="coNum" type="tel" placeholder="Number" class="w-full text-xs p-2 bg-gray-50 rounded-lg mb-2">
                    <button onclick="submitCashout()" class="w-full bg-orange-600 text-white py-2 rounded-lg text-[10px] font-bold">Request</button>
                </div>
            </div>
        </div>

        <div id="txList" class="mt-8 space-y-3 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRtUxdvUww0LOfGcKr43l0HI9rOY-Gpg",
            authDomain: "my-wallet-920a6.firebaseapp.com",
            projectId: "my-wallet-920a6",
            storageBucket: "my-wallet-920a6.firebasestorage.app",
            messagingSenderId: "414624520334",
            appId: "1:414624520334:web:c36fa879d7e28808f691df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PHONE = "01747479667";

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
        };

        window.showForgot = () => {
            const p = document.getElementById('lPhone').value;
            if(p.length < 10) return alert("Enter mobile number first");
            document.getElementById('maskPhone').innerText = `+88${p.slice(0,5)}****${p.slice(-3)}`;
            document.getElementById('loginFields').classList.add('hidden');
            document.getElementById('forgotFields').classList.remove('hidden');
        };

        window.handleLogin = async () => {
            const p = document.getElementById('lPhone').value;
            const pin = document.getElementById('lPass').value;
            const s = await getDoc(doc(db, "users", p));
            if(s.exists() && s.data().Password == pin) startBank(p);
            else alert("Invalid PIN or Mobile");
        };

        window.lookupReferrer = async () => {
            const val = document.getElementById('sRefer').value.trim();
            const disp = document.getElementById('referNameDisplay');
            if(val.length < 8) return disp.classList.add('hidden');
            
            // Check UID first
            let q = query(collection(db, "users"), where("UID", "==", val.toUpperCase()));
            let snap = await getDocs(q);
            
            // If empty, check Phone
            if(snap.empty) {
                const docRef = doc(db, "users", val.replace(/[^0-9]/g, ""));
                const dSnap = await getDoc(docRef);
                if(dSnap.exists()) {
                    disp.innerText = "✓ Referral: " + dSnap.data().Name;
                    disp.classList.remove('hidden');
                    return;
                }
            } else {
                disp.innerText = "✓ Referral: " + snap.docs[0].data().Name;
                disp.classList.remove('hidden');
            }
        };

        window.handleSignup = async () => {
            const p1 = document.getElementById('sPass1').value;
            const p2 = document.getElementById('sPass2').value;
            const email = document.getElementById('sEmail').value;
            const phone = document.getElementById('sPhone').value;
            const otp = document.getElementById('sOTP').value;

            if(p1 !== p2) return alert("PINs do not match!");
            if(!email.includes('@')) return alert("Invalid email");
            
            const conf = await getDoc(doc(db, "system_config", "access_codes"));
            if(otp !== conf.data().current_otp) return alert("Invalid Access Key");

            const uid = `NEX-${Math.floor(1000+Math.random()*8999)}-${phone.slice(-4)}`;
            await setDoc(doc(db, "users", phone), { 
                Name: document.getElementById('sName').value,
                Email: email,
                Password: p1,
                District: document.getElementById('sDistrict').value,
                UID: uid.toUpperCase(),
                Balance: 0
            });
            alert("Account Protocol Activated! NEX-ID: " + uid);
            location.reload();
        };

        function startBank(phone) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if(phone === MASTER_PHONE) {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('userTools').classList.add('hidden');
                initMaster();
            }
            onSnapshot(doc(db, "users", phone), s => {
                const d = s.data();
                document.getElementById('dBal').innerText = (d.Balance || 0).toLocaleString();
                document.getElementById('dName').innerText = d.Name;
                document.getElementById('dUID').innerText = d.UID;
            });
            const q = query(collection(db, "transactions"), where("User", "==", phone), orderBy("Timestamp", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('txList');
                list.innerHTML = `<p class="text-[10px] font-black uppercase text-gray-300 tracking-widest">Digital Ledger</p>`;
                sn.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl flex justify-between shadow-sm border border-gray-50">
                        <div><p class="text-xs font-bold text-gray-700">${t.Title}</p><p class="text-[8px] text-gray-400">${t.Date}</p></div>
                        <p class="font-black ${t.Amount.includes('-')?'text-red-500':'text-green-600'}">${t.Amount} ৳</p></div>`;
                });
            });
        }

        // Admin Helpers
        window.showForge = () => document.getElementById('forgeBox').classList.toggle('hidden');
        window.handleLogout = () => confirm("Close secure session?") && location.reload();
        
        window.handleForge = async (type) => {
            const uid = document.getElementById('forgeUID').value.toUpperCase();
            const amt = parseInt(document.getElementById('forgeAmt').value);
            const q = query(collection(db, "users"), where("UID", "==", uid));
            const s = await getDocs(q);
            if(s.empty) return alert("UID Not Found");
            const u = s.docs[0];
            const nb = type === 'MINT' ? (u.data().Balance + amt) : (u.data().Balance - amt);
            await updateDoc(doc(db, "users", u.id), { Balance: nb });
            await addDoc(collection(db, "transactions"), { User: u.id, Title: `Central ${type}`, Amount: (type=='MINT'?'+':'-')+amt, Date: "Today", Timestamp: new Date() });
            alert("Success!");
        };

        // Transfer & Cashout Logic (Remaining logic same as previous builds)
    </script>
</body>
</html>
