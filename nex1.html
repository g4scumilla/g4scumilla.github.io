<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay Business</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nexus-red: #f44336; --nexus-gradient: linear-gradient(180deg, #ff5f52 0%, #ffffff 180px); }
        body { margin: 0; font-family: sans-serif; background: var(--nexus-gradient); background-attachment: fixed; padding-bottom: 80px; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px 20px; color: white; font-weight: bold; }
        
        .virtual-card { background: #1a1a1a; border-radius: 20px; padding: 25px; margin: 0 15px 20px; color: white; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .balance-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 20px; display: inline-block; cursor: pointer; margin-top: 10px; font-weight: bold; }

        .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .service-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 600; cursor: pointer; }
        .icon-circle { width: 45px; height: 45px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); margin-bottom: 5px; font-size: 18px; }

        .section-title { padding: 0 20px; font-weight: bold; font-size: 14px; margin: 15px 0 10px; color: #444; }
        .content-area { padding: 0 15px; }

        .tx-card { background: white; padding: 12px 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .user-info { display: flex; flex-direction: column; }
        .user-meta { font-size: 11px; color: #888; display: flex; gap: 8px; }

        /* FORM STYLES */
        .form-label { font-size: 12px; font-weight: bold; margin: 10px 0 5px; display: block; color: #666; }
        .input-f { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        .quick-amt-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .amt-btn { flex: 1; padding: 8px; border: 1px solid var(--nexus-red); border-radius: 8px; background: white; color: var(--nexus-red); font-weight: bold; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; cursor: pointer; }
        .nav-active { color: var(--nexus-red); }
    </style>
</head>
<body>

<div id="view">
    <div style="text-align:center; padding:50px;">Syncing...</div>
</div>

<div class="bottom-nav">
    <div class="nav-item nav-active" onclick="renderDash()"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="loadHistory()"><i class="fa-solid fa-list"></i><span>History</span></div>
    <div class="nav-item" onclick="loadUsers()"><i class="fa-solid fa-users"></i><span>Users</span></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyh6Z8MlywiLhDQtjh1dVmMBGpiA3AceFotlcno1VCRAsHxXpgsyVoNEF3nVuLTW6douA/exec";
    let DATA = {transactions:[], users:{}};

    window.onload = sync;

    async function sync() {
        const r = await fetch(API);
        DATA = await r.json();
        renderDash();
    }

    function renderDash() {
        const bal = DATA.transactions.length > 0 ? DATA.transactions[DATA.transactions.length - 1].balance : 0;
        document.getElementById('view').innerHTML = `
            <div class="top-bar"><span>NexusPay</span><i class="fa-regular fa-bell"></i></div>
            <div class="virtual-card">
                <div style="font-size:12px; opacity:0.8">Total Receivables</div>
                <div class="balance-box" onclick="this.innerText='৳ '+${bal}">Tap for Balance</div>
            </div>
            <div class="service-grid">
                <div class="service-item" onclick="loadAddForm()"><div class="icon-circle"><i class="fa-solid fa-plus" style="color:red"></i></div>Transact</div>
                <div class="service-item" onclick="loadUsers()"><div class="icon-circle"><i class="fa-solid fa-users" style="color:blue"></i></div>Users</div>
                <div class="service-item" onclick="loadAddUserForm()"><div class="icon-circle"><i class="fa-solid fa-user-plus" style="color:green"></i></div>Add User</div>
                <div class="service-item" onclick="loadHistory()"><div class="icon-circle"><i class="fa-solid fa-clock-rotate-left" style="color:purple"></i></div>History</div>
            </div>
            <div class="section-title">Recent Transactions</div>
            <div class="content-area">
                ${DATA.transactions.slice(-5).reverse().map(t => `
                    <div class="tx-card">
                        <div><b>${t.person}</b><br><small>${t.category}</small></div>
                        <div style="text-align:right">
                            <b style="color:${t.type=='Withdraw'?'red':'green'}">${t.type=='Withdraw'?'+':'-'}৳${t.amount}</b>
                            <div style="font-size:10px; color:#aaa">Net: ৳${t.balance}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function loadUsers() {
        let h = `<div class="top-bar" style="color:#333">Users</div><div class="content-area">`;
        for(let u in DATA.users) {
            h += `<div class="tx-card">
                <div class="user-info">
                    <b>${u}</b>
                    <div class="user-meta"><span>${DATA.users[u].designation}</span> • <span style="color:red">৳${DATA.users[u].balance}</span></div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:#ddd"></i>
            </div>`;
        }
        document.getElementById('view').innerHTML = h + `</div>`;
    }

    function loadAddForm() {
        let options = Object.keys(DATA.users).map(u => `<option value="${u}">${u}</option>`).join('');
        document.getElementById('view').innerHTML = `
            <div class="content-area" style="padding-top:20px">
                <div style="background:white; padding:20px; border-radius:20px;">
                    <label class="form-label">SELECT USER</label>
                    <select id="p" class="input-f">${options}</select>
                    
                    <label class="form-label">TYPE</label>
                    <select id="t" class="input-f"><option value="Withdraw">Withdraw (+)</option><option value="Deposit">Deposit (-)</option></select>
                    
                    <label class="form-label">CATEGORY</label>
                    <input id="c" class="input-f" value="Imprest" list="cats">
                    <datalist id="cats"><option value="Imprest"><option value="Salary"><option value="Office Expense"></datalist>

                    <label class="form-label">AMOUNT</label>
                    <input id="a" type="number" class="input-f" placeholder="Enter Amount">
                    <div class="quick-amt-row">
                        <button class="amt-btn" onclick="document.getElementById('a').value=100">100</button>
                        <button class="amt-btn" onclick="document.getElementById('a').value=500">500</button>
                        <button class="amt-btn" onclick="document.getElementById('a').value=1000">1000</button>
                    </div>

                    <label class="form-label">REFERENCE</label>
                    <select id="ref_drop" class="input-f" onchange="document.getElementById('n').value=this.value">
                        <option value="Advance">Advance</option>
                        <option value="Voucher">Voucher</option>
                        <option value="">Other...</option>
                    </select>
                    <input id="n" class="input-f" placeholder="Reference Details">
                    
                    <button onclick="postTX()" style="width:100%; padding:15px; background:var(--nexus-red); color:white; border:none; border-radius:10px; font-weight:bold;">POST TRANSACTION</button>
                </div>
            </div>
        `;
    }

    function loadAddUserForm() {
        document.getElementById('view').innerHTML = `
            <div class="content-area" style="padding-top:20px">
                <div style="background:white; padding:20px; border-radius:20px;">
                    <h3>New User Registration</h3>
                    <label class="form-label">FULL NAME</label><input id="un" class="input-f">
                    <label class="form-label">DESIGNATION</label><input id="ud" class="input-f">
                    <label class="form-label">OPENING RECEIVABLE (৳)</label><input id="ub" type="number" class="input-f" value="0">
                    <button onclick="submitUser()" style="width:100%; padding:15px; background:#4caf50; color:white; border:none; border-radius:10px; font-weight:bold;">REGISTER USER</button>
                </div>
            </div>`;
    }

    async function postTX() {
        const p = { person:document.getElementById('p').value, type:document.getElementById('t').value, category:document.getElementById('c').value, amount:document.getElementById('a').value, note:document.getElementById('n').value };
        await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(p) });
        alert("Done"); sync();
    }

    async function submitUser() {
        const u = { action:"addUser", name:document.getElementById('un').value, designation:document.getElementById('ud').value, balance:document.getElementById('ub').value };
        await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(u) });
        alert("User Added"); sync();
    }

    function loadHistory() {
        document.getElementById('view').innerHTML = `<div class="section-title">History</div><div class="content-area">${DATA.transactions.slice().reverse().map(t => `<div class="tx-card"><div><b>${t.person}</b><br><small>${t.date.split('T')[0]}</small></div><b>৳${t.amount}</b></div>`).join('')}</div>`;
    }
</script>
</body>
</html>
